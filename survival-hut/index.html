<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>末日小屋</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:#09110d;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif;color:#fff}button{font:inherit}#app{max-width:480px;height:100dvh;margin:auto;position:relative;overflow:hidden;background:linear-gradient(#1c2c22,#0a120e)}.top{padding:max(12px,env(safe-area-inset-top)) 14px 8px;display:flex;justify-content:space-between;align-items:center}.title{font-size:22px;font-weight:900}.timer{font-size:26px;font-weight:1000;color:#ffd35d}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:0 12px}.stat{background:#ffffff12;border:1px solid #ffffff18;border-radius:12px;padding:8px;text-align:center;font-size:12px}.stat b{display:block;font-size:18px;margin-top:2px}.scene{margin:10px 12px;border-radius:20px;border:1px solid #ffffff1c;background:radial-gradient(circle at 50% 45%,#6a5a2d 0,#283725 40%,#111b14 100%);height:42vh;position:relative;overflow:hidden}.hut{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);font-size:72px;filter:drop-shadow(0 8px 6px #0009)}.tower{position:absolute;font-size:38px}.t1{left:18%;top:20%}.t2{right:18%;top:20%}.t3{left:18%;bottom:18%}.t4{right:18%;bottom:18%}.zombie{position:absolute;font-size:30px;transition:all .4s}.daylight{position:absolute;inset:0;background:#f3d47b22;pointer-events:none}.nightMask{position:absolute;inset:0;background:#07101cb8;opacity:0;transition:.5s;pointer-events:none}.night .nightMask{opacity:1}.phase{position:absolute;left:12px;top:10px;background:#0009;border-radius:14px;padding:7px 11px;font-weight:900}.actions{padding:0 12px}.section{font-size:13px;opacity:.75;margin:5px 0}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.btn{border:0;border-radius:14px;padding:11px 6px;background:linear-gradient(#73944e,#425f2e);color:#fff;font-weight:900;box-shadow:0 4px 0 #24391d}.btn.blue{background:linear-gradient(#4f86bd,#2a527b);box-shadow:0 4px 0 #19344e}.btn.orange{background:linear-gradient(#dc9d42,#995f20);box-shadow:0 4px 0 #5c3715}.btn:active{transform:translateY(3px);box-shadow:none}.btn:disabled{opacity:.45}.log{margin:9px 12px 0;background:#0007;border:1px solid #ffffff18;border-radius:12px;padding:9px;text-align:center;font-size:13px;min-height:38px}.overlay{position:absolute;inset:0;background:#030805e8;display:none;align-items:center;justify-content:center;padding:22px;z-index:20}.overlay.show{display:flex}.modal{width:100%;border-radius:23px;background:#18241b;border:1px solid #ffffff26;padding:22px;text-align:center}.modal h2{font-size:31px;margin:0 0 10px}.modal .big{font-size:58px}.modal button{width:100%;border:0;border-radius:14px;padding:13px;margin-top:10px;font-weight:900;background:#f4b84b;color:#2d1d08}@media(max-height:730px){.scene{height:36vh}.btn{padding:8px 4px}.log{margin-top:6px}}</style></head><body><main id="app"><header class="top"><div><div class="title">末日小屋</div><div id="dayLabel">第 1 天・白天</div></div><div id="timer" class="timer">03:00</div></header><section class="stats"><div class="stat">🪵 木材<b id="wood">40</b></div><div class="stat">🪨 石材<b id="stone">20</b></div><div class="stat">❤️ 基地<b id="hp">100</b></div><div class="stat">🧟 今晚<b id="enemyCount">4</b></div></section><section id="scene" class="scene"><div class="daylight"></div><div class="nightMask"></div><div id="phase" class="phase">☀️ 白天採集</div><div class="hut">🏚️</div><div id="towerLayer"></div><div id="zombieLayer"></div></section><section class="actions"><div class="section">白天採集</div><div class="grid"><button id="chop" class="btn">🌲 砍樹<br>+12 木</button><button id="mine" class="btn">⛏️ 採石<br>+8 石</button><button id="search" class="btn">🎒 搜索<br>隨機資源</button></div><div class="section">防禦建造</div><div class="grid"><button id="build" class="btn blue">🗼 建炮塔<br>30木 15石</button><button id="upgrade" class="btn orange">⬆️ 升級炮塔<br><span id="upgradeCost">40木 20石</span></button><button id="skip" class="btn">🌙 直接入夜</button></div></section><div id="log" class="log">白天只有 3 分鐘，趕快收集資源並強化防禦。</div><div id="overlay" class="overlay"><div id="modal" class="modal"></div></div></main><script>const $=s=>document.querySelector(s);let wood,stone,hp,day,towers,towerLevel,phase,timeLeft,nightEnemy,nightTimer,gameOver;const DAY_SECONDS=180;function reset(){wood=40;stone=20;hp=100;day=1;towers=0;towerLevel=1;gameOver=false;startDay()}function startDay(){phase='day';timeLeft=DAY_SECONDS;nightEnemy=3+day;$('#scene').classList.remove('night');$('#phase').textContent='☀️ 白天採集';$('#dayLabel').textContent=`第 ${day} 天・白天`;$('#log').textContent='白天只有 3 分鐘，趕快收集資源並強化防禦。';setButtons(true);render()}function startNight(){if(phase==='night'||gameOver)return;phase='night';clearInterval(dayTimer);$('#scene').classList.add('night');$('#phase').textContent='🌙 夜晚防守';$('#dayLabel').textContent=`第 ${day} 天・夜晚`;setButtons(false);spawnZombies();let seconds=12;$('#timer').textContent='00:12';nightTimer=setInterval(()=>{seconds--;$('#timer').textContent='00:'+String(seconds).padStart(2,'0');battleTick();if(seconds<=0){clearInterval(nightTimer);finishNight()}},1000)}function battleTick(){let attack=towers*towerLevel;nightEnemy=Math.max(0,nightEnemy-attack);if(nightEnemy>0){let damage=Math.max(1,nightEnemy*2-towers*towerLevel);hp-=damage;$('#log').textContent=`炮塔擊退敵人，基地受到 ${damage} 傷害`;if(hp<=0){hp=0;gameOver=true;clearInterval(nightTimer);render();return endGame()}}else $('#log').textContent='敵人已全數消滅！';render();spawnZombies()}function finishNight(){if(gameOver)return;wood+=10+day*2;stone+=5+day;day++;$('#log').textContent='成功撐過夜晚，獲得生存獎勵！';setTimeout(startDay,900)}function endGame(){$('#modal').innerHTML=`<h2>基地淪陷</h2><div class="big">💀</div><p>你生存了 <b>${day}</b> 天<br>炮塔 ${towers} 座・等級 ${towerLevel}</p><button id="again">重新挑戰</button>`;$('#overlay').classList.add('show');$('#again').onclick=()=>{$('#overlay').classList.remove('show');reset()}}function setButtons(on){['chop','mine','search','build','upgrade'].forEach(id=>$('#'+id).disabled=!on)}function render(){$('#wood').textContent=wood;$('#stone').textContent=stone;$('#hp').textContent=hp;$('#enemyCount').textContent=nightEnemy;$('#upgradeCost').textContent=`${30+towerLevel*10}木 ${15+towerLevel*5}石`;let m=Math.floor(timeLeft/60),s=timeLeft%60;if(phase==='day')$('#timer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');$('#towerLayer').innerHTML=Array.from({length:Math.min(4,towers)},(_,i)=>`<div class="tower t${i+1}">🗼<small style="font-size:12px">Lv.${towerLevel}</small></div>`).join('')}function spawnZombies(){let layer=$('#zombieLayer');layer.innerHTML='';for(let i=0;i<Math.min(8,nightEnemy);i++){let z=document.createElement('div');z.className='zombie';z.textContent='🧟';z.style.left=(5+Math.random()*85)+'%';z.style.top=(8+Math.random()*78)+'%';layer.appendChild(z)}}let dayTimer=setInterval(()=>{},999999);function runDayTimer(){clearInterval(dayTimer);dayTimer=setInterval(()=>{if(phase!=='day'||gameOver)return;timeLeft--;render();if(timeLeft<=0)startNight()},1000)}$('#chop').onclick=()=>{wood+=12;$('#log').textContent='砍伐木材 +12';render()};$('#mine').onclick=()=>{stone+=8;$('#log').textContent='採集石材 +8';render()};$('#search').onclick=()=>{let w=5+Math.floor(Math.random()*12),s=3+Math.floor(Math.random()*8);wood+=w;stone+=s;$('#log').textContent=`搜索廢墟：木材 +${w}、石材 +${s}`;render()};$('#build').onclick=()=>{if(wood<30||stone<15)return $('#log').textContent='資源不足';wood-=30;stone-=15;towers++;$('#log').textContent='建造一座防禦塔';render()};$('#upgrade').onclick=()=>{let wc=30+towerLevel*10,sc=15+towerLevel*5;if(towers<1)return $('#log').textContent='請先建造炮塔';if(wood<wc||stone<sc)return $('#log').textContent='升級資源不足';wood-=wc;stone-=sc;towerLevel++;$('#log').textContent=`全部炮塔升級至 Lv.${towerLevel}`;render()};$('#skip').onclick=startNight;const oldStartDay=startDay;startDay=function(){oldStartDay();runDayTimer()};reset();</script></body></html>

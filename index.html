function render(){let q=document.getElementById("q").value;document.getElementById("grid").innerHTML=A.filter(a=>a.n.includes(q)).map(a=>`<button class="card" onclick="openModal('${a.n}','目前可連線｜${a.r}鑽／分鐘｜已有${a.c}人覺得很準')"><img class="portrait" src="${a.im}"><span class="shade"></span><span class="online">● 可連線</span><span class="info"><span class="namerow"><b>${a.n}</b><small>${a.r}鑽／分鐘</small></span><span class="chips">${a.t.map(t=>`<span>${t}</span>`).join("")}</span><span class="trust">♟ ${a.c}人覺得很準</span></span></button>`).join("")}
function toggleOnline(){only=!only;openModal("篩選條件",only?"已顯示目前可連線的老師":"已清除篩選條件")}
function nav(el,n){document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));el.classList.add("active");if(n!=="首頁")openModal(n,"此頁面將在下一階段開發。")}
function openModal(t,p){document.getElementById("mt").textContent=t;document.getElementById("mp").textContent=p;document.getElementById("modal").classList.add("show")}
function closeModal(){document.getElementById("modal").classList.remove("show")}render();
</script></main></body></html>

<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#07111f"><title>疊路逃生｜試玩版</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07111f;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;color:#fff}button{font:inherit}#app{width:100%;max-width:480px;height:100dvh;margin:auto;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 0,#1d3558 0,#0b1728 50%,#050b14 100%)}.top{height:74px;padding:max(12px,env(safe-area-inset-top)) 16px 8px;display:flex;justify-content:space-between;align-items:center}.brand{font-size:22px;font-weight:1000;letter-spacing:.5px}.sub{font-size:12px;opacity:.65;margin-top:2px}.stats{display:flex;gap:8px}.pill{background:#ffffff12;border:1px solid #ffffff20;border-radius:14px;padding:8px 10px;font-weight:900}.mission{margin:4px 14px 10px;padding:10px 12px;border-radius:15px;background:#ffffff0d;border:1px solid #ffffff17;text-align:center;font-size:14px}.mission b{color:#ffd35a}.board{width:min(92vw,420px);aspect-ratio:5/7;margin:auto;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(7,1fr);gap:5px;padding:8px;border-radius:22px;background:#02060d99;border:1px solid #ffffff1c;box-shadow:0 18px 50px #0009,inset 0 0 25px #4a8cff12}.cell{position:relative;border-radius:11px;background:linear-gradient(145deg,#20314a,#111d2f);border:1px solid #ffffff0f;overflow:hidden;display:flex;align-items:center;justify-content:center}.cell::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,#fff1,transparent 40%);pointer-events:none}.cell.next{outline:3px solid #ffd34e;box-shadow:0 0 20px #ffd34e99;animation:pulse 1s infinite}.cell.path{background:#9c7b57}.road{position:absolute;background:#ddd0b8;z-index:1}.road.h{left:0;right:0;height:30%;top:35%}.road.v{top:0;bottom:0;width:30%;left:35%}.road.dot{width:34%;height:34%;border-radius:50%;left:33%;top:33%}.actor,.icon{position:relative;z-index:4;font-size:clamp(22px,7vw,34px);filter:drop-shadow(0 4px 3px #0008)}.actor{transition:transform .25s}.goal{font-size:clamp(24px,8vw,38px)}.coin{animation:float 1.2s infinite alternate}.spike{font-size:clamp(20px,6vw,31px)}.cardsTitle{text-align:center;font-size:13px;opacity:.75;margin:10px 0 7px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:0 14px}.card{border:0;border-radius:18px;padding:10px 5px;background:linear-gradient(#f9e6b9,#bd8d49);box-shadow:0 6px 0 #79552e;color:#39230e;font-weight:1000;min-height:78px}.card:active{transform:translateY(4px);box-shadow:0 2px 0 #79552e}.card .arrow{display:block;font-size:33px;line-height:1}.card small{display:block;font-weight:800;margin-top:5px}.bottom{position:absolute;left:14px;right:14px;bottom:max(12px,env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:1px solid #ffffff24;border-radius:15px;background:#ffffff10;color:#fff;font-weight:900;padding:11px}.btn.primary{background:linear-gradient(#4e8cff,#315dd6);border:0}.toast{position:absolute;left:50%;top:86px;transform:translateX(-50%);padding:9px 14px;border-radius:20px;background:#02060ddd;border:1px solid #ffffff24;font-weight:900;opacity:0;transition:.2s;z-index:20;white-space:nowrap}.toast.show{opacity:1}.overlay{position:absolute;inset:0;background:#02060de6;display:none;align-items:center;justify-content:center;padding:22px;z-index:30}.overlay.show{display:flex}.modal{width:100%;border-radius:25px;padding:24px;text-align:center;background:linear-gradient(#172a45,#0d1728);border:1px solid #ffffff2a;box-shadow:0 20px 60px #000}.modal h2{font-size:30px;margin:0 0 8px}.modal .big{font-size:54px;margin:12px}.modal p{line-height:1.6;opacity:.78}.modal button{width:100%;margin-top:10px;border:0;border-radius:16px;padding:13px;font-weight:1000;font-size:17px;background:linear-gradient(#ffd65b,#e59c22);color:#3c2509}@keyframes pulse{50%{box-shadow:0 0 30px #ffd34ecc}}@keyframes float{to{transform:translateY(-5px)}}@media(max-height:760px){.top{height:61px}.mission{margin-bottom:6px;padding:7px}.board{height:55vh;width:auto}.cardsTitle{margin:6px 0 4px}.card{min-height:64px;padding:7px}.card .arrow{font-size:26px}.bottom{display:none}}</style></head><body><main id="app"><header class="top"><div><div class="brand">疊路逃生</div><div class="sub">三選一放路，角色立刻前進</div></div><div class="stats"><div class="pill">🪙 <span id="coins">0</span></div><div class="pill">步 <span id="steps">0</span></div></div></header><div class="mission">抵達出口並至少收集 <b>2 枚金幣</b></div><section id="board" class="board"></section><div class="cardsTitle">選一塊道路決定下一步</div><section id="cards" class="cards"></section><div class="bottom"><button class="btn" id="restart">重新開始</button><button class="btn primary" id="hint">提示下一步</button></div><div id="toast" class="toast"></div><div id="overlay" class="overlay"><div id="modal" class="modal"></div></div></main><script>const R=7,C=5;const board=document.querySelector('#board'),cards=document.querySelector('#cards'),toastEl=document.querySelector('#toast'),overlay=document.querySelector('#overlay'),modal=document.querySelector('#modal');const dirs=[[-1,0],[0,1],[1,0],[0,-1]],names=['上','右','下','左'],arrows=['↑','→','↓','←'];let row,col,dir,coins,steps,ended,paths;const goal=[1,4],coinMap=new Set(['4,1','2,3','1,3']),spikes=new Set(['5,1','4,2','3,0','2,2','0,3','3,4']);const solution=['S','L','S','R','S','L','R'];function key(r,c){return r+','+c}function relative(type){if(type==='S')return dir;if(type==='L')return(dir+3)%4;return(dir+1)%4}function showToast(t){toastEl.textContent=t;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),1000)}function reset(){row=5;col=0;dir=1;coins=0;steps=0;ended=false;paths=new Map([[key(row,col),{from:3,to:1}]]);overlay.classList.remove('show');render()}function drawRoad(cell,p){cell.classList.add('path');const a=p.from,b=p.to;const road=(cls)=>{let x=document.createElement('i');x.className='road '+cls;cell.appendChild(x)};if((a===1&&b===3)||(a===3&&b===1))road('h');else if((a===0&&b===2)||(a===2&&b===0))road('v');else{road('dot');[a,b].forEach(d=>{let x=document.createElement('i');x.className='road';if(d===0)Object.assign(x.style,{width:'30%',height:'50%',left:'35%',top:'0'});if(d===2)Object.assign(x.style,{width:'30%',height:'50%',left:'35%',bottom:'0'});if(d===3)Object.assign(x.style,{height:'30%',width:'50%',left:'0',top:'35%'});if(d===1)Object.assign(x.style,{height:'30%',width:'50%',right:'0',top:'35%'});cell.appendChild(x)})}}function render(){board.innerHTML='';for(let r=0;r<R;r++)for(let c=0;c<C;c++){let cell=document.createElement('div');cell.className='cell';cell.dataset.k=key(r,c);let p=paths.get(key(r,c));if(p)drawRoad(cell,p);if(r===goal[0]&&c===goal[1])cell.innerHTML+='<span class="icon goal">🚪</span>';else if(spikes.has(key(r,c)))cell.innerHTML+='<span class="icon spike">🔺</span>';else if(coinMap.has(key(r,c)))cell.innerHTML+='<span class="icon coin">🪙</span>';if(r===row&&c===col)cell.innerHTML+='<span class="actor">🧍</span>';board.appendChild(cell)}let nr=row+dirs[dir][0],nc=col+dirs[dir][1],next=board.querySelector(`[data-k="${key(nr,nc)}"]`);if(next&&!ended)next.classList.add('next');document.querySelector('#coins').textContent=coins;document.querySelector('#steps').textContent=steps;makeCards()}function makeCards(){if(ended)return;const correct=solution[Math.min(steps,solution.length-1)]||'S';let opts=[correct,...['S','L','R'].filter(x=>x!==correct)];opts.sort(()=>Math.random()-.5);cards.innerHTML=opts.map(t=>{let d=relative(t),label=t==='S'?'直走':t==='L'?'左轉':'右轉';return `<button class="card" data-t="${t}"><span class="arrow">${arrows[d]}</span><small>${label}</small></button>`}).join('');cards.querySelectorAll('.card').forEach(b=>b.onclick=()=>choose(b.dataset.t))}function choose(type){if(ended)return;let oldDir=dir,newDir=relative(type),nr=row+dirs[newDir][0],nc=col+dirs[newDir][1];steps++;paths.set(key(row,col),{from:(oldDir+2)%4,to:newDir});dir=newDir;if(nr<0||nr>=R||nc<0||nc>=C){ended=true;render();return finish(false,'掉出地圖了！')}row=nr;col=nc;if(navigator.vibrate)navigator.vibrate(25);if(coinMap.has(key(row,col))){coinMap.delete(key(row,col));coins++;showToast('獲得金幣！')}if(spikes.has(key(row,col))){ended=true;render();return finish(false,'踩到尖刺！')}if(row===goal[0]&&col===goal[1]){ended=true;render();return coins>=2?finish(true,'成功抵達出口！'):finish(false,'金幣不足，還差 '+(2-coins)+' 枚')}if(steps>=10){ended=true;render();return finish(false,'道路用完了！')}render()}function finish(win,msg){modal.innerHTML=`<h2>${win?'逃生成功！':'挑戰失敗'}</h2><div class="big">${win?'🏆':'💥'}</div><p>${msg}<br>共走 ${steps} 步，收集 ${coins} 枚金幣。</p><button onclick="reset()">${win?'再玩一次':'重新挑戰'}</button>`;overlay.classList.add('show')}document.querySelector('#restart').onclick=reset;document.querySelector('#hint').onclick=()=>{let t=solution[Math.min(steps,solution.length-1)];showToast('建議選：'+(t==='S'?'直走':t==='L'?'左轉':'右轉'))};reset();</script></body></html>

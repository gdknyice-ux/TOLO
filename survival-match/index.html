<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>生存消消樂</title><style>*{box-sizing:border-box}body{margin:0;background:#152215;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;justify-content:center}.app{width:min(100vw,480px);min-height:100vh;background:linear-gradient(#29472b,#111a12);padding:10px}.top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.pill{background:#0009;border:1px solid #ffffff25;border-radius:14px;padding:8px;text-align:center}.day{font-size:22px;font-weight:800}.timer{font-size:22px;color:#ffd75a;font-weight:900}.bars{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}.bar{font-size:13px}.scene{margin:8px 0;padding:10px;border-radius:16px;background:linear-gradient(135deg,#7fbf4d,#3d6c32);position:relative;overflow:hidden}.scene.night{background:linear-gradient(135deg,#172342,#0a0f1c)}.base{font-size:44px}.enemy{position:absolute;right:10px;bottom:8px;font-size:36px}.status{font-size:13px}.guide{background:#fff3b0;color:#3b2a00;border-radius:12px;padding:8px 10px;margin-bottom:7px;font-size:13px;font-weight:800;text-align:center}.board{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:#0c0f0ccc;padding:7px;border-radius:16px;touch-action:none}.tile{aspect-ratio:1;border:0;border-radius:10px;font-size:25px;background:linear-gradient(#ffffff18,#0004);display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px #fff2}.tile.sel{outline:3px solid #ffd75a;transform:scale(.92)}.tile.hint{animation:hint 1s infinite;outline:3px solid #53ff8a}@keyframes hint{50%{transform:scale(.82);filter:brightness(1.5)}}.resources,.builds{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}.res,.build{background:#0008;border:1px solid #ffffff22;border-radius:12px;padding:7px;text-align:center;font-size:13px}.build button,.actions button{width:100%;border:0;border-radius:10px;padding:9px 4px;font-weight:800;background:#f0b52d;color:#2a1900}.build button:disabled{filter:grayscale(1);opacity:.45}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px}.actions button.alt{background:#5ca7ff;color:white}.actions button.hintBtn{background:#65d17d;color:#102f17}.log{height:42px;overflow:hidden;margin-top:7px;padding:7px;border-radius:10px;background:#0007;font-size:13px}.overlay{position:fixed;inset:0;background:#000d;display:none;align-items:center;justify-content:center;padding:24px}.card{width:min(90vw,380px);background:#222;border-radius:18px;padding:22px;text-align:center}.card h2{font-size:30px}.card button{border:0;border-radius:12px;padding:12px 20px;background:#ffd34d;font-weight:900}</style></head><body><main class="app"><div class="top"><div class="pill"><div>生存</div><div class="day" id="day">第 1 天</div></div><div class="pill"><div id="phase">白天採集</div><div class="timer" id="timer">03:00</div></div><div class="pill"><div>基地生命</div><div class="day" id="hp">120</div></div></div><div class="bars"><div class="pill bar">🍗 飢餓 <b id="foodBar">90</b></div><div class="pill bar">💧 水分 <b id="waterBar">90</b></div><div class="pill bar">🧟 威脅 <b id="threat">2</b></div></div><section class="scene" id="scene"><div class="base">🏕️</div><div class="status" id="status">先消木材，建造第一座箭塔。</div><div class="enemy" id="enemy">🌴</div></section><div class="guide" id="guide">教學：先點一個圖示，再點旁邊圖示交換。綠色閃爍就是可消除提示。</div><div class="board" id="board"></div><div class="resources"><div class="res">🪵 木材<br><b id="wood">15</b></div><div class="res">🪨 石材<br><b id="stone">10</b></div><div class="res">🥫 食物<br><b id="food">10</b></div></div><div class="builds"><div class="build">🏹 箭塔 Lv.<b id="arrowLv">0</b><br><button id="arrowBtn">建造 20🪵</button></div><div class="build">🔥 火塔 Lv.<b id="fireLv">0</b><br><button id="fireBtn">建造 30🪵15🪨</button></div><div class="build">🧱 城牆 Lv.<b id="wallLv">0</b><br><button id="wallBtn">建造 15🪵10🪨</button></div></div><div class="actions"><button class="hintBtn" id="hintBtn">💡 提示</button><button class="alt" id="shuffle">免費洗牌</button><button id="nightBtn">直接入夜</button></div><div class="log" id="log">找不到步驟時，按「提示」。</div></main><div class="overlay" id="overlay"><div class="card"><h2>基地淪陷</h2><p id="result"></p><button onclick="location.reload()">重新挑戰</button></div></div><script>const icons=['🪵','🪨','🥫','💧','🍃','⚡'],N=7;let grid=[],selected=null,hints=[],day=1,phase='day',time=180,hp=120,wood=15,stone=10,food=10,hunger=90,water=90,arrow=0,fire=0,wall=0,nightTick=0,nightEnemies=0,timerId;const $=x=>document.getElementById(x),rnd=()=>icons[Math.floor(Math.random()*icons.length)];function init(){do{grid=Array.from({length:N*N},rnd)}while(findMatches().size||!findMove());render();showHint();timerId=setInterval(tick,1000);ui()}function render(){let b=$('board');b.innerHTML='';grid.forEach((v,i)=>{let x=document.createElement('button');x.className='tile'+(selected===i?' sel':'')+(hints.includes(i)?' hint':'');x.textContent=v;x.onclick=()=>tap(i);b.appendChild(x)})}function adj(a,b){return Math.abs(a-b)===1&&Math.floor(a/N)===Math.floor(b/N)||Math.abs(a-b)===N}async function tap(i){if(phase!=='day')return;hints=[];if(selected===null){selected=i;render();return}if(!adj(selected,i)){selected=i;render();return}swap(selected,i);let m=findMatches();if(!m.size){swap(selected,i);selected=null;render();log('這一步不能消除，看看綠色提示');setTimeout(showHint,400);return}selected=null;await resolve(m)}function swap(a,b){[grid[a],grid[b]]=[grid[b],grid[a]]}function findMatches(){let s=new Set;for(let r=0;r<N;r++){let run=1;for(let c=1;c<=N;c++){let i=r*N+c,p=r*N+c-1;if(c<N&&grid[i]===grid[p])run++;else{if(run>=3)for(let k=0;k<run;k++)s.add(p-k);run=1}}}for(let c=0;c<N;c++){let run=1;for(let r=1;r<=N;r++){let i=r*N+c,p=(r-1)*N+c;if(r<N&&grid[i]===grid[p])run++;else{if(run>=3)for(let k=0;k<run;k++)s.add(p-k*N);run=1}}}return s}function findMove(){for(let i=0;i<grid.length;i++){for(let j of [i+1,i+N])if(j<grid.length&&adj(i,j)){swap(i,j);let ok=findMatches().size;swap(i,j);if(ok)return[i,j]}}return null}function showHint(){if(phase!=='day')return;let m=findMove();if(!m){shuffleBoard();m=findMove()}hints=m||[];render();log('綠色閃爍的兩格互換就能消除')}async function resolve(m){let chain=0;while(m.size){chain++;let gain={};m.forEach(i=>gain[grid[i]]=(gain[grid[i]]||0)+1);wood+=(gain['🪵']||0)*3;stone+=(gain['🪨']||0)*3;food+=(gain['🥫']||0)*2;water=Math.min(100,water+(gain['💧']||0)*4);hunger=Math.min(100,hunger+(gain['🍃']||0)*3);m.forEach(i=>grid[i]=null);render();await wait(120);collapse();render();await wait(120);m=findMatches()}log(`成功！連鎖 x${chain}，資源增加`);ui();setTimeout(showHint,650)}function collapse(){for(let c=0;c<N;c++){let a=[];for(let r=N-1;r>=0;r--){let v=grid[r*N+c];if(v)a.push(v)}for(let r=N-1,k=0;r>=0;r--,k++)grid[r*N+c]=k<a.length?a[k]:rnd()}}function wait(ms){return new Promise(r=>setTimeout(r,ms))}function tick(){if(phase==='day'){time--;if(time%30===0){hunger=Math.max(0,hunger-1);water=Math.max(0,water-1)}if(time<=0)startNight()}else{time--;nightTick++;if(nightTick%3===0)combatTick();if(time<=0||nightEnemies<=0)endNight()}ui()}function startNight(){phase='night';hints=[];time=25+day*2;nightTick=0;nightEnemies=2+day*2;$('scene').classList.add('night');$('phase').textContent='夜晚防守';$('enemy').textContent='🧟';$('status').textContent='防禦塔正在自動攻擊';log(`第 ${day} 夜：${nightEnemies} 隻怪物`);render()}function combatTick(){let attack=arrow*5+fire*9,k=Math.max(attack>0?1:0,Math.floor(attack/(4+day)));nightEnemies=Math.max(0,nightEnemies-k);let damage=Math.max(0,1+Math.floor(day/2)-wall*2-Math.floor(attack/12));hp-=damage;if(hp<=0)gameOver()}function endNight(){if(hp<=0)return;phase='day';day++;time=180;hunger=Math.max(0,hunger-4);water=Math.max(0,water-4);$('scene').classList.remove('night');$('phase').textContent='白天採集';$('enemy').textContent='🌴';$('status').textContent='新的一天，先看提示收集資源';log(`撐過第 ${day-1} 夜！`);ui();setTimeout(showHint,500)}function buy(t){if(t==='arrow'&&wood>=20){wood-=20;arrow++;log('箭塔完成，夜晚會自動射擊')}else if(t==='fire'&&wood>=30&&stone>=15){wood-=30;stone-=15;fire++;log('火塔完成，攻擊力大幅提升')}else if(t==='wall'&&wood>=15&&stone>=10){wood-=15;stone-=10;wall++;hp=Math.min(120,hp+15);log('城牆完成，基地已修復')}ui()}function shuffleBoard(){do{grid=Array.from({length:N*N},rnd)}while(findMatches().size||!findMove());hints=[];selected=null;render();log('棋盤已重新洗牌')}function ui(){$('day').textContent=`第 ${day} 天`;$('timer').textContent=`${String(Math.floor(time/60)).padStart(2,'0')}:${String(time%60).padStart(2,'0')}`;$('hp').textContent=Math.max(0,hp);$('wood').textContent=wood;$('stone').textContent=stone;$('food').textContent=food;$('foodBar').textContent=hunger;$('waterBar').textContent=water;$('threat').textContent=phase==='night'?nightEnemies:2+day*2;$('arrowLv').textContent=arrow;$('fireLv').textContent=fire;$('wallLv').textContent=wall;$('arrowBtn').disabled=phase!=='day'||wood<20;$('fireBtn').disabled=phase!=='day'||wood<30||stone<15;$('wallBtn').disabled=phase!=='day'||wood<15||stone<10;$('nightBtn').disabled=phase!=='day'}function log(t){$('log').textContent=t}function gameOver(){clearInterval(timerId);$('overlay').style.display='flex';$('result').textContent=`你生存了 ${day} 天，箭塔 Lv.${arrow}、火塔 Lv.${fire}、城牆 Lv.${wall}`}$('arrowBtn').onclick=()=>buy('arrow');$('fireBtn').onclick=()=>buy('fire');$('wallBtn').onclick=()=>buy('wall');$('nightBtn').onclick=startNight;$('shuffle').onclick=shuffleBoard;$('hintBtn').onclick=showHint;init();</script></body></html>

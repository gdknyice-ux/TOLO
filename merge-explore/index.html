<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>遺跡合成探險</title><style>:root{--green:#315b35;--cream:#f4dfb2;--brown:#8a5b2c;--dark:#102014;--gold:#f4bd43}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#0d1b10;color:#fff;font-family:Arial,"Microsoft JhengHei",sans-serif;display:flex;justify-content:center}button{font:inherit}.app{width:min(100vw,520px);min-height:100vh;background:linear-gradient(#3e6a3c,#162718);padding:10px 10px 82px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.stat{background:#08120acc;border:1px solid #ffffff20;border-radius:12px;text-align:center;padding:7px;font-size:12px}.stat b{display:block;font-size:19px}.hero{margin:8px 0;background:linear-gradient(135deg,#75a64b,#2d532f);border-radius:17px;padding:13px;position:relative;overflow:hidden;border:1px solid #ffffff20}.hero h1{margin:0 0 4px;font-size:24px}.hero p{margin:0;font-size:13px}.hero .art{position:absolute;right:13px;bottom:-2px;font-size:56px}.panel{background:var(--cream);border:3px solid var(--brown);border-radius:17px;padding:10px;color:#342516;box-shadow:0 5px 0 #0003}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}.tabs button{border:0;border-radius:10px;padding:10px;font-weight:900;background:#c99750;color:#432d15}.tabs button.on{background:#3f773e;color:white}.view{display:none}.view.on{display:block}.guide{background:#fff2a8;border-radius:10px;padding:8px;font-size:13px;font-weight:800;margin-bottom:8px}.board{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}.cell{aspect-ratio:1;border:2px solid #9d7446;border-radius:11px;background:linear-gradient(#e5ca96,#cfac72);position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}.cell.empty:after{content:"";width:35%;height:35%;border:2px dashed #9e794d66;border-radius:8px}.cell.sel{outline:4px solid #ffe35d;transform:scale(.93)}.cell.hint{animation:pulse .8s infinite;outline:4px solid #4eee77}.itemIcon{font-size:30px;line-height:1}.lvl{position:absolute;right:3px;bottom:2px;background:#111d;color:white;padding:1px 4px;border-radius:8px;font-size:10px}.kind{position:absolute;left:3px;top:2px;font-size:9px;background:#fff8;padding:1px 3px;border-radius:5px}@keyframes pulse{50%{transform:scale(.84);filter:brightness(1.25)}}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}.actions button,.bigBtn,.modal button,.task button{border:0;border-radius:10px;padding:10px 6px;font-weight:900;background:var(--gold);color:#402800}.actions .green{background:#55a75d;color:white}.actions .blue{background:#4f91dc;color:white}.actions button:disabled{opacity:.45;filter:grayscale(1)}.infoRow{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}.box{background:#6d4b2d;color:#fff;border-radius:10px;padding:8px;font-size:12px}.box b{font-size:16px}.mapWrap{background:linear-gradient(#acd77e,#649c54);border-radius:14px;padding:12px;min-height:420px}.path{display:flex;flex-direction:column;align-items:center}.node{width:78px;height:78px;border-radius:50%;border:5px solid #efd27b;background:#547b3f;color:#fff;font-weight:900;font-size:22px}.node.lock{filter:grayscale(1);opacity:.5}.node.done{background:#2d9b50}.node.boss{background:#8d3838}.line{height:26px;border-left:5px dotted #fff0b3}.stageName{font-size:12px;margin-top:3px;text-align:center}.powerCard{margin-top:10px;background:#112014dd;color:white;border-radius:12px;padding:10px}.bar{height:13px;background:#3b2c28;border-radius:20px;overflow:hidden}.fill{height:100%;background:#59c968}.fill.red{background:#df5f56}.tasks{display:grid;gap:8px}.task{background:#fff8e2;border-radius:12px;padding:10px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.task small{display:block;color:#725b3e;margin-top:3px}.task button{background:#4e863b;color:#fff}.task button:disabled{opacity:.45}.log{margin-top:8px;background:#061009dd;border-radius:10px;padding:9px;min-height:42px;font-size:13px}.nav{position:fixed;bottom:0;width:min(100vw,520px);display:grid;grid-template-columns:repeat(3,1fr);background:#142217;border-top:1px solid #ffffff22;padding:7px;z-index:4}.nav button{border:0;background:none;color:#b8c1b9;padding:7px;font-weight:900}.nav button.on{color:#ffe568}.overlay{position:fixed;inset:0;background:#000d;display:none;align-items:center;justify-content:center;padding:20px;z-index:10}.modal{width:min(92vw,390px);background:#f4dfb5;color:#342414;border:4px solid #8a5b2d;border-radius:20px;padding:18px;text-align:center}.modal h2{margin:0 0 8px}.modal .big{font-size:58px;margin:8px}.modal .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.modal .secondary{background:#816b54;color:#fff}.ad{height:120px;background:linear-gradient(135deg,#343434,#686868);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:10px 0;font-weight:900}.toast{position:fixed;top:15px;left:50%;transform:translateX(-50%);background:#111e;color:#fff;padding:10px 14px;border-radius:10px;z-index:20;display:none}</style></head><body><div class="toast" id="toast"></div><main class="app"><div class="stats"><div class="stat">等級<b id="level">1</b></div><div class="stat">⚡ 體力<b id="energy">15</b></div><div class="stat">🪙 金幣<b id="coins">100</b></div><div class="stat">💡 提示<b id="hints">3</b></div></div><section class="hero"><h1>遺跡合成探險</h1><p>合成工具、探索森林、擊敗守衛、解鎖寶藏。</p><div class="art">🧭</div></section><section class="panel"><div class="tabs"><button class="on" data-view="merge">合成</button><button data-view="map">探索</button><button data-view="tasks">任務</button></div><div id="merge" class="view on"><div class="guide">操作：點一個物品，再點另一格。相同等級會合成，不同物品會交換。</div><div id="board" class="board"></div><div class="actions"><button class="green" id="spawnBtn">取得物資<br>-1 體力</button><button class="blue" id="hintBtn">提示<br>免費 3 次</button><button id="sortBtn">整理棋盤</button></div><div class="infoRow"><div class="box">目前戰力<br><b id="power">0</b></div><div class="box">下一目標<br><b id="goal">製作 Lv.2 工具</b></div></div></div><div id="map" class="view"><div class="mapWrap"><div id="path" class="path"></div><div class="powerCard">戰力：<b id="power2">0</b><div class="bar"><div id="powerBar" class="fill" style="width:10%"></div></div><div style="margin-top:7px;font-size:12px">探索消耗 2 體力。戰力越高，戰鬥越容易。</div></div></div></div><div id="tasks" class="view"><div id="taskList" class="tasks"></div></div></section><div class="log" id="log">先取得物資，再合成兩個相同物品。</div></main><nav class="nav"><button class="on" data-view="merge">🧰<br>合成</button><button data-view="map">🗺️<br>探索</button><button data-view="tasks">📜<br>任務</button></nav><div class="overlay" id="overlay"><div class="modal" id="modal"></div></div><script>(()=>{'use strict';const $=id=>document.getElementById(id);const STORAGE='mergeExploreV3';const chains={wood:[['🪵','木材'],['🪚','木工鋸'],['🛠️','工具組'],['⚔️','遺跡劍']],stone:[['🪨','石塊'],['⛏️','鐵鎬'],['🔨','戰鎚'],['🛡️','守護盾']],herb:[['🍃','藥草'],['🌿','草藥束'],['🧪','藥劑'],['💖','生命核心']],key:[['🔑','舊鑰匙'],['🗝️','銀鑰匙'],['🔐','封印鑰匙'],['👑','王者寶物']]};const kinds=Object.keys(chains);const stages=[{name:'森林入口',enemy:'史萊姆',icon:'🟢',hp:24,power:4,reward:40},{name:'石橋守衛',enemy:'灰狼',icon:'🐺',hp:40,power:7,reward:65},{name:'古樹迷宮',enemy:'哥布林',icon:'👺',hp:62,power:11,reward:90},{name:'礦坑深處',enemy:'洞穴怪',icon:'🦇',hp:88,power:15,reward:125},{name:'遺跡大門',enemy:'遺跡守衛',icon:'🐲',hp:130,power:21,reward:200}];const taskDefs=[{id:'merge3',text:'完成 3 次合成',key:'merges',goal:3,reward:50},{id:'kill2',text:'擊敗 2 隻怪物',key:'kills',goal:2,reward:80},{id:'clear3',text:'通過 3 個探索關卡',key:'cleared',goal:3,reward:120}];const defaultState=()=>({level:1,xp:0,energy:15,coins:100,hints:3,selected:null,board:Array(30).fill(null),unlocked:1,cleared:0,merges:0,kills:0,claimed:{}});let state=load();function load(){try{const s=JSON.parse(localStorage.getItem(STORAGE));if(s&&Array.isArray(s.board)&&s.board.length===30)return Object.assign(defaultState(),s,{selected:null});}catch(e){}return defaultState()}function save(){localStorage.setItem(STORAGE,JSON.stringify({...state,selected:null}))}function randomBase(){return{type:kinds[Math.floor(Math.random()*kinds.length)],lv:0}}function seed(){if(state.board.every(x=>!x)){const starter=[{type:'wood',lv:0},{type:'wood',lv:0},{type:'stone',lv:0},{type:'stone',lv:0},{type:'herb',lv:0},{type:'key',lv:0}];starter.forEach((x,i)=>state.board[i]=x);save()}}function toast(t){const el=$('toast');el.textContent=t;el.style.display='block';clearTimeout(toast.t);toast.t=setTimeout(()=>el.style.display='none',1600)}function log(t){$('log').textContent=t}function itemPower(it){if(!it)return 0;const base=it.type==='herb'?1:2;return base*(it.lv+1)*(it.lv+1)}function power(){return state.board.reduce((a,it)=>a+itemPower(it),0)}function levelUp(){while(state.xp>=state.level*40){state.xp-=state.level*40;state.level++;state.energy+=3;toast(`升到 Lv.${state.level}，體力 +3`)}}function render(){renderStats();renderBoard();renderMap();renderTasks();save()}function renderStats(){const p=power();$('level').textContent=state.level;$('energy').textContent=state.energy;$('coins').textContent=state.coins;$('hints').textContent=state.hints;$('power').textContent=p;$('power2').textContent=p;$('powerBar').style.width=Math.min(100,p*3)+'%';const max=state.board.reduce((m,it)=>it?Math.max(m,it.lv):m,0);$('goal').textContent=max<1?'製作 Lv.2 工具':state.cleared<1?'前往探索第 1 關':'持續合成與探索';$('hintBtn').innerHTML=state.hints>0?`提示<br>剩 ${state.hints} 次`:'看廣告<br>補 1 次'}function renderBoard(){const b=$('board');b.innerHTML='';state.board.forEach((it,i)=>{const c=document.createElement('button');c.className='cell '+(!it?'empty':'')+(state.selected===i?' sel':'');c.dataset.i=i;c.draggable=!!it;if(it){const [icon,name]=chains[it.type][it.lv];c.innerHTML=`<span class="kind">${name}</span><span class="itemIcon">${icon}</span><span class="lvl">Lv.${it.lv+1}</span>`}c.onclick=()=>selectCell(i);c.ondragstart=e=>{e.dataTransfer.setData('text/plain',String(i));state.selected=i};c.ondragover=e=>e.preventDefault();c.ondrop=e=>{e.preventDefault();const from=Number(e.dataTransfer.getData('text/plain'));moveOrMerge(from,i)};b.appendChild(c)})}function selectCell(i){if(state.selected===null){if(!state.board[i])return;state.selected=i;renderBoard();log('已選取物品，請點另一格')}else{const from=state.selected;state.selected=null;moveOrMerge(from,i)}}function moveOrMerge(from,to){if(from===to){renderBoard();return}const a=state.board[from],b=state.board[to];if(!a){renderBoard();return}if(!b){state.board[to]=a;state.board[from]=null;log('物品已移動')}else if(a.type===b.type&&a.lv===b.lv&&a.lv<3){state.board[to]={type:a.type,lv:a.lv+1};state.board[from]=null;state.merges++;state.xp+=10;levelUp();const name=chains[a.type][a.lv+1][1];log(`合成成功：${name}`);toast('合成成功！')}else{state.board[from]=b;state.board[to]=a;log('兩個物品已交換位置')}state.selected=null;render()}function spawn(){if(state.energy<1){showAd('體力不足','觀看模擬廣告後獲得 5 點體力',()=>{state.energy+=5;render();log('體力 +5')});return}const idx=state.board.findIndex(x=>!x);if(idx<0){toast('棋盤已滿');log('棋盤已滿，請先合成或移動物品');return}state.energy--;state.board[idx]=randomBase();render();log('取得一份新物資')}function findPair(){for(let i=0;i<state.board.length;i++){const a=state.board[i];if(!a||a.lv>=3)continue;for(let j=i+1;j<state.board.length;j++){const b=state.board[j];if(b&&a.type===b.type&&a.lv===b.lv)return[i,j]}}return null}function hint(){if(state.hints<=0){showAd('提示已用完','觀看模擬廣告後獲得 1 次提示',()=>{state.hints++;render();log('已補充 1 次提示')});return}const pair=findPair();if(!pair){toast('目前沒有可合成物品');log('先取得更多物資，才會出現可合成組合');return}state.hints--;renderStats();const cells=[...document.querySelectorAll('.cell')];pair.forEach(i=>cells[i].classList.add('hint'));log('綠色閃爍的兩格可以合成');setTimeout(()=>pair.forEach(i=>cells[i]?.classList.remove('hint')),2600);save()}function sortBoard(){state.board=state.board.filter(Boolean).sort((a,b)=>a.type.localeCompare(b.type)||a.lv-b.lv);while(state.board.length<30)state.board.push(null);state.selected=null;render();log('棋盤整理完成')}function renderMap(){const p=$('path');p.innerHTML='';stages.forEach((s,i)=>{if(i){const line=document.createElement('div');line.className='line';p.appendChild(line)}const wrap=document.createElement('div');wrap.style.textAlign='center';const btn=document.createElement('button');btn.className='node '+(i+1>state.unlocked?'lock ':'')+(i<state.cleared?'done ':'')+(i===stages.length-1?'boss':'');btn.disabled=i+1>state.unlocked;btn.textContent=i<state.cleared?'✓':String(i+1);btn.onclick=()=>startStage(i);const name=document.createElement('div');name.className='stageName';name.textContent=s.name;wrap.append(btn,name);p.appendChild(wrap)})}function startStage(i){const s=stages[i];if(state.energy<2){showAd('體力不足','觀看模擬廣告後獲得 5 點體力',()=>{state.energy+=5;render()});return}state.energy-=2;save();battle(i,75+state.level*8,s.hp)}function battle(i,playerHP,enemyHP){const s=stages[i],p=power();showModal(`<h2>${s.name}</h2><div class="big">🧭 ⚔️ ${s.icon}</div><p>你的戰力 ${p}｜${s.enemy}戰力 ${s.power}</p><div>玩家生命 ${Math.max(0,playerHP)}</div><div class="bar"><div class="fill" style="width:${Math.min(100,playerHP)}%"></div></div><div style="margin-top:8px">敵人生命 ${Math.max(0,enemyHP)}</div><div class="bar"><div class="fill red" style="width:${Math.max(0,enemyHP/s.hp*100)}%"></div></div><button id="attack" class="bigBtn" style="width:100%;margin-top:12px">攻擊</button>`);$('attack').onclick=()=>{const dmg=Math.max(4,Math.floor(p*.7)+Math.floor(Math.random()*6));const hurt=Math.max(1,s.power-Math.floor(p/7));enemyHP-=dmg;playerHP-=hurt;if(enemyHP<=0)return win(i);if(playerHP<=0)return lose(i);battle(i,playerHP,enemyHP)}}function win(i){const s=stages[i];state.kills++;state.cleared=Math.max(state.cleared,i+1);state.unlocked=Math.min(stages.length,state.cleared+1);state.coins+=s.reward;state.xp+=20;const empty=state.board.findIndex(x=>!x);if(empty>=0)state.board[empty]={type:i>=3?'key':kinds[i%kinds.length],lv:Math.min(2,Math.floor(i/2))};levelUp();render();showModal(`<h2>探索成功</h2><div class="big">🎁</div><p>獲得 ${s.reward} 金幣與探索物品。</p><div class="row"><button id="double">看廣告 ×2</button><button id="close" class="secondary">領取</button></div>`);$('double').onclick=()=>showAd('獎勵加倍','模擬廣告播放完成',()=>{state.coins+=s.reward;render();closeModal();log('獎勵已加倍')});$('close').onclick=()=>{closeModal();log(`通過 ${s.name}`)}}function lose(i){showModal(`<h2>探索失敗</h2><div class="big">💔</div><p>提升工具等級後會更容易通過。</p><div class="row"><button id="revive">看廣告復活</button><button id="close" class="secondary">返回</button></div>`);$('revive').onclick=()=>showAd('復活','模擬廣告播放完成',()=>battle(i,55,Math.ceil(stages[i].hp*.45)));$('close').onclick=()=>{closeModal();render()}}function renderTasks(){const box=$('taskList');box.innerHTML='';taskDefs.forEach(t=>{const val=state[t.key]||0,done=val>=t.goal,claimed=state.claimed[t.id];const d=document.createElement('div');d.className='task';d.innerHTML=`<div><b>${t.text}</b><small>${Math.min(val,t.goal)}/${t.goal}｜獎勵 ${t.reward} 金幣</small></div><button ${!done||claimed?'disabled':''}>${claimed?'已領取':'領取'}</button>`;d.querySelector('button').onclick=()=>{state.claimed[t.id]=true;state.coins+=t.reward;render();toast('任務獎勵已領取')};box.appendChild(d)})}function showModal(html){$('modal').innerHTML=html;$('overlay').style.display='flex'}function closeModal(){$('overlay').style.display='none'}function showAd(title,text,reward){showModal(`<h2>${title}</h2><div class="ad">📺 模擬獎勵廣告</div><p>${text}</p><div class="row"><button id="watch">觀看廣告</button><button id="cancel" class="secondary">取消</button></div>`);$('cancel').onclick=closeModal;$('watch').onclick=()=>{let n=3;$('watch').disabled=true;$('watch').textContent=`廣告 ${n} 秒`;const timer=setInterval(()=>{n--;$('watch').textContent=n>0?`廣告 ${n} 秒`:'領取獎勵';if(n<=0){clearInterval(timer);$('watch').disabled=false;$('watch').onclick=()=>{reward();closeModal()}}},700)}}function switchView(v){document.querySelectorAll('.view').forEach(x=>x.classList.toggle('on',x.id===v));document.querySelectorAll('[data-view]').forEach(x=>x.classList.toggle('on',x.dataset.view===v));if(v==='map')renderMap();if(v==='tasks')renderTasks()}document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>switchView(b.dataset.view));$('spawnBtn').onclick=spawn;$('hintBtn').onclick=hint;$('sortBtn').onclick=sortBoard;$('overlay').onclick=e=>{if(e.target===$('overlay'))closeModal()};seed();render();})();</script></body></html>

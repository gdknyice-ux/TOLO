<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>遺跡合成探險</title><style>*{box-sizing:border-box}body{margin:0;background:#172417;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;justify-content:center}.app{width:min(100vw,480px);min-height:100vh;background:linear-gradient(#325a32,#162416);padding:10px 10px 78px}.top{display:grid;grid-template-columns:1.2fr repeat(3,1fr);gap:6px}.pill{background:#0009;border:1px solid #ffffff25;border-radius:13px;padding:7px;text-align:center;font-size:12px}.pill b{display:block;font-size:18px}.hero{background:linear-gradient(135deg,#729a43,#365d2d);border-radius:17px;padding:12px;margin:8px 0;position:relative;overflow:hidden}.hero h1{font-size:24px;margin:0 0 4px}.hero p{font-size:13px;margin:0;opacity:.9}.hero .char{position:absolute;right:12px;bottom:-5px;font-size:64px}.panel{background:#f2dfb9;color:#332617;border:3px solid #9a6b35;border-radius:17px;padding:10px}.tabs{display:flex;gap:6px;margin-bottom:8px}.tabs button{flex:1;border:0;border-radius:10px;padding:10px;font-weight:900;background:#c59a5a;color:#442d13}.tabs button.on{background:#477a37;color:#fff}.view{display:none}.view.on{display:block}.guide{background:#fff2a9;color:#493200;border-radius:10px;padding:8px;font-size:13px;font-weight:800;margin-bottom:8px}.board{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}.cell{aspect-ratio:1;border:2px solid #9e7547;border-radius:10px;background:#d9bd89;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative}.cell.sel{outline:4px solid #ffe249;transform:scale(.94)}.cell.hint{animation:pulse 1s infinite;outline:4px solid #55e77c}@keyframes pulse{50%{transform:scale(.85);filter:brightness(1.35)}}.lvl{position:absolute;right:3px;bottom:1px;background:#000b;color:#fff;border-radius:7px;padding:1px 4px;font-size:10px}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}.actions button,.map button,.modal button{border:0;border-radius:10px;padding:10px 5px;font-weight:900;background:#efb33e;color:#3b2600}.actions .green{background:#62b76b;color:#fff}.actions .blue{background:#579ce5;color:#fff}.inventory{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:8px}.inv{background:#6b4b2f;color:#fff;border-radius:9px;padding:6px;text-align:center;font-size:11px}.map{background:linear-gradient(#a7d67b,#609a55);border-radius:14px;padding:10px;min-height:390px;position:relative}.path{display:flex;flex-direction:column;align-items:center;gap:12px}.node{width:74px;height:74px;border-radius:50%;border:5px solid #e6c46d;background:#557d3d;color:#fff;font-size:24px;font-weight:900}.node.lock{filter:grayscale(1);opacity:.55}.node.boss{background:#8b3535}.node.done{background:#2e9b52}.connector{height:20px;border-left:5px dotted #f3e1a1}.enemyCard{background:#0009;color:#fff;border-radius:12px;padding:10px;margin-top:8px}.bar{height:12px;background:#402b28;border-radius:20px;overflow:hidden}.fill{height:100%;background:#70d36b}.red{background:#e35f55}.tasks{display:grid;gap:8px}.task{background:#fff7df;border-radius:12px;padding:10px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.task small{display:block;color:#725b3e}.task button{border:0;border-radius:9px;padding:9px;background:#4f873a;color:#fff;font-weight:900}.task button:disabled{opacity:.45}.log{margin-top:8px;background:#000b;border-radius:10px;padding:8px;min-height:42px;font-size:13px}.nav{position:fixed;bottom:0;width:min(100vw,480px);display:grid;grid-template-columns:repeat(3,1fr);background:#1b2519;border-top:1px solid #ffffff22;padding:7px}.nav button{border:0;background:none;color:#bbb;font-weight:800;padding:7px}.nav button.on{color:#ffe26b}.overlay{position:fixed;inset:0;background:#000d;display:none;align-items:center;justify-content:center;padding:22px;z-index:5}.modal{background:#f5e3bd;color:#352512;border:4px solid #9a6b35;border-radius:20px;padding:20px;text-align:center;width:min(92vw,380px)}.modal h2{margin-top:0}.adbox{height:150px;border-radius:13px;background:linear-gradient(135deg,#333,#666);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;margin:10px 0}.row{display:flex;gap:8px}.row button{flex:1}</style></head><body><main class="app"><div class="top"><div class="pill">等級<b id="level">1</b></div><div class="pill">⚡體力<b id="energy">12</b></div><div class="pill">🪙金幣<b id="coins">100</b></div><div class="pill">💡提示<b id="hintCount">3</b></div></div><section class="hero"><h1>遺跡合成探險</h1><p>合成工具、探索森林、擊敗守衛、收集寶藏。</p><div class="char">🧭</div></section><section class="panel"><div class="tabs"><button class="on" data-view="merge">合成</button><button data-view="map">探索</button><button data-view="tasks">任務</button></div><div id="merge" class="view on"><div class="guide">點兩個相同物品即可合成。先做出高級工具，再去探索。</div><div id="board" class="board"></div><div class="actions"><button class="green" id="spawn">取得物資<br>-1體力</button><button class="blue" id="hint">💡提示</button><button id="sort">整理棋盤</button></div><div id="inventory" class="inventory"></div></div><div id="map" class="view"><div class="map"><div class="path" id="path"></div><div class="enemyCard"><div>玩家戰力：<b id="power">0</b></div><div class="bar"><div id="powerFill" class="fill" style="width:10%"></div></div><div style="margin-top:6px">選擇已解鎖關卡開始探索。</div></div></div></div><div id="tasks" class="view"><div class="tasks" id="taskList"></div></div></section><div class="log" id="log">歡迎！先取得物資並合成兩個相同物品。</div></main><div class="nav"><button class="on" data-view="merge">🧰<br>合成</button><button data-view="map">🗺️<br>探索</button><button data-view="tasks">📜<br>任務</button></div><div class="overlay" id="overlay"><div class="modal" id="modal"></div></div><script>const $=id=>document.getElementById(id);const items={wood:['🪵','🪚','🛠️','⚔️'],stone:['🪨','⛏️','🔨','🛡️'],herb:['🍃','🌿','🧪','💖'],key:['🔑','🗝️','🔐','👑']};let state={level:1,xp:0,energy:12,coins:100,hints:3,selected:null,board:Array(36).fill(null),unlocked:1,cleared:0,kills:0,merges:0,chests:0};const stages=[{name:'森林入口',enemy:'🟢史萊姆',hp:22,power:4,reward:35},{name:'石橋守衛',enemy:'🐺灰狼',hp:38,power:7,reward:55},{name:'古樹迷宮',enemy:'👺哥布林',hp:60,power:11,reward:80},{name:'礦坑深處',enemy:'🦇洞穴怪',hp:86,power:15,reward:110},{name:'遺跡大門',enemy:'🐲遺跡守衛',hp:125,power:20,reward:180}];const tasks=[{text:'完成 3 次合成',key:'merges',goal:3,reward:40},{text:'擊敗 2 隻怪物',key:'kills',goal:2,reward:60},{text:'開啟 2 個寶箱',key:'chests',goal:2,reward:80}];function randomBase(){let keys=Object.keys(items);return{type:keys[Math.floor(Math.random()*keys.length)],lv:0}}function init(){for(let i=0;i<9;i++)state.board[i]=randomBase();renderAll()}function renderAll(){renderBoard();renderInv();renderMap();renderTasks();$('level').textContent=state.level;$('energy').textContent=state.energy;$('coins').textContent=state.coins;$('hintCount').textContent=state.hints;let p=calcPower();$('power').textContent=p;$('powerFill').style.width=Math.min(100,p*4)+'%'}function renderBoard(){let b=$('board');b.innerHTML='';state.board.forEach((it,i)=>{let c=document.createElement('button');c.className='cell'+(state.selected===i?' sel':'');c.dataset.i=i;if(it){c.innerHTML=items[it.type][it.lv]+`<span class="lvl">Lv.${it.lv+1}</span>`}c.onclick=()=>tapCell(i);b.appendChild(c)})}function tapCell(i){let it=state.board[i];if(!it)return;if(state.selected===null){state.selected=i;renderBoard();return}if(state.selected===i){state.selected=null;renderBoard();return}let a=state.board[state.selected],b=it;if(a&&b&&a.type===b.type&&a.lv===b.lv&&a.lv<3){state.board[state.selected]={type:a.type,lv:a.lv+1};state.board[i]=null;state.merges++;state.xp+=8;log(`合成成功！獲得 ${items[a.type][a.lv+1]}`);levelUp();state.selected=null;renderAll()}else{state.selected=i;renderBoard();log('只有兩個完全相同等級的物品才能合成')}}function spawn(){if(state.energy<1){offerAd('體力不足','觀看廣告補充 5 點體力',()=>{state.energy+=5;renderAll()});return}let idx=state.board.findIndex(x=>!x);if(idx<0){log('棋盤已滿，先合成或整理');return}state.energy--;state.board[idx]=randomBase();renderAll();log('獲得一份新物資')}function calcPower(){return state.board.reduce((s,it)=>s+(it?(it.lv+1)*(it.type==='herb'?1:2):0),0)}function renderInv(){let counts={};state.board.forEach(it=>{if(it){let k=items[it.type][it.lv];counts[k]=(counts[k]||0)+1}});$('inventory').innerHTML=Object.entries(counts).map(([k,v])=>`<div class="inv">${k}<br>x${v}</div>`).join('')||'<div class="inv">尚無物品</div>'}function showHint(){if(state.hints<=0){offerAd('免費提示已用完','觀看廣告獲得 1 次提示',()=>{state.hints++;renderAll()});return}for(let i=0;i<state.board.length;i++){let a=state.board[i];if(!a)continue;for(let j=i+1;j<state.board.length;j++){let b=state.board[j];if(b&&a.type===b.type&&a.lv===b.lv&&a.lv<3){state.hints--;renderAll();let cells=[...document.querySelectorAll('.cell')];cells[i].classList.add('hint');cells[j].classList.add('hint');log('綠色閃爍的兩格可以合成');setTimeout(()=>{cells[i]?.classList.remove('hint');cells[j]?.classList.remove('hint')},3000);return}}}log('目前沒有可合成物品，先取得新物資')}function sortBoard(){state.board=state.board.filter(Boolean).sort((a,b)=>a.type.localeCompare(b.type)||a.lv-b.lv);while(state.board.length<36)state.board.push(null);state.selected=null;renderAll();log('棋盤整理完成')}function renderMap(){let p=$('path');p.innerHTML='';stages.forEach((s,i)=>{if(i)p.innerHTML+='<div class="connector"></div>';let btn=document.createElement('button');btn.className='node '+(i+1>state.unlocked?'lock ':'')+(i<state.cleared?'done ':'')+(i===stages.length-1?'boss':'');btn.textContent=i<state.cleared?'✓':i+1;btn.disabled=i+1>state.unlocked;btn.onclick=()=>startStage(i);p.appendChild(btn)})}function startStage(i){let s=stages[i],power=calcPower();if(state.energy<2){offerAd('體力不足','觀看廣告補充 5 點體力',()=>{state.energy+=5;renderAll()});return}state.energy-=2;let playerHP=70+state.level*8,enemyHP=s.hp;showBattle(i,playerHP,enemyHP,power)}function showBattle(i,php,ehp,power){let s=stages[i];$('overlay').style.display='flex';$('modal').innerHTML=`<h2>${s.name}</h2><div style="font-size:58px">🧭 ⚔️ ${s.enemy.split('')[0]}</div><p>你的戰力 ${power}｜敵人戰力 ${s.power}</p><div>玩家生命 ${php}</div><div class="bar"><div class="fill" style="width:${php}%"></div></div><div style="margin-top:8px">敵人生命 ${ehp}</div><div class="bar"><div class="fill red" style="width:${Math.min(100,ehp/s.hp*100)}%"></div></div><button style="margin-top:14px;width:100%" id="attackBtn">攻擊</button>`;$('attackBtn').onclick=()=>{let dmg=Math.max(3,power+Math.floor(Math.random()*5));let hurt=Math.max(1,s.power-Math.floor(power/4));ehp-=dmg;php-=hurt;if(ehp<=0){winStage(i);return}if(php<=0){loseStage(i);return}showBattle(i,php,ehp,power)}}function winStage(i){let s=stages[i];state.kills++;state.coins+=s.reward;state.xp+=20;state.cleared=Math.max(state.cleared,i+1);state.unlocked=Math.min(stages.length,state.cleared+1);state.chests++;let empty=state.board.findIndex(x=>!x);if(empty>=0)state.board[empty]={type:'key',lv:Math.min(2,Math.floor(i/2))};levelUp();$('modal').innerHTML=`<h2>探索成功！</h2><div style="font-size:70px">🎁</div><p>獲得 ${s.reward} 金幣與寶箱道具。</p><button onclick="closeModal()">領取獎勵</button><button onclick="doubleReward(${s.reward})">看廣告 ×2</button>`;renderAll()}function loseStage(i){$('modal').innerHTML=`<h2>挑戰失敗</h2><p>先回合成頁提升工具等級，再來挑戰。</p><div class="row"><button onclick="closeModal()">返回</button><button onclick="revive(${i})">看廣告復活</button></div>`}function revive(i){simulateAd(()=>{closeModal();startStage(i)})}function doubleReward(n){simulateAd(()=>{state.coins+=n;renderAll();closeModal();log('觀看完成，獎勵已加倍')})}function renderTasks(){$('taskList').innerHTML=tasks.map((t,i)=>{let v=state[t.key],done=v>=t.goal,claimed=t.claimed;return`<div class="task"><div><b>${t.text}</b><small>${Math.min(v,t.goal)}/${t.goal}｜獎勵 ${t.reward} 金幣</small></div><button ${!done||claimed?'disabled':''} onclick="claimTask(${i})">${claimed?'已領取':'領取'}</button></div>`}).join('')}function claimTask(i){let t=tasks[i];if(state[t.key]>=t.goal&&!t.claimed){t.claimed=true;state.coins+=t.reward;renderAll();log('任務獎勵已領取')}}function levelUp(){while(state.xp>=state.level*30){state.xp-=state.level*30;state.level++;state.energy+=3;log(`升到等級 ${state.level}，體力 +3`)}}function offerAd(title,text,cb){$('overlay').style.display='flex';$('modal').innerHTML=`<h2>${title}</h2><p>${text}</p><div class="row"><button onclick="closeModal()">取消</button><button id="watchAd">觀看廣告</button></div>`;$('watchAd').onclick=()=>simulateAd(()=>{cb();closeModal();log('廣告觀看完成，獎勵已發放')})}function simulateAd(cb){let n=3;$('modal').innerHTML=`<h2>獎勵廣告</h2><div class="adbox">廣告播放中… <b id="adTime">${n}</b></div><p>完整觀看後獲得獎勵</p>`;let id=setInterval(()=>{n--;$('adTime').textContent=n;if(n<=0){clearInterval(id);cb()}},1000)}function closeModal(){$('overlay').style.display='none'}function switchView(id){document.querySelectorAll('.view').forEach(x=>x.classList.toggle('on',x.id===id));document.querySelectorAll('[data-view]').forEach(x=>x.classList.toggle('on',x.dataset.view===id))}function log(t){$('log').textContent=t}document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>switchView(b.dataset.view));$('spawn').onclick=spawn;$('hint').onclick=showHint;$('sort').onclick=sortBoard;init();</script></body></html>

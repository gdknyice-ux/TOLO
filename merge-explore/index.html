<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>遺跡合成探險</title><style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#0d1b10;color:#fff;font-family:Arial,"Microsoft JhengHei",sans-serif;display:flex;justify-content:center}button{font:inherit}.app{width:min(100vw,520px);min-height:100vh;background:linear-gradient(#416e3e,#172819);padding:10px 10px 82px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.stat{background:#071108d9;border-radius:12px;text-align:center;padding:7px;font-size:12px}.stat b{display:block;font-size:19px}.hero{margin:8px 0;background:linear-gradient(135deg,#7ca24f,#315a32);border-radius:16px;padding:13px}.hero h1{margin:0 0 4px;font-size:24px}.hero p{margin:0;font-size:13px}.panel{background:#f4dfb2;border:3px solid #8b5d2d;border-radius:17px;padding:10px;color:#342516}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}.tabs button,.nav button{border:0}.tabs button{border-radius:10px;padding:10px;font-weight:900;background:#cb9a51;color:#432d15}.tabs button.on{background:#3f773e;color:#fff}.view{display:none}.view.on{display:block}.guide{background:#fff3aa;border-radius:10px;padding:8px;font-size:13px;font-weight:800;margin-bottom:8px}.board{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}.cell{aspect-ratio:1;border:2px solid #9d7446;border-radius:11px;background:linear-gradient(#e5ca96,#cfac72);position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}.cell.empty:after{content:"";width:34%;height:34%;border:2px dashed #9e794d66;border-radius:8px}.cell.sel{outline:4px solid #ffe35d;transform:scale(.93)}.cell.hint{animation:pulse .8s infinite;outline:4px solid #4eee77}.icon{font-size:30px}.lvl{position:absolute;right:3px;bottom:2px;background:#111d;color:white;padding:1px 4px;border-radius:8px;font-size:10px}.name{position:absolute;left:3px;top:2px;font-size:9px;background:#fff9;padding:1px 3px;border-radius:5px}@keyframes pulse{50%{transform:scale(.84);filter:brightness(1.25)}}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}.actions button,.bigBtn,.modal button,.task button{border:0;border-radius:10px;padding:10px 6px;font-weight:900;background:#f2bc42;color:#402800}.actions .green{background:#55a75d;color:#fff}.actions .blue{background:#4f91dc;color:#fff}.info{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}.box{background:#6d4b2d;color:#fff;border-radius:10px;padding:8px;font-size:12px}.box b{font-size:16px}.mapWrap{background:linear-gradient(#acd77e,#649c54);border-radius:14px;padding:12px;min-height:420px}.path{display:flex;flex-direction:column;align-items:center}.node{width:78px;height:78px;border-radius:50%;border:5px solid #efd27b;background:#547b3f;color:#fff;font-weight:900;font-size:22px}.node.lock{filter:grayscale(1);opacity:.5}.node.done{background:#2d9b50}.node.boss{background:#8d3838}.line{height:26px;border-left:5px dotted #fff0b3}.stageName{font-size:12px;margin:3px 0 8px}.powerCard{margin-top:10px;background:#112014dd;color:#fff;border-radius:12px;padding:10px}.bar{height:13px;background:#3b2c28;border-radius:20px;overflow:hidden}.fill{height:100%;background:#59c968}.fill.red{background:#df5f56}.tasks{display:grid;gap:8px}.task{background:#fff8e2;border-radius:12px;padding:10px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.task small{display:block;color:#725b3e}.task button{background:#4e863b;color:#fff}.task button:disabled{opacity:.45}.log{margin-top:8px;background:#061009dd;border-radius:10px;padding:9px;min-height:42px;font-size:13px}.nav{position:fixed;bottom:0;width:min(100vw,520px);display:grid;grid-template-columns:repeat(3,1fr);background:#142217;padding:7px}.nav button{background:none;color:#bcc5bd;padding:7px;font-weight:900}.nav button.on{color:#ffe568}.overlay{position:fixed;inset:0;background:#000d;display:none;align-items:center;justify-content:center;padding:20px;z-index:10}.modal{width:min(92vw,390px);background:#f4dfb5;color:#342414;border:4px solid #8a5b2d;border-radius:20px;padding:18px;text-align:center}.modal h2{margin:0 0 8px}.modal .big{font-size:58px;margin:8px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.secondary{background:#816b54!important;color:#fff!important}.ad{height:110px;background:linear-gradient(135deg,#333,#666);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:10px 0}.toast{position:fixed;top:15px;left:50%;transform:translateX(-50%);background:#111e;padding:10px 14px;border-radius:10px;z-index:20;display:none}
</style></head><body><div class="toast" id="toast"></div><main class="app"><div class="stats"><div class="stat">等級<b id="level">1</b></div><div class="stat">⚡體力<b id="energy">20</b></div><div class="stat">🪙金幣<b id="coins">100</b></div><div class="stat">💡提示<b id="hints">3</b></div></div><section class="hero"><h1>遺跡合成探險</h1><p>從資源箱取得素材，合成工具，再前往探索。</p></section><section class="panel"><div class="tabs"><button class="on" data-view="merge">合成</button><button data-view="map">探索</button><button data-view="tasks">任務</button></div><div id="merge" class="view on"><div class="guide">先點「資源箱」取得素材；點一個物品，再點另一格。相同物品會合成，不同物品會交換。</div><div id="board" class="board"></div><div class="actions"><button class="green" id="crateBtn">📦 資源箱<br>-1 體力</button><button class="blue" id="hintBtn">💡 提示<br>剩 3 次</button><button id="sortBtn">整理棋盤</button></div><div class="info"><div class="box">目前戰力<br><b id="power">0</b></div><div class="box">下一目標<br><b id="goal">合成 Lv.2 工具</b></div></div></div><div id="map" class="view"><div class="mapWrap"><div id="path" class="path"></div><div class="powerCard">戰力：<b id="power2">0</b><div class="bar"><div id="powerBar" class="fill" style="width:10%"></div></div><div style="margin-top:7px;font-size:12px">探索消耗 2 體力。戰力不足仍可挑戰，但較容易失敗。</div></div></div></div><div id="tasks" class="view"><div id="taskList" class="tasks"></div></div></section><div class="log" id="log">點資源箱開始遊戲。</div></main><nav class="nav"><button class="on" data-view="merge">🧰<br>合成</button><button data-view="map">🗺️<br>探索</button><button data-view="tasks">📜<br>任務</button></nav><div class="overlay" id="overlay"><div class="modal" id="modal"></div></div><script>
(()=>{'use strict';
const $=id=>document.getElementById(id),KEY='mergeExploreStable1';
const chains={wood:[['🪵','木材'],['🪚','木工鋸'],['🛠️','工具組'],['⚔️','遺跡劍']],stone:[['🪨','石塊'],['⛏️','鐵鎬'],['🔨','戰鎚'],['🛡️','守護盾']],herb:[['🍃','藥草'],['🌿','草藥束'],['🧪','藥劑'],['💖','生命核心']],key:[['🔑','舊鑰匙'],['🗝️','銀鑰匙'],['🔐','封印鑰匙'],['👑','王者寶物']]};
const kinds=Object.keys(chains);
const stages=[{name:'森林入口',icon:'🟢',hp:24,power:4,reward:40},{name:'石橋守衛',icon:'🐺',hp:42,power:7,reward:65},{name:'古樹迷宮',icon:'👺',hp:65,power:11,reward:90},{name:'礦坑深處',icon:'🦇',hp:90,power:15,reward:125},{name:'遺跡大門',icon:'🐲',hp:135,power:21,reward:200}];
const taskDefs=[{id:'m3',text:'完成 3 次合成',key:'merges',goal:3,reward:50},{id:'k2',text:'擊敗 2 隻怪物',key:'kills',goal:2,reward:80},{id:'c3',text:'通過 3 個關卡',key:'cleared',goal:3,reward:120}];
const fresh=()=>({level:1,xp:0,energy:20,coins:100,hints:3,board:Array(30).fill(null),selected:null,unlocked:1,cleared:0,merges:0,kills:0,claimed:{}});
let state=load();
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&Array.isArray(s.board)&&s.board.length===30)return Object.assign(fresh(),s,{selected:null});}catch(e){}return fresh()}
function save(){localStorage.setItem(KEY,JSON.stringify({...state,selected:null}))}
function seed(){if(state.board.every(x=>!x)){[{type:'wood',lv:0},{type:'wood',lv:0},{type:'stone',lv:0},{type:'stone',lv:0},{type:'herb',lv:0},{type:'herb',lv:0}].forEach((x,i)=>state.board[i]=x)}}
function toast(t){const e=$('toast');e.textContent=t;e.style.display='block';clearTimeout(toast.t);toast.t=setTimeout(()=>e.style.display='none',1500)}
function log(t){$('log').textContent=t}
function power(){return state.board.reduce((s,it)=>s+(it?(it.lv+1)*(it.lv+1)*(it.type==='herb'?1:2):0),0)}
function levelUp(){while(state.xp>=state.level*35){state.xp-=state.level*35;state.level++;state.energy+=3;toast('升級！體力 +3')}}
function randomBase(){return{type:kinds[Math.floor(Math.random()*kinds.length)],lv:0}}
function render(){renderStats();renderBoard();renderMap();renderTasks();save()}
function renderStats(){const p=power();$('level').textContent=state.level;$('energy').textContent=state.energy;$('coins').textContent=state.coins;$('hints').textContent=state.hints;$('power').textContent=p;$('power2').textContent=p;$('powerBar').style.width=Math.min(100,p*3)+'%';$('hintBtn').innerHTML=state.hints>0?`💡 提示<br>剩 ${state.hints} 次`:'📺 看廣告<br>補 1 次';$('goal').textContent=state.cleared===0?'合成 Lv.2 工具':state.cleared<3?'繼續探索':'挑戰遺跡 Boss'}
function renderBoard(){const b=$('board');b.innerHTML='';state.board.forEach((it,i)=>{const c=document.createElement('button');c.className='cell '+(!it?'empty':'')+(state.selected===i?' sel':'');c.dataset.i=i;c.draggable=!!it;if(it){const d=chains[it.type][it.lv];c.innerHTML=`<span class="name">${d[1]}</span><span class="icon">${d[0]}</span><span class="lvl">Lv.${it.lv+1}</span>`}c.onclick=()=>tap(i);c.ondragstart=e=>{e.dataTransfer.setData('text/plain',String(i))};c.ondragover=e=>e.preventDefault();c.ondrop=e=>{e.preventDefault();move(Number(e.dataTransfer.getData('text/plain')),i)};b.appendChild(c)})}
function tap(i){if(state.selected===null){if(!state.board[i])return;state.selected=i;renderBoard();log('已選取，請點另一格')}else{const from=state.selected;state.selected=null;move(from,i)}}
function move(from,to){if(from===to){renderBoard();return}const a=state.board[from],b=state.board[to];if(!a)return;if(!b){state.board[to]=a;state.board[from]=null;log('物品已移動')}else if(a.type===b.type&&a.lv===b.lv&&a.lv<3){state.board[to]={type:a.type,lv:a.lv+1};state.board[from]=null;state.merges++;state.xp+=10;levelUp();toast('合成成功');log(`合成：${chains[a.type][a.lv+1][1]}`)}else{state.board[from]=b;state.board[to]=a;log('已交換位置')}render()}
function crate(){if(state.energy<1){showAd('體力不足','看完廣告補 5 點體力',()=>{state.energy+=5;render();log('體力 +5')});return}const empty=state.board.findIndex(x=>!x);if(empty<0){log('棋盤已滿，請先合成或整理');return}state.energy--;state.board[empty]=randomBase();render();log('資源箱掉落 1 個素材')}
function hint(){if(state.hints<=0){showAd('免費提示用完','看完廣告補 1 次提示',()=>{state.hints=1;render();log('提示 +1')});return}for(let i=0;i<state.board.length;i++){const a=state.board[i];if(!a)continue;for(let j=i+1;j<state.board.length;j++){const b=state.board[j];if(b&&a.type===b.type&&a.lv===b.lv&&a.lv<3){state.hints--;render();const cells=[...document.querySelectorAll('.cell')];cells[i].classList.add('hint');cells[j].classList.add('hint');setTimeout(()=>{cells[i]?.classList.remove('hint');cells[j]?.classList.remove('hint')},2500);log('綠色閃爍的兩格可以合成');return}}}log('目前沒有可合成物品，請再開資源箱')}
function sortBoard(){state.board=state.board.filter(Boolean).sort((a,b)=>a.type.localeCompare(b.type)||a.lv-b.lv);while(state.board.length<30)state.board.push(null);state.selected=null;render();log('棋盤整理完成')}
function renderMap(){const p=$('path');p.innerHTML='';stages.forEach((s,i)=>{if(i){const line=document.createElement('div');line.className='line';p.appendChild(line)}const btn=document.createElement('button');btn.className='node '+(i+1>state.unlocked?'lock ':'')+(i<state.cleared?'done ':'')+(i===4?'boss':'');btn.textContent=i<state.cleared?'✓':i+1;btn.disabled=i+1>state.unlocked;btn.onclick=()=>startStage(i);p.appendChild(btn);const n=document.createElement('div');n.className='stageName';n.textContent=s.name;p.appendChild(n)})}
function startStage(i){if(state.energy<2){showAd('體力不足','看完廣告補 5 點體力',()=>{state.energy+=5;render()});return}state.energy-=2;render();battle(i,80+state.level*8,stages[i].hp)}
function battle(i,php,ehp){const s=stages[i],p=power();open(`<h2>${s.name}</h2><div class="big">🧭 ⚔️ ${s.icon}</div><p>玩家戰力 ${p}｜敵人戰力 ${s.power}</p><p>玩家生命 ${Math.max(0,php)}</p><div class="bar"><div class="fill" style="width:${Math.max(0,Math.min(100,php))}%"></div></div><p>敵人生命 ${Math.max(0,ehp)}</p><div class="bar"><div class="fill red" style="width:${Math.max(0,Math.min(100,ehp/s.hp*100))}%"></div></div><button class="bigBtn" id="attack">攻擊</button>`);$('attack').onclick=()=>{const dmg=Math.max(4,p+Math.floor(Math.random()*6));const hurt=Math.max(1,s.power-Math.floor(p/5));ehp-=dmg;php-=hurt;if(ehp<=0)return win(i);if(php<=0)return lose(i);battle(i,php,ehp)}}
function win(i){const s=stages[i];state.coins+=s.reward;state.kills++;state.cleared=Math.max(state.cleared,i+1);state.unlocked=Math.min(stages.length,state.cleared+1);state.xp+=20;levelUp();render();open(`<h2>探索成功</h2><div class="big">🎁</div><p>獲得 ${s.reward} 金幣</p><div class="row"><button id="double">📺 雙倍獎勵</button><button class="secondary" id="close">收下</button></div>`);$('double').onclick=()=>showAd('獎勵廣告',`再獲得 ${s.reward} 金幣`,()=>{state.coins+=s.reward;render();close();log('領取雙倍獎勵')});$('close').onclick=()=>{close();log('探索成功，下一關已解鎖')}}
function lose(i){open(`<h2>探索失敗</h2><div class="big">💔</div><p>可以觀看廣告復活一次。</p><div class="row"><button id="revive">📺 復活</button><button class="secondary" id="quit">返回</button></div>`);$('revive').onclick=()=>showAd('復活廣告','恢復 60 點生命',()=>battle(i,60,Math.ceil(stages[i].hp*.55)));$('quit').onclick=()=>{close();log('已返回合成頁')}}
function renderTasks(){const list=$('taskList');list.innerHTML='';taskDefs.forEach(t=>{const val=Math.min(state[t.key]||0,t.goal),done=val>=t.goal,claimed=!!state.claimed[t.id];const d=document.createElement('div');d.className='task';d.innerHTML=`<div><b>${t.text}</b><small>${val}/${t.goal}｜獎勵 ${t.reward} 金幣</small></div><button ${!done||claimed?'disabled':''}>${claimed?'已領取':'領取'}</button>`;d.querySelector('button').onclick=()=>{state.claimed[t.id]=true;state.coins+=t.reward;render();toast('任務獎勵已領取')};list.appendChild(d)})}
function open(html){$('modal').innerHTML=html;$('overlay').style.display='flex'}function close(){$('overlay').style.display='none'}
function showAd(title,text,cb){open(`<h2>${title}</h2><div class="ad">模擬 Facebook 獎勵式廣告</div><p>${text}</p><button id="watch">觀看廣告（3 秒）</button><button class="secondary" id="cancel" style="margin-top:8px">取消</button>`);$('cancel').onclick=close;$('watch').onclick=()=>{let n=3;const btn=$('watch');btn.disabled=true;btn.textContent=`播放中 ${n}`;const t=setInterval(()=>{n--;btn.textContent=`播放中 ${n}`;if(n<=0){clearInterval(t);cb();close()}},1000)}}
function switchView(v){document.querySelectorAll('.view').forEach(x=>x.classList.toggle('on',x.id===v));document.querySelectorAll('[data-view]').forEach(x=>x.classList.toggle('on',x.dataset.view===v))}
document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>switchView(b.dataset.view));$('crateBtn').onclick=crate;$('hintBtn').onclick=hint;$('sortBtn').onclick=sortBoard;$('overlay').onclick=e=>{if(e.target===$('overlay'))close()};
seed();render();
})();
</script></body></html>

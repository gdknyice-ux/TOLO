<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Street Basket Machine</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:#090909;font-family:Arial,"Microsoft JhengHei",sans-serif}body{display:flex;justify-content:center}.wrap{position:relative;width:min(100vw,480px);height:100vh;background:#141414}canvas{width:100%;height:100%;display:block;touch-action:none}.hud{position:absolute;inset:0;color:#fff;pointer-events:none}.scoreboard{margin:10px;background:#1a0505;border:5px solid #512010;border-radius:16px;display:grid;grid-template-columns:1fr 1fr 1fr;padding:8px;box-shadow:0 0 20px #ff3b0033 inset}.digit{text-align:center;color:#ff4a28;text-shadow:0 0 10px #ff3b00;font-family:monospace}.digit span{font-size:11px;color:#ffd7ca;display:block}.digit b{font-size:30px;letter-spacing:2px}.stage{position:absolute;top:100px;left:12px;background:#000b;border:1px solid #ffffff22;border-radius:10px;padding:7px 10px;font-weight:900}.message{position:absolute;top:145px;left:0;right:0;text-align:center;font-size:28px;font-weight:1000;text-shadow:0 3px 8px #000}.tip{position:absolute;bottom:14px;left:12px;right:12px;background:#000b;border-radius:12px;padding:9px;text-align:center;font-size:13px}.overlay{position:absolute;inset:0;background:#090909e8;display:flex;align-items:center;justify-content:center;padding:22px;color:#fff}.hidden{display:none}.card{width:100%;max-width:390px;background:linear-gradient(#292929,#121212);border:3px solid #6b2d16;border-radius:22px;padding:22px;text-align:center;box-shadow:0 18px 50px #000}.logo{font-size:38px;font-weight:1000;line-height:1;color:#ffbe37;text-shadow:0 4px 0 #6c2700}.sub{opacity:.8;margin:10px 0}.btn{width:100%;border:0;border-radius:14px;padding:14px;margin-top:12px;font-size:18px;font-weight:900;background:linear-gradient(#ffdc55,#f28b16);color:#3d2100}.btn.blue{background:linear-gradient(#66c9ff,#2676d5);color:white}.btn.gray{background:#555;color:white}.adbox{height:110px;border-radius:14px;background:linear-gradient(135deg,#333,#666);display:flex;align-items:center;justify-content:center;margin:12px 0;font-weight:900}</style></head><body><div class="wrap"><canvas id="game"></canvas><div class="hud"><div class="scoreboard"><div class="digit"><span>SCORE</span><b id="score">000</b></div><div class="digit"><span>TIME</span><b id="time">60</b></div><div class="digit"><span>TARGET</span><b id="target">40</b></div></div><div class="stage" id="stage">STAGE 1</div><div class="message" id="message"></div><div class="tip" id="tip">快速向上滑動籃球，像街頭投籃機一樣連續出手。</div></div><div class="overlay" id="menu"><div class="card"><div class="logo">STREET<br>BASKET</div><div class="sub">60秒街頭投籃機・連進加分・過關延長時間</div><button class="btn" id="start">開始投籃</button><button class="btn blue" id="how">玩法說明</button></div></div><div class="overlay hidden" id="modal"><div class="card" id="modalCard"></div></div></div><script>(()=>{'use strict';const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),$=id=>document.getElementById(id);let W=0,H=0,dpr=1,last=performance.now(),pointer=null;function resize(){dpr=Math.min(2,window.devicePixelRatio||1);W=canvas.clientWidth;H=canvas.clientHeight;canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}window.addEventListener('resize',resize);resize();const state={running:false,score:0,time:60,stage:1,target:40,combo:0,best:Number(localStorage.getItem('streetBasketBest')||0),revived:false,bonus:false};let balls=[],rack=[],particles=[];function makeBall(x,y){return{x,y,r:18,vx:0,vy:0,active:false,scored:false,ready:true}}function resetRack(){rack=[];for(let i=0;i<5;i++)rack.push(makeBall(W*.2+i*W*.15,H*.82));balls=[]}function startGame(){Object.assign(state,{running:true,score:0,time:60,stage:1,target:40,combo:0,revived:false,bonus:false});resetRack();particles=[];$('menu').classList.add('hidden');$('modal').classList.add('hidden');sync()}function sync(){$('score').textContent=String(state.score).padStart(3,'0');$('time').textContent=Math.max(0,Math.ceil(state.time));$('target').textContent=state.target;$('stage').textContent='STAGE '+state.stage;$('message').textContent=state.combo>=3?`COMBO x${state.combo}`:state.time<=10?'FINAL 10 SEC!':'';$('tip').textContent=state.time<=10?'最後10秒，每球雙倍分數！':'快速向上滑動籃球，投完會自動補球。'}function nextReady(){return rack.find(b=>b.ready&&!b.active)}function shoot(ball,px,py){const dx=ball.x-px,dy=ball.y-py,p=Math.min(1.7,Math.hypot(dx,dy)/130);ball.vx=dx*4.5*p;ball.vy=dy*4.5*p;ball.active=true;ball.ready=false;pointer=null;setTimeout(refillRack,260)}function refillRack(){for(let i=0;i<rack.length;i++){const b=rack[i];if(!b.ready&&!b.active&&b.y>H+40)rack[i]=makeBall(W*.2+i*W*.15,H*.82)}}function scoreShot(ball){ball.scored=true;state.combo++;let gain=state.time<=10?4:2;if(state.combo>=5)gain+=1;state.score+=gain;spawnParticles(W*.5,H*.33);sync()}function miss(ball){state.combo=0;sync()}function update(dt){if(!state.running)return;state.time-=dt;if(state.time<=0){state.time=0;endRound();return}for(const b of rack){if(b.active){b.vy+=760*dt;b.x+=b.vx*dt;b.y+=b.vy*dt;const rimY=H*.34,rimL=W*.38,rimR=W*.62;const crossing=b.vy>0&&b.y-b.r<rimY&&b.y+b.r>=rimY;if(!b.scored&&crossing&&b.x>rimL&&b.x<rimR)scoreShot(b);if(b.y>H+60||b.x<-60||b.x>W+60){if(!b.scored)miss(b);b.active=false;b.y=H+100}}}particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=300*dt;p.life-=dt});particles=particles.filter(p=>p.life>0);sync()}function endRound(){state.running=false;if(state.score>=state.target){state.stage++;state.target+=35;state.time=35;state.running=true;state.combo=0;$('message').textContent='STAGE CLEAR! +35 SEC';setTimeout(()=>$('message').textContent='',1200)}else gameOver()}function gameOver(){if(state.score>state.best){state.best=state.score;localStorage.setItem('streetBasketBest',state.best)}$('modalCard').innerHTML=`<h2>時間到！</h2><div style="font-size:46px;font-weight:1000;color:#ffbd38">${state.score} 分</div><p>最高分：${state.best}</p>${!state.revived?'<button class="btn blue" id="revive">看廣告 +15 秒</button>':''}<button class="btn" id="again">再玩一次</button><button class="btn gray" id="home">回主畫面</button>`;$('modal').classList.remove('hidden');const r=$('revive');if(r)r.onclick=showAd;$('again').onclick=startGame;$('home').onclick=()=>{$('modal').classList.add('hidden');$('menu').classList.remove('hidden')}}function showAd(){$('modalCard').innerHTML='<h2>模擬獎勵廣告</h2><div class="adbox" id="adcount">廣告 3 秒</div><button class="btn gray" disabled>播放中...</button>';let n=3;const t=setInterval(()=>{n--;$('adcount').textContent=`廣告 ${n} 秒`;if(n<=0){clearInterval(t);state.revived=true;state.time=15;state.running=true;$('modal').classList.add('hidden');sync()}},1000)}function drawBackground(){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#20110d');g.addColorStop(.55,'#451a10');g.addColorStop(1,'#111');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='#311008';ctx.fillRect(22,H*.18,W-44,H*.58);ctx.strokeStyle='#8e3a18';ctx.lineWidth=8;ctx.strokeRect(22,H*.18,W-44,H*.58);for(let y=H*.2;y<H*.7;y+=38){ctx.strokeStyle='#ffffff10';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(25,y);ctx.lineTo(W-25,y);ctx.stroke()}ctx.fillStyle='#aaa';ctx.fillRect(W*.66,H*.2,10,H*.2);ctx.fillStyle='#e6e6e6';ctx.fillRect(W*.38,H*.22,W*.32,H*.18);ctx.strokeStyle='#ff6a00';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(W*.38,H*.34);ctx.lineTo(W*.62,H*.34);ctx.stroke();ctx.strokeStyle='#ddd';ctx.lineWidth=2;for(let i=-3;i<=3;i++){ctx.beginPath();ctx.moveTo(W*.5+i*14,H*.345);ctx.lineTo(W*.5+i*9,H*.405);ctx.stroke()}ctx.beginPath();ctx.moveTo(W*.38,H*.345);ctx.lineTo(W*.44,H*.41);ctx.lineTo(W*.56,H*.41);ctx.lineTo(W*.62,H*.345);ctx.stroke();ctx.fillStyle='#4b1f11';ctx.fillRect(0,H*.76,W,H*.24);ctx.strokeStyle='#c76f36';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(0,H*.78);ctx.lineTo(W,H*.78);ctx.stroke()}function drawBall(b){ctx.save();ctx.translate(b.x,b.y);ctx.fillStyle='#ef7b22';ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#4c210c';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(-b.r,0);ctx.lineTo(b.r,0);ctx.moveTo(0,-b.r);ctx.bezierCurveTo(-b.r*.7,-b.r*.2,-b.r*.7,b.r*.2,0,b.r);ctx.moveTo(0,-b.r);ctx.bezierCurveTo(b.r*.7,-b.r*.2,b.r*.7,b.r*.2,0,b.r);ctx.stroke();ctx.restore()}function spawnParticles(x,y){for(let i=0;i<18;i++)particles.push({x,y,vx:(Math.random()-.5)*240,vy:(Math.random()-.5)*220,life:1})}function drawAim(){if(!pointer)return;const b=pointer.ball;ctx.strokeStyle='#ffffffaa';ctx.lineWidth=3;ctx.setLineDash([7,7]);ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(pointer.x,pointer.y);ctx.stroke();ctx.setLineDash([])}function pos(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}canvas.addEventListener('pointerdown',e=>{if(!state.running)return;const p=pos(e);let best=null,d=999;for(const b of rack){if(b.ready&&!b.active){const dd=Math.hypot(p.x-b.x,p.y-b.y);if(dd<d){d=dd;best=b}}}if(best&&d<65)pointer={ball:best,x:p.x,y:p.y}});canvas.addEventListener('pointermove',e=>{if(pointer){const p=pos(e);pointer.x=p.x;pointer.y=p.y}});canvas.addEventListener('pointerup',e=>{if(pointer){const p=pos(e);shoot(pointer.ball,p.x,p.y)}});$('start').onclick=startGame;$('how').onclick=()=>{$('modalCard').innerHTML='<h2>玩法說明</h2><p>像街頭投籃機一樣，在60秒內快速連續投籃。每球2分，最後10秒每球4分。達到目標分數會進入下一關並增加35秒。</p><button class="btn" id="closeHow">知道了</button>';$('modal').classList.remove('hidden');$('closeHow').onclick=()=>$('modal').classList.add('hidden')};function loop(t){const dt=Math.min(.033,(t-last)/1000);last=t;update(dt);drawBackground();for(const b of rack)if(b.y<H+50)drawBall(b);drawAim();for(const p of particles){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle='#ffd84d';ctx.fillRect(p.x,p.y,6,6)}ctx.globalAlpha=1;requestAnimationFrame(loop)}resetRack();sync();requestAnimationFrame(loop)})();</script></body></html>

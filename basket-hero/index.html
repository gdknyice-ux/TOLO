<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Street Hoop Arcade</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02030a;font-family:Arial,"Microsoft JhengHei",sans-serif}body{display:flex;justify-content:center}#app{position:relative;width:min(100vw,480px);height:100dvh;overflow:hidden;background:#03040b;color:#fff}.screen{position:absolute;inset:0;display:none}.screen.active{display:block}canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}.btn{border:0;border-radius:18px;font-weight:1000}.start{position:absolute;left:14%;right:14%;bottom:calc(22px + env(safe-area-inset-bottom));height:72px;background:linear-gradient(#ffd449,#f06c08);color:#fff;font-size:29px;text-shadow:0 3px #7d2600;box-shadow:0 0 28px #ff7b00aa}.homeLogo{position:absolute;top:5.5%;left:7%;font-size:54px;font-style:italic;font-weight:1000;line-height:.78;text-shadow:0 5px #7e2600,0 0 20px #ff8b00}.homeLogo span{display:block;color:#ffae17}.leader{position:absolute;top:24%;left:5%;right:5%;bottom:15%;background:#080b18e8;border:3px solid #8051b3;border-radius:22px;overflow:hidden;box-shadow:0 0 28px #6f35ff66}.leader h2{height:12%;display:flex;align-items:center;justify-content:center;margin:0;font-size:25px}.rows{height:88%;display:grid;grid-template-rows:repeat(10,1fr);padding:0 12px 8px}.row{display:grid;grid-template-columns:34px 42px 1fr 92px;align-items:center;gap:8px;border-top:1px solid #ffffff1c}.row:first-child{border-top:0}.avatar{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,#ffd98d,#9a571b);color:#261100;border:2px solid #ffe7bd;font-weight:1000}.pts{color:#ffd43a;font-weight:1000;text-align:right}.buffWrap{position:absolute;inset:8% 5% 7%;background:#070b18f4;bor + env(safe-area-inset-bottom));padding:9px;background:#000b;border:1px solid #bd7a24;border-radius:11px;text-align:center;font-size:13px}.resultPanel{position:absolute;top:23%;left:7%;right:7%;padding:24px;background:#070b18f2;border:3px solid #8051b3;border-radius:22px;text-align:center}.resultPanel h2{font-size:34px;margin:0}.final{font-size:66px;color:#ffb31b;font-weight:1000}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:18px 0}.stat{background:#111728;border-radius:11px;padding:10px 4px;font-size:12px}.stat b{display:block;font-size:22px;color:#ffd43a}.again,.back{width:100%;height:54px;margin-top:10px}.again{background:#ffad17;color:#2a1600}.back{background:#3174d7;color:#fff}.adLayer{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#000e;z-index:30}.adLayer.on{display:flex}.adBox{width:76%;padding:24px;text-align:center;background:#07101d;border:2px solid #8051b3;border-radius:18px}.adSec{font-size:60px;color:#ffd43a;font-weight:1000}</style></head><body><div id="app"><section id="home" class="screen active"><canvas id="homeCanvas"></canvas><div class="homeLogo">STREET<span>HOOP</span></div><div class="leader"><h2>🏆 TOP 10 PLAYERS</h2><div id="rows" class="rows"></div></div><button id="startBtn" class="btn start">▶ 開始遊戲</button></section><section id="buff" class="screen"><canvas id="buffCanvas"></canvas><div class="buffWrap"><h2>選擇開局 BUFF</h2><p>看廣告取得一項開局優勢</p><div class="buffGrid"><div class="buffCard"><div class="buffIcon">🧲</div><h3>磁鐵球</h3><p>10秒內保證進球</p><button class="adBtn" data-buff="magnet">▶ 看廣告</button></div><div class="buffCard green"><div class="buffIcon">🏀🏀</div><h3>連續球 ×2</h3><p>20秒內投一顆變兩顆</p><button class="adBtn" data-buff="multi">▶ 看廣告</button></div></div><button id="skipBtn" class="skip">不用 BUFF，直接開始</button></div></section><section id="countdown" class="screen"><div id="countNum" class="count">3</div></section><section id="game" class="screen"><canvas id="gameCanvas"></canvas><div class="hud"><div><small>階段</small><b id="stageText">1</b></div><div><small>目標</small><b id="targetText">100</b></div><div><small>時間</small><b class="red" id="timeText">60</b></div><div><small>得分</small><b id="scoreText">0</b></div></div><div id="stageTag" class="tag stageTag">STAGE 1</div><div id="comboTag" class="tag comboTag">連進 0 / 10</div><div id="buffTags" class="buffTags"></div><div id="feedback" class="feedback"></div><div class="hint">按住下方籃球往上滑動投籃</div></section><section id="result" class="screen"><canvas id="resultCanvas"></canvas><div class="resultPanel"><h2>遊戲結束</h2><div id="finalScore" class="final">0</div><div class="stats"><div class="stat">最高階段<b id="finalStage">1</b></div><div class="stat">進球數<b id="finalMakes">0</b></div><div class="stat">命中率<b id="finalAcc">0%</b></div></div><button id="againBtn" class="btn again">再玩一次</button><button id="homeBtn" class="btn back">回首頁</button></div></section><div id="adLayer" class="adLayer"><div class="adBox"><h2>Facebook 獎勵廣告</h2><div id="adSec" class="adSec">3</div><p>播放完成即可獲得 BUFF</p></div></div></div><script>(()=>{'use strict';const $=id=>document.getElementById(id),screens=['home','buff','countdown','game','result'];function show(id){screens.forEach(s=>$(s).classList.toggle('active',s===id));if(id==='game')resizeGame()}const ranks=[['Jason Chen',98765],['Sakura Tanaka',95420],['Mike Johnson',93210],['Minwoo Kim',89775],['Wong Ka Yu',85310],['Jeremy Lim',82465],['Michelle Lee',80245],['Andi Pratama',78690],['Carlos Cruz',76555],['Alex Lin',74210]];$('rows').innerHTML=ranks.map((r,i)=>`<div class="row"><b>${i+1}</b><div class="avatar">${r[0].split(' ').map(x=>x[0]).join('').slice(0,2)}</div><div>${r[0]}</div><div class="pts">${r[1].toLocaleString()}</div></div>`).join('');function fitCanvas(c){const d=Math.min(2,devicePixelRatio||1),w=c.clientWidth,h=c.clientHeight;c.width=w*d;c.height=h*d;const x=c.getContext('2d');x.setTransform(d,0,0,d,0,0);return{x,w,h}}function drawArcadeBg(c,dim=0){const {x:g,w:W,h:H}=fitCanvas(c);let q=g.createLinearGradient(0,0,0,H);q.addColorStop(0,'#080516');q.addColorStop(.48,'#180d2d');q.addColorStop(1,'#05040a');g.fillStyle=q;g.fillRect(0,0,W,H);for(let i=0;i<28;i++){g.fillStyle=`hsla(${260+i*7},90%,65%,${.05+(i%4)*.018})`;g.fillRect((i*71)%W,(i*127)%H,2,H*.32)}g.strokeStyle='#6d3daf';g.lineWidth=9;g.beginPath();g.moveTo(W*.06,H*.11);g.lineTo(W*.15,H*.95);g.moveTo(W*.94,H*.11);g.lineTo(W*.85,H*.95);g.stroke();g.strokeStyle='#1e2331';g.lineWidth=2;for(let i=0;i<13;i++){let y=H*(.16+i*.045);g.beginPath();g.moveTo(W*.07,y);g.lineTo(W*.93,y);g.stroke()}g.fillStyle='#0006';g.fillRect(0,0,W,H*dim)}drawArcadeBg(homeCanvas,.1);drawArcadeBg(buffCanvas,.2);drawArcadeBg(resultCanvas,.2);const c=$('gameCanvas'),g=c.getContext('2d');let W=0,H=0,D=1,last=performance.now(),running=false,stage=1,target=100,time=60,score=0,combo=0,shots=0,makes=0,pointer=null,balls=[],particles=[],message='',messageTime=0,buffs={magnet:0,multi:0},net=0,flash=0;const G=930;function resizeGame(){D=Math.min(2,devicePixelRatio||1);W=c.clientWidth;H=c.clientHeight;c.width=W*D;c.height=H*D;g.setTransform(D,0,0,D,0,0);resetBalls()}addEventListener('resize',()=>{drawArcadeBg(homeCanvas,.1);drawArcadeBg(buffCanvas,.2);drawArcadeBg(resultCanvas,.2);resizeGame()});const hoop=()=>({x:W*.5,y:H*.365,left:W*.414,right:W*.586,r:6}),rackY=()=>H*.82,slotX=i=>W*(.29+i*.105);function makeBall(i){return{id:i,x:slotX(i),y:rackY(),r:Math.max(20,W*.047),vx:0,vy:0,spin:0,mode:'rack',scored:false,hit:false,rt:0,sx:0,sy:0,clone:false}}function resetBalls(){balls=Array.from({length:5},(_,i)=>makeBall(i))}function sync(){stageText.textContent=stage;targetText.textContent=target;timeText.textContent=Math.ceil(time);scoreText.textContent=score;stageTag.textContent='STAGE '+stage;comboTag.textContent='連進 '+combo+' / 10';feedback.textContent=messageTime>0?message:'';buffTags.innerHTML=(buffs.magnet>0?`<div class="pill">🧲 ${buffs.magnet.toFixed(1)}秒</div>`:'')+(buffs.multi>0?`<div class="pill">🏀×2 ${buf -=1.65*vn*nx;b.vy-=1.65*vn*ny;b.hit=true}}}function updateBall(b,dt){if(b.mode==='fly'){let py=b.y,h=hoop();b.vy+=G*dt;if(buffs.magnet>0&&b.vy>0&&b.y<h.y+H*.11){b.vx+=(h.x-b.x)*13*dt;b.vy+=(h.y-b.y)*3.3*dt}b.x+=b.vx*dt;b.y+=b.vy*dt;b.spin+=b.vx*dt*.02;circleHit(b,h.left,h.y,h.r);circleHit(b,h.right,h.y,h.r);if(b.x+b.r>W*.62&&b.x-b.r<W*.64&&b.y>H*.255&&b.y<H*.405&&b.vx>0){b.vx=-Math.abs(b.vx)*.68;b.hit=true}let crossed=py+b.r<h.y&&b.y+b.r>=h.y&&b.vy>0;if(crossed&&b.x>h.left+b.r*.1&&b.x<h.right-b.r*.1)made(b);else if(buffs.magnet>0&&b.vy>0&&Math.abs(b.y-h.y)<H*.075&&Math.abs(b.x-h.x)<W*.16){b.x=h.x;made(b)}if((b.y>H*.69&&b.vy>0)||b.x<-100||b.x>W+100||b.y>H+100)sendBack(b)}else if(b.mode==='return'){b.rt+=dt;let u=Math.min(1,b.rt/.85),e=1-Math.pow(1-u,3);let midY=H*.735;b.x=b.sx+(slotX(b.id)-b.sx)*e;b.y=b.sy+(rackY()-b.sy)*e-Math.sin(Math.PI*u)*(b.sy-midY)*.5;b.spin+=dt*10;if(u>=1)Object.assign(b,makeBall(b.id))}}function update(dt){if(running){time-=dt;if(time<=0){time=0;running=false;finalScore.textContent=score;finalStage.textContent=stage;finalMakes.textContent=makes;finalAcc.textContent=(shots?Math.round(makes/shots*100):0)+'%';show('result')}buffs.magnet=Math.max(0,buffs.magnet-dt);buffs.multi=Math.max(0,buffs.multi-dt);balls.forEach(b=>updateBall(b,dt));balls=balls.filter(b=>b.mode!=='dead')}net=Math.max(0,net-dt);flash=Math.max(0,flash-dt);messageTime=Math.max(0,messageTime-dt);particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=330*dt;p.l-=dt});particles=particles.filter(p=>p.l>0);if(running)sync()}function roundRect(x,y,w,h,r,fill,stroke){g.beginPath();g.roundRect(x,y,w,h,r);if(fill){g.fillStyle=fill;g.fill()}if(stroke){g.strokeStyle=stroke;g.stroke()}}function drawMachine(){let bg=g.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#05030d');bg.addColorStop(.42,'#160823');bg.addColorStop(1,'#030308');g.fillStyle=bg;g.fillRect(0,0,W,H);for(let i=0;i<22;i++){g.fillStyle=`hsla(${250+i*9},90%,60%,.08)`;g.fillRect((i*67)%W,(i*123)%H,2,H*.28)}g.strokeStyle='#7b3c

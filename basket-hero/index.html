<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>Street Hoop</title><style>:root{--h:100dvh}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,"Microsoft JhengHei",sans-serif;overscroll-behavior:none}body{display:flex;justify-content:center}button{font:inherit}#app{position:relative;width:min(100vw,450px);height:var(--h);overflow:hidden;background:#02050a;color:#fff;touch-action:none;-webkit-user-select:none;user-select:none}.screen{position:absolute;inset:0;display:none}.screen.active{display:block}#home{background:radial-gradient(circle at 50% 10%,#25113f,#070510 72%);padding:max(16px,env(safe-area-inset-top)) 14px max(16px,env(safe-area-inset-bottom))}.logo{font-size:clamp(48px,14vw,66px);font-weight:1000;font-style:italic;line-height:.8;letter-spacing:-4px;margin:28px 0 20px;text-shadow:0 5px #7a2b00,0 0 20px #ff7b00}.logo span{display:block;color:#ffae16}.rankbox{position:absolute;top:24%;left:4%;right:4%;bottom:15%;background:#050a14f2;border:2px solid #b48a4f;border-radius:20px;box-shadow:0 0 28px #000b;overflow:hidden}.rankbox h2{height:12%;margin:0;display:flex;align-items:center;justify-content:center;font-size:clamp(21px,6vw,29px)}#rankList{height:88%;display:grid;grid-template-rows:repeat(10,1fr);padding:0 10px 8px}.rankrow{display:grid;grid-template-columns:34px 40px 1fr 86px;align-items:center;gap:7px;border-top:1px solid #ffffff20}.rankrow:first-child{border-top:0}.avatar{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,#ffd88e,#99591f);color:#241100;border:2px solid #ffe3b4;font-weight:1000}.name{font-size:clamp(14px,4vw,18px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pts{font-size:clamp(15px,4.2vw,20px);text-align:right;color:#ffcf34;font-weight:1000}.primary{position:absolute;left:14%;right:14%;bottom:max(18px,env(safe-area-inset-bottom));height:70px;border:0;border-radius:18px;background:linear-gradient(#ffd348,#ef7b09);color:#fff;font-size:clamp(26px,7vw,32px);font-weight:1000;text-shadow:0 3px #792700;box-shadow:0 9px 22px #0009}#buff{background:radial-gradient(circle at 50% 12%,#291644,#08060d 72%);padding:max(16px,env(safe-area-inset-top)) 12px max(16px,env(safe-area-inset-bottom))}.buffpanel{position:absolute;top:10%;left:4%;right:4%;bottom:7%;padding:20px;background:#050a14f2;border:2px solid #b48a4f;border-radius:20px}.buffpanel h2{text-align:center;font-size:31px;margin:0 0 5px}.buffpanel>p{text-align:center;color:#ddd;margin:0 0 18px}.buffgrid{height:59%;display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{display:flex;flex-direction:column;align-items:center;text-align:center;padding:12px 8px;border:2px solid #4d9dff;border-radius:16px;background:linear-gradient(#10263c,#06111d)}.card.green{border-color:#45d268;background:linear-gradient(#123720,#071b11)}.icon{font-size:clamp(54px,15vw,76px);line-height:1;margin:12px 0}.card h3{font-size:clamp(20px,5.6vw,27px);margin:5px 0;color:#ffd23a}.card p{font-size:14px}.adbtn{margin-top:auto;width:100%;height:50px;border:0;border-radius:12px;background:#ffb419;color:#2b1500;font-size:17px;font-weight:1000}.skip{position:absolute;left:14%;right:14%;bottom:5%;height:54px;border:1px solid #7991a2;border-radius:12px;background:#101a22;color:#fff;font-weight:900}#countdown.active{display:flex;align-items:center;justify-content:center;background:#04070c}#countNum{font-size:clamp(150px,43vw,210px);font-weight:1000;color:#ff9812;text-shadow:0 0 28px #ff5400}#game{background:#02050a center/cover no-repeat}#game:after{content:"";position:absolute;inset:0;background:linear-gradient(#0007 0 12%,transparent 29% 72%,#0008 100%);pointer-events:none}canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;z-index:2}.hud{position:absolute;inset:0;z-index:3;pointer-events:none}.topbar{position:absolute;top:max(7px,env(safe-area-inset-top));left:6px;right:6px;height:70px;display:grid;grid-template-columns:repeat(4,1fr);align-items:center;background:rgba(0,7,13,.9);border:1px solid #d0a15e;border-radius:13px}.cell{text-align:center}.cell small{display:block;font-size:10px;color:#ddd}.cell b{font:900 23px/1 monospace;color:#ffb51e}#timeText{color:#fff}.tag{position:absolute;left:9px;padding:8px 10px;border-radius:9px;background:rgba(0,7,13,.88);border:1px solid #d0a15e;font-weight:900}.stage{top:89px}.combo{top:131px;color:#ffb51e}.buffs{position:absolute;top:89px;right:9px;display:flex;flex-direction:column;gap:5px}.pill{padding:7px 9px;border-radius:9px;background:#06111eee;border:1px solid #55a7ff;font-size:12px;font-weight:900}.feedback{position:absolute;top:31%;left:6%;right:6%;text-align:center;color:#ffb51e;font-size:35px;font-weight:1000;text-shadow:0 3px 8px #000}.hint{position:absolute;left:7%;right:7%;bottom:max(10px,env(safe-area-inset-bottom));padding:10px;border-radius:12px;background:rgba(0,7,13,.86);border:1px solid #d0a15e;text-align:center;font-size:14px}#result{background:#02050a center/cover no-repeat}.resultcard{position:absolute;top:20%;left:7%;right:7%;padding:23px;background:rgba(0,7,13,.94);border:2px solid #d0a15e;border-radius:18px;text-align:center}.resultcard h2{font-size:34px;margin:0}.final{font-size:68px;color:#ffb51e;font-weight:1000}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}.stat{padding:10px 5px;background:#0d1822;border-radius:10px;font-size:12px}.stat b{display:block;font-size:23px;color:#ffb51e;margin-top:4px}.action{width:100%;height:53px;margin-top:9px;border:0;border-radius:12px;font-size:18px;font-weight:1000}.again{background:linear-gradient(#ffd348,#ef7b09);color:#2b1500}.homebtn{background:#17374e;color:#fff}#adLayer{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#000e;z-index:20}#adLayer.active{display:flex}.adcard{width:76%;padding:24px;background:#06111e;border:2px solid #d0a15e;border-radius:17px;text-align:center}.adsec{font-size:62px;color:#ffb51e;font-weight:1000}</style></head><body><div id="app"><section id="home" class="screen active"><div class="logo">STREET<span>HOOP</span></div><div class="rankbox"><h2>🏆 TOP 10 PLAYERS</h2><div id="rankList"></div></div><button id="startBtn" class="primary">▶ 開始遊戲</button></section><section id="buff" class="screen"><div class="buffpanel"><h2>選擇一個開局 BUFF</h2><p>遊戲開始更輕鬆</p><div class="buffgrid"><div class="card"><div class="icon">🧲🏀</div><h3>磁鐵球</h3><p>10秒內保證進球</p><button class="adbtn" data-buff="magnet">▶ 觀看廣告</button></div><div class="card green"><div class="icon">🏀×2</div><h3>連續球 ×2</h3><p>20秒內投一顆變兩顆</p><button class="adbtn" data-buff="multi">▶ 觀看廣告</button></div></div><button id="skipBtn" class="skip">不用 BUFF，直接開始</button></div></section><section id="countdown" class="screen"><div id="countNum">3</div></section><section id="game" class="screen"><canvas id="canvas"></canvas><div class="hud"><div class="topbar"><div class="cell"><small>階段</small><b id="stageText">1</b></div><div class="cell"><small>目標</small><b id="targetText">100</b></div><div class="cell"><small>時間</small><b id="timeText">60</b></div><div class="cell"><small>得分</small><b id="scoreText">0</b></div></div><div id="stageTag" class="tag stage">STAGE 1</div><div id="comboTag" class="tag combo">連進 0 / 10</div><div id="buffTags" class="buffs"></div><div id="feedback" class="feedback"></div><div class="hint">從畫面下半部快速往上滑動投籃</div></div></section><section id="result" class="screen"><div class="resultcard"><h2>遊戲結束</h2><div id="finalScore" class="final">0</div><div class="stats"><div class="stat">最高階段<b id="finalStage">1</b></div><div class="stat">進球數<b id="finalMakes">0</b></div><div class="stat">命中率<b id="finalAcc">0%</b></div></div><button id="againBtn" class="action again">再玩一次</button><button id="homeBtn" class="action homebtn">回首頁</button></div></section><div id="adLayer"><div class="adcard"><h2>Facebook 獎勵廣告</h2><div id="adSec" class="adsec">3</div><p>播放完成即可獲得 BUFF</p></div></div></div><script src="assets/play0.js"></script><script src="assets/play1.js"></script><script src="assets/play2.js"></script><script>(()=>{'use strict';const $=i=>document.getElementById(i),screens=['home','buff','countdown','game','result'];function fit(){document.documentElement.style.setProperty('--h',innerHeight+'px')}fit();addEventListener('resize',fit);addEventListener('orientationchange',()=>setTimeout(fit,250));function show(id){screens.forEach(s=>$(s).classList.toggle('active',s===id))}const court='data:image/webp;base64,'+window.__ASSET.play;$('game').style.backgroundImage=`url(${court})`;$('result').style.backgroundImage=`url(${court})`;const ranks=[['Jason Chen',98765],['Sakura Tanaka',95420],['Mike Johnson',93210],['Minwoo Kim',89775],['Thanakorn P.',87530],['Wong Ka Yu',85310],['Jeremy Lim',82465],['Michelle Lee',80245],['Andi Pratama',78690],['Carlos Cruz',76555]];$('rankList').innerHTML=ranks.map((r,i)=>`<div class="rankrow"><b>${i+1}</b><div class="avatar">${r[0].split(' ').map(x=>x[0]).join('').slice(0,2)}</div><div class="name">${r[0]}</div><div class="pts">${r[1].toLocaleString()}</div></div>`).join('');const c=$('canvas'),g=c.getContext('2d');let W=0,H=0,D=1,last=performance.now(),running=false,stage=1,target=100,time=60,score=0,combo=0,shots=0,makes=0,ball=null,returning=null,drag=null,parts=[],msg='',msgT=0,buffs={magnet:0,multi:0};const G=940;function resize(){D=Math.min(2,devicePixelRatio||1);W=c.clientWidth;H=c.clientHeight;c.width=W*D;c.height=H*D;g.setTransform(D,0,0,D,0,0);if(!ball)spawn()}addEventListener('resize',resize);const hoop=()=>({x:W*.5,y:H*.205,l:W*.405,r:W*.595});function spawn(){ball={x:W*.5,y:H*.79,r:Math.max(26,W*.066),vx:0,vy:0,spin:0,state:'ready',scored:false}}function say(t,d=.85){msg=t;msgT=d}function sync(){stageText.textContent=stage;targetText.textContent=target;timeText.textContent=Math.ceil(time);scoreText.textContent=score;stageTag.textContent='STAGE '+stage;comboTag.textContent='連進 '+combo+' / 10';feedback.textContent=msgT>0?msg:'';buffTags.innerHTML=(buffs.magnet>0?`<div class="pill">🧲 ${buffs.magnet.toFixed(1)}秒</div>`:'')+(buffs.multi>0?`<div class="pill">🏀×2 ${buffs.multi.toFixed(1)}秒</div>`:'')}function begin(type){stage=1;target=100;time=60;score=combo=shots=makes=0;buffs={magnet:type==='magnet'?10:0,multi:type==='multi'?20:0};ball=null;returning=null;drag=null;parts=[];spawn();running=true;show('game');sync()}function count(type){show('countdown');let n=3;countNum.textContent=n;const q=setInterval(()=>{n--;if(n===0){clearInterval(q);begin(type)}else countNum.textContent=n},700)}function ad(type){adLayer.classList.add('active');let n=3;adSec.textContent=n;const q=setInterval(()=>{n--;adSec.textContent=n;if(n===0){clearInterval(q);adLayer.classList.remove('active');count(type)}},700)}function randomBuff(){if(Math.random()<.5){buffs.magnet+=10;say('10連進！磁鐵球 +10秒',1.6)}else{buffs.multi+=10;say('10連進！連續球 ×2',1.6)}}function made(b){if(b.scored)return;b.scored=true;score+=buffs.multi>0?4:2;makes++;combo++;say(buffs.multi>0?'雙倍進球！':'進球！');for(let i=0;i<24;i++)parts.push({x:W*.5,y:H*.22,vx:(Math.random()-.5)*250,vy:(Math.random()-.8)*250,l:1});if(combo%10===0)randomBuff();if(score>=target){stage++;target=stage*100;time+=60;say('升級 STAGE '+stage+'｜+60秒',1.9)}}function shoot(dx,dy,ms){if(!ball||ball.state!=='ready')return;const up=-dy;if(up<45){say('請快速往上滑');return}const sec=Math.max(.07,Math.min(.45,ms/1000)),speed=Math.hypot(dx,dy)/sec,p=Math.max(.92,Math.min(1.18,speed/1050)),angle=Math.max(68*Math.PI/180,Math.min(86*Math.PI/180,Math.atan2(up,dx))),v=H*.9*p;ball.vx=Math.cos(angle)*v;ball.vy=-Math.sin(angle)*v;ball.state='fly';shots++}function updateBall(dt){if(!ball)return;if(ball.state==='fly'){const py=ball.y,h=hoop();ball.vy+=G*dt;if(buffs.magnet>0&&ball.vy>0&&ball.y<h.y+H*.13){ball.vx+=(h.x-ball.x)*14*dt;ball.vy+=(h.y-ball.y)*3.2*dt}ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;ball.spin+=ball.vx*dt*.018;const cross=py+ball.r<h.y&&ball.y+ball.r>=h.y&&ball.vy>0;if(cross&&ball.x>h.l&&ball.x<h.r)made(ball);else if(buffs.magnet>0&&ball.vy>0&&Math.abs(ball.y-h.y)<H*.08&&Math.abs(ball.x-h.x)<W*.17){ball.x=h.x;made(ball)}if((ball.y>H*.73&&ball.vy>0)||ball.x<-100||ball.x>W+100||ball.y>H+100){if(!ball.scored){combo=0;say('差一點')}returning={...ball,rt:0,sx:ball.x,sy:ball.y};ball=null;setTimeout(()=>{if(running&&!ball)spawn()},180)}}}function updateReturn(dt){if(!returning)return;returning.rt+=dt;const u=Math.min(1,returning.rt/.72),e=1-Math.pow(1-u,3);returning.x=returning.sx+(W*.5-returning.sx)*e;returning.y=returning.sy+(H*.79-returning.sy)*e+Math.sin(Math.PI*u)*22;returning.spin+=dt*10;if(u>=1)returning=null}function update(dt){if(running){time-=dt;if(time<=0){time=0;running=false;finalScore.textContent=score;finalStage.textContent=stage;finalMakes.textContent=makes;finalAcc.textContent=(shots?Math.round(makes/shots*100):0)+'%';show('result')}buffs.magnet=Math.max(0,buffs.magnet-dt);buffs.multi=Math.max(0,buffs.multi-dt);updateBall(dt);updateReturn(dt)}msgT=Math.max(0,msgT-dt);parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=320*dt;p.l-=dt});parts=parts.filter(p=>p.l>0);if(running)sync()}function drawBall(b){if(!b)return;g.save();g.translate(b.x,b.y);g.rotate(b.spin);g.shadowColor='#000';g.shadowBlur=14;const q=g.createRadialGradient(-b.r*.4,-b.r*.45,2,0,0,b.r);q.addColorStop(0,'#ffd18a');q.addColorStop(.38,'#ec7f27');q.addColorStop(.76,'#9f3c0c');q.addColorStop(1,'#431003');g.fillStyle=q;g.beginPath();g.arc(0,0,b.r,0,Math.PI*2);g.fill();g.shadowBlur=0;g.strokeStyle='#240900';g.lineWidth=2.4;g.beginPath();g.arc(0,0,b.r,0,Math.PI*2);g.stroke();g.beginPath();g.moveTo(-b.r,0);g.lineTo(b.r,0);g.moveTo(0,-b.r);g.bezierCurveTo(-b.r*.72,-b.r*.2,-b.r*.72,b.r*.2,0,b.r);g.moveTo(0,-b.r);g.bezierCurveTo(b.r*.72,-b.r*.2,b.r*.72,b.r*.2,0,b.r);g.stroke();g.restore()}function draw(){g.clearRect(0,0,W,H);if(!running)return;drawBall(returning);drawBall(ball);parts.forEach(p=>{g.globalAlpha=Math.max(0,p.l);g.fillStyle='#ffb51e';g.fillRect(p.x,p.y,5,5)});g.globalAlpha=1}function pt(t){const r=c.getBoundingClientRect();return{x:t.clientX-r.left,y:t.clientY-r.top}}function down(e){if(!running||!ball||ball.state!=='ready')return;const t=e.touches?e.touches[0]:e,z=pt(t);if(z.y<H*.42)return;e.preventDefault();drag={sx:z.x,sy:z.y,t:performance.now()}}function move(e){if(drag)e.preventDefault()}function up(e){if(!drag)return;e.preventDefault();const t=e.changedTouches?e.changedTouches[0]:e,z=pt(t);shoot(z.x-drag.sx,z.y-drag.sy,performance.now()-drag.t);drag=null}c.addEventListener('touchstart',down,{passive:false});c.addEventListener('touchmove',move,{passive:false});c.addEventListener('touchend',up,{passive:false});c.addEventListener('touchcancel',()=>drag=null,{passive:false});c.addEventListener('pointerdown',e=>{if(e.pointerType!=='touch')down(e)});c.addEventListener('pointermove',e=>{if(e.pointerType!=='touch')move(e)});c.addEventListener('pointerup',e=>{if(e.pointerType!=='touch')up(e)});startBtn.onclick=()=>show('buff');skipBtn.onclick=()=>count('none');document.querySelectorAll('[data-buff]').forEach(b=>b.onclick=()=>ad(b.dataset.buff));againBtn.onclick=()=>show('buff');homeBtn.onclick=()=>show('home');function loop(n){const dt=Math.min(.033,(n-last)/1000);last=n;update(dt);draw();requestAnimationFrame(loop)}resize();requestAnimationFrame(loop)})();</script></body></html>

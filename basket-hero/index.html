<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Street Hoop</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050508;font-family:Arial,"Microsoft JhengHei",sans-serif}body{display:flex;justify-content:center}#app{position:relative;width:min(100vw,480px);height:100dvh;overflow:hidden;background:radial-gradient(circle at 50% 20%,#39205c 0,#160d2d 38%,#050508 75%)}.screen{position:absolute;inset:0;display:none;color:#fff}.show{display:block}.logo{font-size:44px;font-weight:1000;font-style:italic;line-height:.88;margin:22px 16px 12px;text-shadow:0 4px #6b2700,0 0 18px #ff8a00}.logo b{display:block}.logo span{color:#ffb21d}.panel{margin:0 14px;background:#070b17e8;border:2px solid #7950ad;border-radius:16px;box-shadow:0 0 22px #7b37ff55}h2{text-align:center;margin:12px 0}.rank{padding:5px 8px}.row{display:grid;grid-template-columns:32px 38px 1fr 80px;align-items:center;gap:7px;padding:6px;border-bottom:1px solid #ffffff18}.avatar{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,#ffd27d,#7b3d17);color:#251000;font-weight:900;border:2px solid #fff8}.pts{text-align:right;color:#ffd439;font-weight:900}.start{position:absolute;left:15%;right:15%;bottom:24px;height:70px;border:0;border-radius:17px;background:linear-gradient(#ffd24c,#ed720b);color:#fff;font-size:28px;font-weight:1000;text-shadow:0 3px #7c2900}#buff{padding-top:18%}.buffgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}.buff{padding:12px;text-align:center;border:2px solid #4e95ff;border-radius:15px;background:#07111ef0}.buff.green{border-color:#47d867}.icon{font-size:48px}.buff button{width:100%;padding:11px;border:0;border-radius:10px;background:#ffb51c;color:#2c1700;font-weight:900}.skip{display:block;width:70%;margin:12px auto;padding:12px;border:0;border-radius:11px;background:#555;color:#fff;font-weight:900}#count{display:flex;align-items:center;justify-content:center;font-size:145px;font-weight:1000;color:#ff9916;text-shadow:0 0 24px #ff5200}#play{background:linear-gradient(#150c2a66,#09061322)}#court{position:absolute;inset:0;background:linear-gradient(165deg,transparent 0 45%,#24162f 46% 100%);overflow:hidden}#court:before{content:"STREET HOOP";position:absolute;top:20%;left:14%;right:14%;height:22%;border-radius:18px;background:linear-gradient(135deg,#ef3d65,#7439dc,#0dbbdd);display:grid;place-items:center;font-size:43px;font-weight:1000;text-align:center;text-shadow:0 4px #311148;border:3px solid #ddd}#court:after{content:"";position:absolute;top:36%;left:39%;width:22%;height:10px;background:#ff6b15;border-radius:50%;box-shadow:0 16px 0 -4px #ddd,0 28px 0 -6px #ddd}canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}.top{position:absolute;top:9px;left:9px;right:9px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:7px;background:#050713e8;border:2px solid #7651a7;border-radius:13px;pointer-events:none}.cell{text-align:center}.cell small{display:block;font-size:10px;color:#ddd}.cell b{font-size:21px;color:#ffd43a;font-family:monospace}#time{color:#ff4938}#stage,#combo,#feedback{position:absolute;background:#000c;border-radius:9px;padding:7px 10px;font-weight:900;pointer-events:none}#stage{top:88px;left:12px}#combo{top:128px;left:12px;color:#ffb42a}#feedback{top:31%;left:10%;right:10%;text-align:center;background:transparent;font-size:31px;text-shadow:0 3px 7px #000}#buffs{position:absolute;top:88px;right:12px;display:flex;flex-direction:column;gap:5px;pointer-events:none}.pill{background:#07111eed;border:1px solid #4ea7ff;border-radius:9px;padding:7px;font-size:12px}#result{padding-top:35%}.result{padding:20px;text-align:center}.final{font-size:55px;color:#ffb31e;font-weight:1000}.btn{width:100%;padding:13px;border:0;border-radius:11px;margin-top:10px;font-size:18px;font-weight:900}.again{background:#ffae18;color:#2c1600}.homebtn{background:#3174d8;color:#fff}#ad{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#000e;color:#fff;z-index:20}#ad.on{display:flex}.adbox{width:75%;padding:24px;text-align:center}.adn{font-size:55px;color:#ffd439;font-weight:1000}</style></head><body><div id="app"><section id="home" class="screen show"><div class="logo"><b>STREET</b><span>HOOP</span></div><div class="panel"><h2>🏆 TOP 10 PLAYERS</h2><div id="ranks" class="rank"></div></div><button id="start" class="start">▶ 開始遊戲</button></section><section id="buff" class="screen"><div class="panel"><h2>選擇開局 BUFF</h2><div class="buffgrid"><div class="buff"><div class="icon">🧲</div><h3>磁鐵球</h3><p>10秒內保證進球</p><button data-b="magnet">▶ 看廣告</button></div><div class="buff green"><div class="icon">🏀🏀</div><h3>連續球 ×2</h3><p>20秒投一顆變兩顆</p><button data-b="multi">▶ 看廣告</button></div></div><button id="skip" class="skip">不用BUFF，直接開始</button></div></section><section id="count" class="screen">3</section><section id="play" class="screen"><div id="court"></div><canvas id="game"></canvas><div class="top"><div class="cell"><small>階段</small><b id="st">1</b></div><div class="cell"><small>目標</small><b id="tar">100</b></div><div class="cell"><small>時間</small><b id="time">60</b></div><div class="cell"><small>得分</small><b id="sc">0</b></div></div><div id="stage">STAGE 1</div><div id="combo">連進 0 / 10</div><div id="buffs"></div><div id="feedback"></div></section><section id="result" class="screen"><div class="panel result"><h2>遊戲結束</h2><div id="final" class="final">0</div><p id="stats"></p><button id="again" class="btn again">再玩一次</button><button id="back" class="btn homebtn">回首頁</button></div></section><div id="ad"><div class="panel adbox"><h2>Facebook 獎勵廣告</h2><div id="adn" class="adn">3</div><p>播放完成即可獲得BUFF</p></div></div></div><script>(()=>{'use strict';const $=i=>document.getElementById(i),views=['home','buff','count','play','result'];function show(i){views.forEach(v=>$(v).classList.toggle('show',v===i))}const data=[['Jason Chen',98765],['Sakura Tanaka',95420],['Mike Johnson',93210],['Minwoo Kim',89775],['Wong Ka Yu',85310],['Jeremy Lim',82465],['Michelle Lee',80245],['Andi Pratama',78690],['Carlos Cruz',76555],['Alex Lin',74210]];$('ranks').innerHTML=data.map((r,i)=>`<div class="row"><b>${i+1}</b><div class="avatar">${r[0].split(' ').map(x=>x[0]).join('').slice(0,2)}</div><div>${r[0]}</div><div class="pts">${r[1].toLocaleString()}</div></div>`).join('');const c=$('game'),g=c.getContext('2d');let W=0,H=0,D=1,last=performance.now(),run=false,stage=1,target=100,t=60,score=0,combo=0,shots=0,makes=0,p=null,balls=[],fx=[],msg='',mt=0,buff={magnet:0,multi:0};const G=900;function resize(){D=Math.min(2,devicePixelRatio||1);W=c.clientWidth;H=c.clientHeight;c.width=W*D;c.height=H*D;g.setTransform(D,0,0,D,0,0);reset()}addEventListener('resize',resize);const hoop=()=>({x:W*.5,y:H*.37,l:W*.425,r:W*.575}),slot=i=>W*(.3+i*.1),ry=()=>H*.83;function ball(i){return{id:i,x:slot(i),y:ry(),r:Math.max(19,W*.047),vx:0,vy:0,spin:0,m:'rack',ok:false,rt:0,sx:0,sy:0,clone:false}}function reset(){balls=Array.from({length:5},(_,i)=>ball(i))}function sync(){$('st').textContent=stage;$('tar').textContent=target;$('time').textContent=Math.ceil(t);$('sc').textContent=score;$('stage').textContent='STAGE '+stage;$('combo').textContent='連進 '+combo+' / 10';$('feedback').textContent=mt>0?msg:'';$('buffs').innerHTML=(buff.magnet>0?`<div class="pill">🧲 ${buff.magnet.toFixed(1)}秒</div>`:'')+(buff.multi>0?`<div class="pill">🏀×2 ${buff.multi.toFixed(1)}秒</div>`:'')}function begin(b){stage=1;target=100;t=60;score=combo=shots=makes=0;buff={magnet:b==='magnet'?10:0,multi:b==='multi'?20:0};reset();fx=[];p=null;run=true;show('play');sync()}function countdown(b){show('count');let n=3;$('count').textContent=n;let q=setInterval(()=>{n--;if(n<1){clearInterval(q);begin(b)}else $('count').textContent=n},650)}function ad(b){$('ad').classList.add('on');let n=3;$('adn').textContent=n;let q=setInterval(()=>{n--;$('adn').textContent=n;if(n<1){clearInterval(q);$('ad').classList.remove('on');countdown(b)}},650)}function say(s,d=.8){msg=s;mt=d}function award(){if(Math.random()<.5){buff.magnet+=10;say('獲得磁鐵球 10秒',1.5)}else{buff.multi+=10;say('獲得連續球 ×2 10秒',1.5)}}function launch(b,dx,dy,ms){let up=-dy;if(up<26){say('往上滑快一點');p=null;return}let sec=Math.max(.06,Math.min(.45,ms/1000)),sp=Math.hypot(dx,dy)/sec,n=Math.max(.88,Math.min(1.16,sp/1000)),a=Math.max(65*Math.PI/180,Math.min(84*Math.PI/180,Math.atan2(up,dx))),v=H*.84*n;b.vx=Math.cos(a)*v;b.vy=-Math.sin(a)*v;b.m='fly';b.ok=false;shots++;if(buff.multi>0){let z=ball(999);z.x=b.x+8;z.y=b.y;z.vx=b.vx-22;z.vy=b.vy;z.m='fly';z.clone=true;balls.push(z)}p=null}function made(b){if(b.ok)return;b.ok=true;score+=2;makes++;combo++;say('進球！');for(let i=0;i<18;i++)fx.push({x:W*.5,y:H*.38,vx:(Math.random()-.5)*220,vy:(Math.random()-.7)*220,l:1});if(combo%10===0)award();if(score>=target){stage++;target=stage*100;t+=60;say('升級 STAGE '+stage+'｜+60秒',1.8)}}function backBall(b){if(!b.ok&&!b.clone){combo=0;say('沒進')}if(b.clone){b.m='dead';return}b.m='return';b.rt=0;b.sx=b.x;b.sy=b.y;b.vx=b.vy=0}function updB(b,dt){if(b.m==='fly'){let py=b.y,h=hoop();b.vy+=G*dt;if(buff.magnet>0&&b.vy>0&&b.y<h.y+H*.11){b.vx+=(h.x-b.x)*12*dt;b.vy+=(h.y-b.y)*3*dt}b.x+=b.vx*dt;b.y+=b.vy*dt;b.spin+=b.vx*dt*.02;let cross=py+b.r<h.y&&b.y+b.r>=h.y&&b.vy>0;if(cross&&b.x>h.l&&b.x<h.r)made(b);else if(buff.magnet>0&&b.vy>0&&Math.abs(b.y-h.y)<H*.08&&Math.abs(b.x-h.x)<W*.15){b.x=h.x;made(b)}if((b.y>H*.72&&b.vy>0)||b.x<-90||b.x>W+90||b.y>H+90)backBall(b)}else if(b.m==='return'){b.rt+=dt;let u=Math.min(1,b.rt/.7),e=1-Math.pow(1-u,3);b.x=b.sx+(slot(b.id)-b.sx)*e;b.y=b.sy+(ry()-b.sy)*e+Math.sin(Math.PI*u)*22;b.spin+=dt*9;if(u>=1)Object.assign(b,ball(b.id))}}function update(dt){if(run){t-=dt;if(t<=0){t=0;run=false;$('final').textContent=score;$('stats').textContent=`最高階段 ${stage}｜進球 ${makes}/${shots}`;show('result')}buff.magnet=Math.max(0,buff.magnet-dt);buff.multi=Math.max(0,buff.multi-dt);balls.forEach(b=>updB(b,dt));balls=balls.filter(b=>b.m!=='dead')}mt=Math.max(0,mt-dt);fx.forEach(x=>{x.x+=x.vx*dt;x.y+=x.vy*dt;x.vy+=300*dt;x.l-=dt});fx=fx.filter(x=>x.l>0);if(run)sync()}function drawBall(b){g.save();g.translate(b.x,b.y);g.rotate(b.spin);g.shadowColor='#000';g.shadowBlur=10;let q=g.createRadialGradient(-b.r*.4,-b.r*.45,2,0,0,b.r);q.addColorStop(0,'#ffd99b');q.addColorStop(.4,'#f58a2c');q.addColorStop(1,'#641b05');g.fillStyle=q;g.beginPath();g.arc(0,0,b.r,0,7);g.fill();g.shadowBlur=0;g.strokeStyle='#2b0d04';g.lineWidth=2;g.beginPath();g.arc(0,0,b.r,0,7);g.stroke();g.beginPath();g.moveTo(-b.r,0);g.lineTo(b.r,0);g.moveTo(0,-b.r);g.bezierCurveTo(-b.r*.7,-b.r*.2,-b.r*.7,b.r*.2,0,b.r);g.moveTo(0,-b.r);g.bezierCurveTo(b.r*.7,-b.r*.2,b.r*.7,b.r*.2,0,b.r);g.stroke();g.restore()}function draw(){g.clearRect(0,0,W,H);if(!run)return;g.fillStyle='#9b5736';g.globalAlpha=.9;g.beginPath();g.ellipse(W*.39,H*.93,W*.075,H*.06,-.35,0,7);g.fill();g.beginPath();g.ellipse(W*.61,H*.93,W*.075,H*.06,.35,0,7);g.fill();g.globalAlpha=1;balls.forEach(drawBall);fx.forEach(x=>{g.globalAlpha=Math.max(0,x.l);g.fillStyle='#ffd334';g.fillRect(x.x,x.y,5,5)});g.globalAlpha=1}function pos(e){let r=c.getBoundingClientRect(),u=e.touches?e.touches[0]:e;return{x:u.clientX-r.left,y:u.clientY-r.top}}function down(e){if(!run)return;e.preventDefault();let z=pos(e),b=null,d=1e9;for(let x of balls)if(x.m==='rack'){let k=Math.hypot(z.x-x.x,z.y-x.y);if(k<d){d=k;b=x}}if(b&&d<120)p={b,sx:z.x,sy:z.y,t:performance.now()}}function up(e){if(!p)return;e.preventDefault();let r=c.getBoundingClientRect(),u=e.changedTouches?e.changedTouches[0]:e;launch(p.b,u.clientX-r.left-p.sx,u.clientY-r.top-p.sy,performance.now()-p.t)}c.addEventListener('touchstart',down,{passive:false});c.addEventListener('touchend',up,{passive:false});c.addEventListener('pointerdown',e=>{if(e.pointerType!=='touch')down(e)});c.addEventListener('pointerup',e=>{if(e.pointerType!=='touch')up(e)});$('start').onclick=()=>show('buff');$('skip').onclick=()=>countdown('none');document.querySelectorAll('[data-b]').forEach(x=>x.onclick=()=>ad(x.dataset.b));$('again').onclick=()=>show('buff');$('back').onclick=()=>show('home');function loop(n){let dt=Math.min(.033,(n-last)/1000);last=n;update(dt);draw();requestAnimationFrame(loop)}resize();requestAnimationFrame(loop)})();</script></body></html>

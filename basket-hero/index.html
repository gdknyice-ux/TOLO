<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Street Basket</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:#080808;font-family:Arial,"Microsoft JhengHei",sans-serif}body{display:flex;justify-content:center}.wrap{position:relative;width:min(100vw,480px);height:100vh;background:#15100d}canvas{display:block;width:100%;height:100%;touch-action:none}.hud{position:absolute;inset:0;color:#fff;pointer-events:none}.scoreboard{margin:10px;background:#190404;border:5px solid #58210f;border-radius:16px;display:grid;grid-template-columns:repeat(3,1fr);padding:8px}.digit{text-align:center;color:#ff4d2b;text-shadow:0 0 10px #ff3a00;font-family:monospace}.digit span{display:block;font-size:11px;color:#ffd6ca}.digit b{font-size:30px}.stage{position:absolute;top:100px;left:12px;background:#000c;border-radius:9px;padding:7px 10px;font-weight:900}.message{position:absolute;top:142px;left:0;right:0;text-align:center;font-size:28px;font-weight:1000;text-shadow:0 3px 8px #000}.tip{position:absolute;bottom:12px;left:12px;right:12px;background:#000c;border-radius:11px;padding:9px;text-align:center;font-size:13px}.overlay{position:absolute;inset:0;background:#090909eb;display:flex;align-items:center;justify-content:center;padding:22px;color:#fff}.hidden{display:none}.card{width:100%;max-width:390px;background:linear-gradient(#292929,#121212);border:3px solid #6b2d16;border-radius:22px;padding:22px;text-align:center}.logo{font-size:40px;font-weight:1000;line-height:1;color:#ffbe37;text-shadow:0 4px 0 #6c2700}.sub{opacity:.82;margin:10px 0}.btn{width:100%;border:0;border-radius:14px;padding:14px;margin-top:12px;font-size:18px;font-weight:900;background:linear-gradient(#ffdc55,#f28b16);color:#3d2100}.btn.blue{background:linear-gradient(#65c8ff,#2776d3);color:#fff}.btn.gray{background:#555;color:#fff}.adbox{height:110px;border-radius:14px;background:linear-gradient(135deg,#333,#666);display:flex;align-items:center;justify-content:center;margin:12px 0;font-weight:900}</style></head><body><div class="wrap"><canvas id="game"></canvas><div class="hud"><div class="scoreboard"><div class="digit"><span>SCORE</span><b id="score">000</b></div><div class="digit"><span>TIME</span><b id="time">60</b></div><div class="digit"><span>TARGET</span><b id="target">40</b></div></div><div class="stage" id="stage">STAGE 1</div><div class="message" id="message"></div><div class="tip" id="tip">從下方球架抓球，快速向上滑動投籃。</div></div><div class="overlay" id="menu"><div class="card"><div class="logo">STREET<br>BASKET</div><div class="sub">街頭投籃機・連續出手・球道回球</div><button class="btn" id="start">開始投籃</button><button class="btn blue" id="how">玩法說明</button></div></div><div class="overlay hidden" id="modal"><div class="card" id="modalCard"></div></div></div><script>(()=>{'use strict';const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),$=id=>document.getElementById(id);let W=0,H=0,dpr=1,last=performance.now(),pointer=null;function resize(){dpr=Math.min(2,devicePixelRatio||1);W=canvas.clientWidth;H=canvas.clientHeight;canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',resize);resize();const state={running:false,score:0,time:60,stage:1,target:40,combo:0,best:Number(localStorage.getItem('streetBasketBest')||0),revived:false};let balls=[],particles=[];const rackY=()=>H*.83;function slotX(i){return W*(.18+i*.16)}function newBall(i){return{id:i,x:slotX(i),y:rackY(),r:18,vx:0,vy:0,mode:'rack',scored:false,spin:0,returnT:0}}function resetBalls(){balls=Array.from({length:5},(_,i)=>newBall(i))}function startGame(){Object.assign(state,{running:true,score:0,time:60,stage:1,target:40,combo:0,revived:false});resetBalls();particles=[];pointer=null;$('menu').classList.add('hidden');$('modal').classList.add('hidden');sync()}function sync(){$('score').textContent=String(state.score).padStart(3,'0');$('time').textContent=Math.max(0,Math.ceil(state.time));$('target').textContent=state.target;$('stage').textContent='STAGE '+state.stage;$('message').textContent=state.combo>=3?`COMBO x${state.combo}`:state.time<=10?'FINAL 10 SEC!':'';$('tip').textContent=state.time<=10?'最後10秒，每球4分！':'從下方球架抓球，向上滑動連續投籃。'}function shoot(b,px,py){const dx=b.x-px,dy=b.y-py,force=Math.max(.75,Math.min(1.7,Math.hypot(dx,dy)/120));b.vx=dx*4.3*force;b.vy=dy*4.3*force;b.mode='flight';b.scored=false;pointer=null}function scored(b){b.scored=true;state.combo++;state.score+=state.time<=10?4:2;if(state.combo>=5)state.score++;burst(W*.5,H*.34);sync()}function missed(){state.combo=0;sync()}function beginReturn(b){if(!b.scored)missed();b.mode='return';b.returnT=0;b.vx=0;b.vy=0}function updateBall(b,dt){if(b.mode==='flight'){b.vy+=760*dt;b.x+=b.vx*dt;b.y+=b.vy*dt;b.spin+=dt*8;const rimY=H*.34,rimL=W*.39,rimR=W*.61;if(!b.scored&&b.vy>0&&b.y-b.r<rimY&&b.y+b.r>=rimY&&b.x>rimL&&b.x<rimR)scored(b);if(b.y>H*.7&&b.vy>0)beginReturn(b);else if(b.x<-70||b.x>W+70||b.y>H+70)beginReturn(b)}else if(b.mode==='return'){b.returnT+=dt;const t=Math.min(1,b.returnT/.72);const sx=b.x,sy=Math.max(b.y,H*.7);const tx=slotX(b.id),ty=rackY();const ease=1-Math.pow(1-t,3);b.x=sx+(tx-sx)*ease;b.y=sy+(ty-sy)*ease+Math.sin(t*Math.PI)*22;b.spin+=dt*10;if(t>=1){Object.assign(b,newBall(b.id))}}}function update(dt){if(!state.running)return;state.time-=dt;if(state.time<=0){state.time=0;finishRound();return}balls.forEach(b=>updateBall(b,dt));particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=300*dt;p.life-=dt});particles=particles.filter(p=>p.life>0);sync()}function finishRound(){state.running=false;if(state.score>=state.target){state.stage++;state.target+=35;state.time=35;state.combo=0;state.running=true;$('message').textContent='STAGE CLEAR! +35 SEC';setTimeout(()=>{if(state.running)sync()},1000)}else gameOver()}function gameOver(){if(state.score>state.best){state.best=state.score;localStorage.setItem('streetBasketBest',state.best)}$('modalCard').innerHTML=`<h2>時間到！</h2><div style="font-size:46px;font-weight:1000;color:#ffbd38">${state.score} 分</div><p>最高分：${state.best}</p>${!state.revived?'<button class="btn blue" id="revive">看廣告 +15 秒</button>':''}<button class="btn" id="again">再玩一次</button><button class="btn gray" id="home">回主畫面</button>`;$('modal').classList.remove('hidden');const r=$('revive');if(r)r.onclick=showAd;$('again').onclick=startGame;$('home').onclick=()=>{$('modal').classList.add('hidden');$('menu').classList.remove('hidden')}}function showAd(){$('modalCard').innerHTML='<h2>模擬獎勵廣告</h2><div class="adbox" id="adcount">廣告 3 秒</div><button class="btn gray" disabled>播放中...</button>';let n=3;const timer=setInterval(()=>{n--;$('adcount').textContent=`廣告 ${n} 秒`;if(n<=0){clearInterval(timer);state.revived=true;state.time=15;state.running=true;$('modal').classList.add('hidden');sync()}},1000)}function drawMachine(){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#22120d');g.addColorStop(.55,'#4b1b0e');g.addColorStop(1,'#100b09');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='#341207';ctx.fillRect(20,H*.18,W-40,H*.56);ctx.strokeStyle='#8d3917';ctx.lineWidth=8;ctx.strokeRect(20,H*.18,W-40,H*.56);for(let y=H*.2;y<H*.7;y+=36){ctx.strokeStyle='#ffffff10';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(24,y);ctx.lineTo(W-24,y);ctx.stroke()}ctx.fillStyle='#eee';ctx.fillRect(W*.37,H*.22,W*.34,H*.18);ctx.strokeStyle='#ff6900';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(W*.39,H*.34);ctx.lineTo(W*.61,H*.34);ctx.stroke();ctx.strokeStyle='#ddd';ctx.lineWidth=2;for(let i=-3;i<=3;i++){ctx.beginPath();ctx.moveTo(W*.5+i*13,H*.345);ctx.lineTo(W*.5+i*8,H*.41);ctx.stroke()}ctx.beginPath();ctx.moveTo(W*.39,H*.345);ctx.lineTo(W*.44,H*.41);ctx.lineTo(W*.56,H*.41);ctx.lineTo(W*.61,H*.345);ctx.stroke();ctx.fillStyle='#4c2012';ctx.beginPath();ctx.moveTo(0,H*.74);ctx.lineTo(W,H*.74);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();ctx.strokeStyle='#d0783d';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(0,H*.78);ctx.quadraticCurveTo(W*.5,H*.72,W,H*.78);ctx.stroke();ctx.strokeStyle='#7e3b20';ctx.lineWidth=4;for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(i*W/5,H*.78);ctx.lineTo(i*W/5,H);ctx.stroke()}}function drawBall(b){ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.spin);ctx.fillStyle='#ef7b22';ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#4c210c';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(-b.r,0);ctx.lineTo(b.r,0);ctx.moveTo(0,-b.r);ctx.bezierCurveTo(-b.r*.7,-b.r*.2,-b.r*.7,b.r*.2,0,b.r);ctx.moveTo(0,-b.r);ctx.bezierCurveTo(b.r*.7,-b.r*.2,b.r*.7,b.r*.2,0,b.r);ctx.stroke();ctx.restore()}function drawAim(){if(!pointer)return;ctx.strokeStyle='#ffffffaa';ctx.lineWidth=3;ctx.setLineDash([7,7]);ctx.beginPath();ctx.moveTo(pointer.ball.x,pointer.ball.y);ctx.lineTo(pointer.x,pointer.y);ctx.stroke();ctx.setLineDash([])}function burst(x,y){for(let i=0;i<18;i++)particles.push({x,y,vx:(Math.random()-.5)*240,vy:(Math.random()-.5)*220,life:1})}function pos(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}canvas.addEventListener('pointerdown',e=>{if(!state.running)return;const p=pos(e);let chosen=null,d=999;for(const b of balls){if(b.mode==='rack'){const dd=Math.hypot(p.x-b.x,p.y-b.y);if(dd<d){d=dd;chosen=b}}}if(chosen&&d<70)pointer={ball:chosen,x:p.x,y:p.y}});canvas.addEventListener('pointermove',e=>{if(pointer){const p=pos(e);pointer.x=p.x;pointer.y=p.y}});canvas.addEventListener('pointerup',e=>{if(pointer){const p=pos(e);shoot(pointer.ball,p.x,p.y)}});$('start').onclick=startGame;$('how').onclick=()=>{$('modalCard').innerHTML='<h2>玩法說明</h2><p>抓住球架上的籃球往上滑。籃球會飛向籃框，落下後沿球道滾回原位。60秒內達到目標分數即可進入下一關。</p><button class="btn" id="closeHow">知道了</button>';$('modal').classList.remove('hidden');$('closeHow').onclick=()=>$('modal').classList.add('hidden')};function loop(t){const dt=Math.min(.033,(t-last)/1000);last=t;update(dt);drawMachine();balls.forEach(drawBall);drawAim();particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle='#ffd84d';ctx.fillRect(p.x,p.y,6,6)});ctx.globalAlpha=1;requestAnimationFrame(loop)}resetBalls();sync();requestAnimationFrame(loop)})();</script></body></html>

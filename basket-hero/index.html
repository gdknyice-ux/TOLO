<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Street Hoop</title>
<style>
:root{--h:100dvh}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,"Microsoft JhengHei",sans-serif;overscroll-behavior:none}
body{display:flex;justify-content:center}
button{font:inherit}
#app{position:relative;width:min(100vw,480px);height:var(--h);overflow:hidden;background:#020204;color:#fff;touch-action:none;-webkit-user-select:none;user-select:none}
.screen{position:absolute;inset:0;display:none}.screen.active{display:block}
#home{background:linear-gradient(#08040d,#030205)}
.logo{position:absolute;top:max(5.5%,env(safe-area-inset-top));left:6%;font-size:clamp(52px,15vw,72px);font-weight:1000;font-style:italic;line-height:.78;letter-spacing:-4px;text-shadow:0 5px #7a2b00,0 0 22px #ff7b00}
.logo span{display:block;color:#ffae16}
.rankbox{position:absolute;top:25%;left:5%;right:5%;bottom:14%;background:#050816f4;border:3px solid #8251b8;border-radius:22px;box-shadow:0 0 28px #7e3bff50;overflow:hidden}
.rankbox h2{height:12%;margin:0;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,6vw,30px)}
#rankList{height:88%;display:grid;grid-template-rows:repeat(10,1fr);padding:0 11px 8px}
.rankrow{display:grid;grid-template-columns:34px 42px 1fr 90px;align-items:center;gap:7px;border-top:1px solid #ffffff20;min-height:0}
.rankrow:first-child{border-top:0}.rankno{font-weight:900;font-size:20px}
.avatar{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,#ffd88e,#99591f);color:#241100;border:2px solid #ffe3b4;font-weight:1000}
.name{font-size:clamp(14px,4vw,19px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pts{font-size:clamp(15px,4.2vw,20px);text-align:right;color:#ffcf34;font-weight:1000}
.primary{position:absolute;left:14%;right:14%;bottom:max(18px,env(safe-area-inset-bottom));height:72px;border:0;border-radius:19px;background:linear-gradient(#ffd348,#ef7b09);color:#fff;font-size:clamp(27px,7vw,34px);font-weight:1000;text-shadow:0 3px #792700;box-shadow:0 8px 24px #000b}
#buff{background:#03040a}
.buffpanel{position:absolute;top:12%;left:5%;right:5%;bottom:8%;padding:18px;background:#050816f5;border:3px solid #8251b8;border-radius:22px}
.buffpanel h2{text-align:center;font-size:clamp(28px,7.5vw,37px);margin:0 0 8px}.buffpanel>p{text-align:center;color:#ddd;margin:0 0 18px;font-size:17px}
.buffgrid{height:62%;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{display:flex;flex-direction:column;align-items:center;text-align:center;padding:14px 9px;border:2px solid #4d9dff;border-radius:18px;background:linear-gradient(#10263c,#06111d)}
.card.green{border-color:#45d268;background:linear-gradient(#123720,#071b11)}
.icon{font-size:clamp(58px,16vw,82px);line-height:1;margin:12px 0}.card h3{font-size:clamp(21px,5.8vw,28px);margin:5px 0;color:#ffd23a}.card p{font-size:15px;line-height:1.5}
.adbtn{margin-top:auto;width:100%;height:52px;border:0;border-radius:13px;background:#ffb419;color:#2b1500;font-size:17px;font-weight:1000}
.skip{position:absolute;left:14%;right:14%;bottom:5%;height:56px;border:0;border-radius:14px;background:#606060;color:#fff;font-size:17px;font-weight:1000}
#countdown.active{display:flex;align-items:center;justify-content:center;background:#030308}
#countNum{font-size:clamp(150px,44vw,220px);font-weight:1000;color:#ff9812;text-shadow:0 0 30px #ff5400}
#game{background:#000 center/cover no-repeat}
canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;z-index:2}
.hud{position:absolute;inset:0;z-index:3;pointer-events:none}
.topbar{position:absolute;top:max(7px,env(safe-area-inset-top));left:6px;right:6px;height:68px;display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:6px}
.box{display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,5,10,.92);border:2px solid #7e8791;border-radius:10px;box-shadow:inset 0 0 12px #000}
.box small{font-size:11px;color:#eee}.box b{font:900 25px/1 monospace;color:#ffd43a}.box.time b{font-size:36px;color:#ff2828;text-shadow:0 0 10px #f00}
.leftpanel{position:absolute;top:87px;left:8px;width:105px;padding:9px;background:rgba(0,5,10,.92);border:2px solid #7e8791;border-radius:10px;text-align:center}
.leftpanel small{display:block;color:#ddd}.leftpanel b{font:900 28px monospace;color:#fff}
.combo{position:absolute;top:98px;right:9px;text-align:center;color:#ffb51e;font-weight:1000;font-size:17px;text-shadow:0 2px #000}
.combo b{display:block;font-size:48px;color:#ff7b0a;-webkit-text-stroke:2px #661500}
.feedback{position:absolute;top:31%;left:7%;right:7%;text-align:center;color:#ffd23a;font-size:36px;font-weight:1000;text-shadow:0 3px 9px #000}
.hint{position:absolute;left:12%;right:12%;bottom:max(12px,env(safe-area-inset-bottom));padding:10px;border-radius:12px;background:rgba(0,5,10,.86);border:1px solid #888;text-align:center;font-size:15px}
#result{background:#040308}
.resultcard{position:absolute;top:21%;left:7%;right:7%;padding:24px;background:#050816f5;border:3px solid #8251b8;border-radius:20px;text-align:center}
.resultcard h2{font-size:35px;margin:0}.final{font-size:70px;color:#ffb51e;font-weight:1000}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:17px 0}.stat{padding:10px 5px;background:#101629;border-radius:10px;font-size:12px}.stat b{display:block;font-size:24px;color:#ffd43a;margin-top:4px}
.action{width:100%;height:54px;margin-top:9px;border:0;border-radius:12px;font-size:18px;font-weight:1000}.again{background:linear-gradient(#ffd348,#ef7b09);color:#2b1500}.homebtn{background:#244e75;color:#fff}
#adLayer{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#000e;z-index:20}#adLayer.active{display:flex}
.adcard{width:76%;padding:24px;background:#06111e;border:2px solid #d0a15e;border-radius:17px;text-align:center}.adsec{font-size:62px;color:#ffb51e;font-weight:1000}
</style></head><body>
<div id="app">
<section id="home" class="screen active"><div class="logo">STREET<span>HOOP</span></div><div class="rankbox"><h2>🏆 TOP 10 PLAYERS</h2><div id="rankList"></div></div><button id="startBtn" class="primary">▶ 開始遊戲</button></section>
<section id="buff" class="screen"><div class="buffpanel"><h2>選擇開局 BUFF</h2><p>看廣告取得一項開局優勢</p><div class="buffgrid"><div class="card"><div class="icon">🧲</div><h3>磁鐵球</h3><p>10秒內保證進球</p><button class="adbtn" data-buff="magnet">▶ 看廣告</button></div><div class="card green"><div class="icon">🏀<br>🏀</div><h3>連續球 ×2</h3><p>20秒內投一顆變兩顆</p><button class="adbtn" data-buff="multi">▶ 看廣告</button></div></div><button id="skipBtn" class="skip">不用 BUFF，直接開始</button></div></section>
<section id="countdown" class="screen"><div id="countNum">3</div></section>
<section id="game" class="screen"><canvas id="canvas"></canvas><div class="hud"><div class="topbar"><div class="box"><small>最高分</small><b id="bestText">0</b></div><div class="box time"><small>時間</small><b id="timeText">60.0</b></div><div class="box"><small>得分</small><b id="scoreText">0</b></div></div><div class="leftpanel"><small>關卡 <span id="stageText">1</span></small><hr><small>目標分數</small><b id="targetText">100</b></div><div class="combo">COMBO<b id="comboText">0</b></div><div id="feedback" class="feedback"></div><div class="hint">向上滑動投籃</div></div></section>
<section id="result" class="screen"><div class="resultcard"><h2>遊戲結束</h2><div id="finalScore" class="final">0</div><div class="stats"><div class="stat">最高階段<b id="finalStage">1</b></div><div class="stat">進球數<b id="finalMakes">0</b></div><div class="stat">命中率<b id="finalAcc">0%</b></div></div><button id="againBtn" class="action again">再玩一次</button><button id="homeBtn" class="action homebtn">回首頁</button></div></section>
<div id="adLayer"><div class="adcard"><h2>Facebook 獎勵廣告</h2><div id="adSec" class="adsec">3</div><p>播放完成即可獲得 BUFF</p></div></div>
</div>
<script src="assets/v3bg0.js"></script><script src="assets/v3bg1.js"></script><script src="assets/v3bg2.js"></script><script src="assets/v3bg3.js"></script><script src="assets/v3bg4.js"></script><script src="assets/v3bg5.js"></script><script src="assets/v3bg6.js"></script><script src="assets/v3bg7.js"></script>
<script>
(()=>{'use strict';
const $=i=>document.getElementById(i),screens=['home','buff','countdown','game','result'];
function fit(){document.documentElement.style.setProperty('--h',innerHeight+'px')}fit();addEventListener('resize',fit);addEventListener('orientationchange',()=>setTimeout(fit,250));
function show(id){screens.forEach(s=>$(s).classList.toggle('active',s===id))}
const bg='data:image/webp;base64,'+window.__SDBG;$('game').style.backgroundImage=`url(${bg})`;
const ranks=[['Jason Chen',98765],['Sakura Tanaka',95420],['Mike Johnson',93210],['Minwoo Kim',89775],['Wong Ka Yu',85310],['Jeremy Lim',82465],['Michelle Lee',80245],['Andi Pratama',78690],['Carlos Cruz',76555],['Alex Lin',74210]];
rankList.innerHTML=ranks.map((r,i)=>`<div class="rankrow"><div class="rankno">${i+1}</div><div class="avatar">${r[0].split(' ').map(x=>x[0]).join('').slice(0,2)}</div><div class="name">${r[0]}</div><div class="pts">${r[1].toLocaleString()}</div></div>`).join('');
const c=$('canvas'),g=c.getContext('2d');
let W=0,H=0,D=1,last=performance.now(),running=false,stage=1,target=100,time=60,score=0,combo=0,shots=0,makes=0,best=Number(localStorage.getItem('streetExactBest')||0),balls=[],drag=null,parts=[],net=0,msg='',msgT=0,buffs={magnet:0,multi:0};
const G=980;
function resize(){D=Math.min(2,devicePixelRatio||1);W=c.clientWidth;H=c.clientHeight;c.width=W*D;c.height=H*D;g.setTransform(D,0,0,D,0,0);if(!balls.length)resetBalls()}
addEventListener('resize',resize);
const hoop=()=>({x:W*.5,y:H*.286,left:W*.405,right:W*.595,r:7});
const rackY=()=>H*.823,slotX=i=>W*(.32+i*.09);
function makeBall(i){return{id:i,x:slotX(i),y:rackY(),r:Math.max(20,W*.052),vx:0,vy:0,spin:0,state:'rack',scored:false,returnT:0,sx:0,sy:0,clone:false}}
function resetBalls(){balls=Array.from({length:5},(_,i)=>makeBall(i))}
function say(t,d=.85){msg=t;msgT=d}
function sync(){bestText.textContent=best;timeText.textContent=Math.max(0,time).toFixed(1);scoreText.textContent=score;stageText.textContent=stage;targetText.textContent=target;comboText.textContent=combo;feedback.textContent=msgT>0?msg:''}
function begin(type){stage=1;target=100;time=60;score=combo=shots=makes=0;buffs={magnet:type==='magnet'?10:0,multi:type==='multi'?20:0};drag=null;parts=[];net=0;resetBalls();running=true;show('game');sync()}
function countdown(type){show('countdown');let n=3;countNum.textContent=n;const q=setInterval(()=>{n--;if(n===0){clearInterval(q);begin(type)}else countNum.textContent=n},700)}
function ad(type){adLayer.classList.add('active');let n=3;adSec.textContent=n;const q=setInterval(()=>{n--;adSec.textContent=n;if(n===0){clearInterval(q);adLayer.classList.remove('active');countdown(type)}},700)}
function randomBuff(){if(Math.random()<.5){buffs.magnet+=10;say('磁鐵球 +10秒',1.5)}else{buffs.multi+=10;say('雙球 +10秒',1.5)}}
function launch(b,dx,dy,ms){
 const up=-dy;if(up<35){say('請快速往上滑');drag=null;return}
 const sec=Math.max(.06,Math.min(.45,ms/1000)),speed=Math.hypot(dx,dy)/sec,n=Math.max(.85,Math.min(1.22,speed/1050)),angle=Math.max(61*Math.PI/180,Math.min(86*Math.PI/180,Math.atan2(up,dx))),v=H*.96*n;
 b.vx=Math.cos(angle)*v;b.vy=-Math.sin(angle)*v;b.state='fly';b.scored=false;shots++;
 if(buffs.multi>0){const q=makeBall(9999+Math.random()*100);q.x=b.x+9;q.y=b.y;q.r=b.r*.9;q.vx=b.vx-30;q.vy=b.vy*.99;q.state='fly';q.clone=true;balls.push(q)}
 drag=null;
}
function made(b){if(b.scored)return;b.scored=true;score+=2;makes++;combo++;net=.45;say(combo>1?'COMBO '+combo+'！':'進球！');for(let i=0;i<26;i++)parts.push({x:W*.5,y:H*.3,vx:(Math.random()-.5)*270,vy:(Math.random()-.8)*260,l:1,s:3+Math.random()*5});if(combo%10===0)randomBuff();if(score>=target){stage++;target=stage*100;time+=60;say('STAGE '+stage+'｜+60秒',1.8)}}
function miss(b){if(!b.scored&&!b.clone){combo=0;say('差一點')}if(b.clone){b.state='dead';return}b.state='return';b.returnT=0;b.sx=b.x;b.sy=b.y;b.vx=b.vy=0}
function collide(b,cx,cy,cr){const dx=b.x-cx,dy=b.y-cy,d=Math.hypot(dx,dy),m=b.r+cr;if(d>0&&d<m){const nx=dx/d,ny=dy/d;b.x=cx+nx*m;b.y=cy+ny*m;const vn=b.vx*nx+b.vy*ny;if(vn<0){b.vx-=1.7*vn*nx;b.vy-=1.7*vn*ny}}}
function updateBall(b,dt){
 if(b.state==='fly'){
  const py=b.y,h=hoop();b.vy+=G*dt;
  if(buffs.magnet>0&&b.vy>0&&b.y<h.y+H*.11){b.vx+=(h.x-b.x)*13*dt;b.vy+=(h.y-b.y)*3*dt}
  b.x+=b.vx*dt;b.y+=b.vy*dt;b.spin+=b.vx*dt*.02;
  collide(b,h.left,h.y,h.r);collide(b,h.right,h.y,h.r);
  if(b.x+b.r>W*.56&&b.x-b.r<W*.70&&b.y>H*.205&&b.y<H*.285&&b.vx>0){b.x=W*.56-b.r;b.vx=-Math.abs(b.vx)*.72}
  const crossed=py+b.r<h.y&&b.y+b.r>=h.y&&b.vy>0;
  if(crossed&&b.x>h.left+b.r*.05&&b.x<h.right-b.r*.05)made(b);
  else if(buffs.magnet>0&&b.vy>0&&Math.abs(b.y-h.y)<H*.075&&Math.abs(b.x-h.x)<W*.16){b.x=h.x;made(b)}
  if((b.y>H*.63&&b.vy>0)||b.x<-100||b.x>W+100||b.y>H+100)miss(b)
 }else if(b.state==='return'){
  b.returnT+=dt;const u=Math.min(1,b.returnT/.78),e=1-Math.pow(1-u,3);
  b.x=b.sx+(slotX(b.id)-b.sx)*e;b.y=b.sy+(rackY()-b.sy)*e+Math.sin(Math.PI*u)*24;b.spin+=dt*10;
  if(u>=1)Object.assign(b,makeBall(b.id))
 }}
function update(dt){
 if(running){time-=dt;if(time<=0){time=0;running=false;if(score>best){best=score;localStorage.setItem('streetExactBest',best)}finalScore.textContent=score;finalStage.textContent=stage;finalMakes.textContent=makes;finalAcc.textContent=(shots?Math.round(makes/shots*100):0)+'%';show('result')}buffs.magnet=Math.max(0,buffs.magnet-dt);buffs.multi=Math.max(0,buffs.multi-dt);balls.forEach(b=>updateBall(b,dt));balls=balls.filter(b=>b.state!=='dead')}
 net=Math.max(0,net-dt);msgT=Math.max(0,msgT-dt);parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=330*dt;p.l-=dt});parts=parts.filter(p=>p.l>0);sync()
}
function drawBall(b){g.save();g.translate(b.x,b.y);g.rotate(b.spin);g.shadowColor='#000';g.shadowBlur=12;const q=g.createRadialGradient(-b.r*.42,-b.r*.45,2,0,0,b.r);q.addColorStop(0,'#ffd99b');q.addColorStop(.35,'#f58b2d');q.addColorStop(.75,'#b84411');q.addColorStop(1,'#581603');g.fillStyle=q;g.beginPath();g.arc(0,0,b.r,0,Math.PI*2);g.fill();g.shadowBlur=0;g.strokeStyle='#2a0d04';g.lineWidth=2.4;g.beginPath();g.arc(0,0,b.r,0,Math.PI*2);g.stroke();g.beginPath();g.moveTo(-b.r,0);g.lineTo(b.r,0);g.moveTo(0,-b.r);g.bezierCurveTo(-b.r*.72,-b.r*.22,-b.r*.72,b.r*.22,0,b.r);g.moveTo(0,-b.r);g.bezierCurveTo(b.r*.72,-b.r*.22,b.r*.72,b.r*.22,0,b.r);g.stroke();g.restore()}
function drawNet(){if(net<=0)return;const h=hoop(),s=Math.sin(net*48)*8;g.save();g.strokeStyle='rgba(230,230,230,.9)';g.lineWidth=2;for(let i=-4;i<=4;i++){g.beginPath();g.moveTo(h.x+i*9,h.y+5);g.lineTo(h.x+i*6+s,h.y+H*.055);g.stroke()}g.restore()}
function drawHands(){if(!drag)return;g.save();g.globalAlpha=.9;g.fillStyle='#9d5b3a';g.beginPath();g.ellipse(W*.39,H*.91,W*.075,H*.055,-.35,0,Math.PI*2);g.fill();g.beginPath();g.ellipse(W*.61,H*.91,W*.075,H*.055,.35,0,Math.PI*2);g.fill();g.restore()}
function draw(){g.clearRect(0,0,W,H);if(!running)return;drawHands();balls.forEach(drawBall);drawNet();parts.forEach(p=>{g.globalAlpha=Math.max(0,p.l);g.fillStyle='#ffd334';g.fillRect(p.x,p.y,p.s,p.s)});g.globalAlpha=1}
function posFrom(t){const r=c.getBoundingClientRect();return{x:t.clientX-r.left,y:t.clientY-r.top}}
function down(e){if(!running)return;e.preventDefault();const t=e.touches?e.touches[0]:e,z=posFrom(t);let chosen=null,d=1e9;for(const b of balls)if(b.state==='rack'){const k=Math.hypot(z.x-b.x,z.y-b.y);if(k<d){d=k;chosen=b}}if(!chosen&&z.y>H*.62)chosen=balls.find(b=>b.state==='rack');if(chosen)drag={ball:chosen,sx:z.x,sy:z.y,x:z.x,y:z.y,t:performance.now()}}
function move(e){if(!drag)return;e.preventDefault();const t=e.touches?e.touches[0]:e,z=posFrom(t);drag.x=z.x;drag.y=z.y}
function up(e){if(!drag)return;e.preventDefault();const t=e.changedTouches?e.changedTouches[0]:e,z=posFrom(t);launch(drag.ball,z.x-drag.sx,z.y-drag.sy,performance.now()-drag.t)}
c.addEventListener('touchstart',down,{passive:false});c.addEventListener('touchmove',move,{passive:false});c.addEventListener('touchend',up,{passive:false});c.addEventListener('pointerdown',e=>{if(e.pointerType!=='touch')down(e)});c.addEventListener('pointermove',e=>{if(e.pointerType!=='touch')move(e)});c.addEventListener('pointerup',e=>{if(e.pointerType!=='touch')up(e)});
startBtn.onclick=()=>show('buff');skipBtn.onclick=()=>countdown('none');document.querySelectorAll('[data-buff]').forEach(b=>b.onclick=()=>ad(b.dataset.buff));againBtn.onclick=()=>show('buff');homeBtn.onclick=()=>show('home');
function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}resize();requestAnimationFrame(loop);
})();
</script></body></html>

<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Street Hoop</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#050508}body{display:flex;justify-content:center}canvas{width:min(100vw,480px);height:100vh;display:block;touch-action:none}</style></head><body><canvas id="game"></canvas><script>(()=>{'use strict';const c=document.getElementById('game'),g=c.getContext('2d');let W=0,H=0,D=1,last=performance.now(),running=false,score=0,time=60,combo=0,best=Number(localStorage.getItem('streetHoopBest')||0),pointer=null,balls=[],fx=[],net=0,shake=0;function resize(){D=Math.min(2,devicePixelRatio||1);W=c.clientWidth;H=c.clientHeight;c.width=W*D;c.height=H*D;g.setTransform(D,0,0,D,0,0);resetBalls()}addEventListener('resize',resize);function slotX(i){return W*(.30+i*.10)}function makeBall(i){return{id:i,x:slotX(i),y:H*.82,r:Math.max(16,W*.045),vx:0,vy:0,spin:0,mode:'rack',scored:false,rt:0,sx:0,sy:0}}function resetBalls(){balls=Array.from({length:5},(_,i)=>makeBall(i))}function start(){score=0;time=60;combo=0;running=true;fx=[];net=0;resetBalls()}function hoop(){return{x:W*.5,y:H*.355,w:W*.23}}function burst(x,y){for(let i=0;i<26;i++)fx.push({x,y,vx:(Math.random()-.5)*260,vy:(Math.random()-.7)*260,l:1,s:3+Math.random()*5})}function shoot(b,px,py){const dx=b.x-px,dy=b.y-py,m=Math.hypot(dx,dy);if(m<30)return;const f=Math.max(.8,Math.min(1.75,m/125));b.vx=dx*4.7*f;b.vy=dy*4.7*f;b.mode='fly';b.scored=false;pointer=null}function beginReturn(b){if(!b.scored)combo=0;b.mode='return';b.rt=0;b.sx=b.x;b.sy=b.y;b.vx=b.vy=0}function update(dt){if(running){time-=dt;if(time<=0){time=0;running=false;if(score>best){best=score;localStorage.setItem('streetHoopBest',best)}}for(const b of balls){if(b.mode==='fly'){b.vy+=770*dt;b.x+=b.vx*dt;b.y+=b.vy*dt;b.spin+=dt*9;const h=hoop();if(!b.scored&&b.vy>0&&b.y-b.r<h.y&&b.y+b.r>=h.y&&b.x>h.x-h.w*.47&&b.x<h.x+h.w*.47){b.scored=true;combo++;score+=(time<=10?4:2)+(combo>=5?1:0);net=.45;shake=.12;burst(h.x,h.y)}if(b.y>H*.70&&b.vy>0)beginReturn(b);if(b.x<-80||b.x>W+80||b.y>H+80)beginReturn(b)}else if(b.mode==='return'){b.rt+=dt;const t=Math.min(1,b.rt/.72),e=1-Math.pow(1-t,3);b.x=b.sx+(slotX(b.id)-b.sx)*e;b.y=b.sy+(H*.82-b.sy)*e+Math.sin(t*Math.PI)*22;b.spin+=dt*10;if(t>=1)Object.assign(b,makeBall(b.id))}}}net=Math.max(0,net-dt);shake=Math.max(0,shake-dt);for(const p of fx){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=340*dt;p.l-=dt}fx=fx.filter(p=>p.l>0)}function rounded(x,y,w,h,r,fill,stroke){g.beginPath();g.roundRect(x,y,w,h,r);if(fill){g.fillStyle=fill;g.fill()}if(stroke){g.strokeStyle=stroke;g.stroke()}}function drawMachine(){const bg=g.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#080816');bg.addColorStop(.45,'#1b0d2e');bg.addColorStop(1,'#08070b');g.fillStyle=bg;g.fillRect(0,0,W,H);for(let i=0;i<18;i++){g.fillStyle=`hsla(${260+i*8},90%,60%,.12)`;g.fillRect((i*73)%W,(i*137)%H,2,H*.3)}g.save();if(shake>0)g.translate((Math.random()-.5)*6,(Math.random()-.5)*6);g.strokeStyle='#6940a6';g.lineWidth=W*.025;g.beginPath();g.moveTo(W*.08,H*.17);g.lineTo(W*.18,H*.76);g.moveTo(W*.92,H*.17);g.lineTo(W*.82,H*.76);g.stroke();g.strokeStyle='#282537';g.lineWidth=3;for(let i=0;i<10;i++){let yy=H*(.19+i*.055);g.beginPath();g.moveTo(W*.1,yy);g.lineTo(W*.9,yy);g.stroke()}const board=g.createLinearGradient(W*.25,H*.18,W*.75,H*.44);board.addColorStop(0,'#ff3d71');board.addColorStop(.5,'#7d37e8');board.addColorStop(1,'#00bde8');rounded(W*.23,H*.19,W*.54,H*.23,16,board,'#e8e8ff');g.fillStyle='#fff';g.textAlign='center';g.font=`900 ${W*.105}px Arial`;g.shadowColor='#000';g.shadowBlur=8;g.fillText('STREET',W*.5,H*.28);g.fillText('HOOP',W*.5,H*.37);g.shadowBlur=0;g.fillStyle='#d8d8e8';g.fillRect(W*.455,H*.32,W*.09,H*.085);const h=hoop();g.strokeStyle='#ff5d18';g.lineWidth=8;g.beginPath();g.ellipse(h.x,h.y,h.w*.5,h.w*.12,0,0,Math.PI*2);g.stroke();g.strokeStyle='#ddd';g.lineWidth=2;const sway=net>0?Math.sin(net*45)*7:0;for(let i=-4;i<=4;i++){g.beginPath();g.moveTo(h.x+i*h.w/9,h.y+4);g.lineTo(h.x+i*h.w/14+sway,H*.47);g.stroke()}g.beginPath();g.moveTo(h.x-h.w*.48,h.y+5);g.lineTo(h.x-h.w*.25+sway,H*.47);g.lineTo(h.x+h.w*.25+sway,H*.47);g.lineTo(h.x+h.w*.48,h.y+5);g.stroke();const ramp=g.createLinearGradient(0,H*.48,0,H);ramp.addColorStop(0,'#1a1a25');ramp.addColorStop(1,'#302239');g.fillStyle=ramp;g.beginPath();g.moveTo(W*.17,H*.48);g.lineTo(W*.83,H*.48);g.lineTo(W*.94,H);g.lineTo(W*.06,H);g.closePath();g.fill();g.strokeStyle='#7849bb';g.lineWidth=5;g.stroke();for(let i=0;i<9;i++){g.strokeStyle=i%2?'#632ca4':'#1c7aac';g.lineWidth=2;g.beginPath();g.moveTo(W*(.18+i*.08),H*.5);g.lineTo(W*(.08+i*.105),H);g.stroke()}g.restore()}function drawBall(b){g.save();g.translate(b.x,b.y);g.rotate(b.spin);g.shadowColor='#000';g.shadowBlur=8;const q=g.createRadialGradient(-b.r*.35,-b.r*.4,2,0,0,b.r);q.addColorStop(0,'#ffc16d');q.addColorStop(.45,'#f27b25');q.addColorStop(1,'#8c2d08');g.fillStyle=q;g.beginPath();g.arc(0,0,b.r,0,Math.PI*2);g.fill();g.shadowBlur=0;g.strokeStyle='#351306';g.lineWidth=2;g.beginPath();g.arc(0,0,b.r,0,Math.PI*2);g.stroke();g.beginPath();g.moveTo(-b.r,0);g.lineTo(b.r,0);g.moveTo(0,-b.r);g.bezierCurveTo(-b.r*.7,-b.r*.2,-b.r*.7,b.r*.2,0,b.r);g.moveTo(0,-b.r);g.bezierCurveTo(b.r*.7,-b.r*.2,b.r*.7,b.r*.2,0,b.r);g.stroke();g.restore()}function drawHUD(){rounded(W*.06,H*.025,W*.88,H*.105,14,'rgba(3,3,8,.88)','#7b61a9');g.textAlign='center';g.font=`700 ${W*.035}px Arial`;g.fillStyle='#ddd';g.fillText('最高分',W*.19,H*.052);g.fillText('時間',W*.5,H*.052);g.fillText('得分',W*.81,H*.052);g.font=`900 ${W*.075}px monospace`;g.fillStyle='#ffd344';g.fillText(String(best),W*.19,H*.105);g.fillStyle=time<=10?'#ff2d23':'#ff4031';g.shadowColor='#f00';g.shadowBlur=10;g.fillText(String(Math.ceil(time)).padStart(2,'0'),W*.5,H*.105);g.shadowBlur=0;g.fillStyle='#ffd344';g.fillText(String(score).padStart(3,'0'),W*.81,H*.105);if(combo>=2){g.font=`900 ${W*.075}px Arial`;g.strokeStyle='#461000';g.lineWidth=7;g.strokeText('COMBO '+combo,W*.72,H*.21);g.fillStyle='#ff9f18';g.fillText('COMBO '+combo,W*.72,H*.21)}if(time<=10&&running){g.font=`900 ${W*.06}px Arial`;g.fillStyle='#fff';g.fillText('FINAL 10 SEC ×2',W*.5,H*.155)}if(!running){g.fillStyle='rgba(0,0,0,.72)';g.fillRect(0,0,W,H);rounded(W*.12,H*.35,W*.76,H*.27,20,'rgba(20,15,35,.97)','#8b54d1');g.fillStyle='#ffd344';g.font=`900 ${W*.095}px Arial`;g.fillText(time===60?'STREET HOOP':'時間到',W*.5,H*.43);g.fillStyle='#fff';g.font=`700 ${W*.045}px Arial`;g.fillText(time===60?'向上滑動籃球，連續投籃':`本局得分 ${score}`,W*.5,H*.49);rounded(W*.25,H*.53,W*.5,H*.075,14,'#ffae16');g.fillStyle='#251200';g.font=`900 ${W*.052}px Arial`;g.fillText(time===60?'開始遊戲':'再玩一次',W*.5,H*.582)}}}function draw(){g.clearRect(0,0,W,H);drawMachine();for(const b of balls)drawBall(b);if(pointer){g.strokeStyle='rgba(255,255,255,.75)';g.lineWidth=3;g.setLineDash([8,8]);g.beginPath();g.moveTo(pointer.b.x,pointer.b.y);g.lineTo(pointer.x,pointer.y);g.stroke();g.setLineDash([])}for(const p of fx){g.globalAlpha=Math.max(0,p.l);g.fillStyle='#ffd53b';g.fillRect(p.x,p.y,p.s,p.s)}g.globalAlpha=1;drawHUD()}function pos(e){const r=c.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}c.addEventListener('pointerdown',e=>{const p=pos(e);if(!running){if(p.y>H*.5&&p.y<H*.64)start();return}let chosen=null,d=1e9;for(const b of balls)if(b.mode==='rack'){const z=Math.hypot(p.x-b.x,p.y-b.y);if(z<d){d=z;chosen=b}}if(chosen&&d<75)pointer={b:chosen,x:p.x,y:p.y}});c.addEventListener('pointermove',e=>{if(pointer){const p=pos(e);pointer.x=p.x;pointer.y=p.y}});c.addEventListener('pointerup',e=>{if(pointer){const p=pos(e);shoot(pointer.b,p.x,p.y)}});function loop(t){const dt=Math.min(.033,(t-last)/1000);last=t;update(dt);draw();requestAnimationFrame(loop)}resize();requestAnimationFrame(loop)})();</script></body></html>

<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>Street Hoop</title><style>:root{--app-h:100dvh}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,"Microsoft JhengHei",sans-serif;overscroll-behavior:none}body{display:flex;justify-content:center}button{font:inherit}#app{position:relative;width:min(100vw,480px);height:var(--app-h);overflow:hidden;background:#02030a;color:#fff;touch-action:none;-webkit-user-select:none;user-select:none}.screen{position:absolute;inset:0;display:none}.screen.active{display:block}.arcadeBg{background:radial-gradient(circle at 50% 8%,#281445,#05040b 72%)}.logo{position:absolute;top:5.5%;left:7%;font-size:clamp(50px,14vw,68px);font-style:italic;font-weight:1000;line-height:.78;letter-spacing:-4px;text-shadow:0 5px #7e2600,0 0 20px #ff8b00}.logo span{display:block;color:#ffae17}.leader{position:absolute;top:24%;left:5%;right:5%;bottom:15%;background:#070a16f2;border:3px solid #8051b3;border-radius:22px;overflow:hidden;box-shadow:0 0 28px #6f35ff66}.leader h2{height:12%;display:flex;align-items:center;justify-content:center;margin:0;font-size:clamp(22px,6vw,29px)}#rows{height:88%;display:grid;grid-template-rows:repeat(10,1fr);padding:0 12px 8px}.row{display:grid;grid-template-columns:34px 42px 1fr 92px;align-items:center;gap:8px;border-top:1px solid #ffffff1c;min-height:0}.row:first-child{border-top:0}.avatar{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,#ffd98d,#9a571b);color:#261100;border:2px solid #ffe7bd;font-weight:1000}.name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pts{color:#ffd43a;font-weight:1000;text-align:right}.primary{position:absolute;left:14%;right:14%;bottom:calc(20px + env(safe-area-inset-bottom));height:72px;border:0;border-radius:19px;background:linear-gradient(#ffd449,#f06c08);color:#fff;font-size:clamp(27px,7vw,34px);font-weight:1000;text-shadow:0 3px #7d2600;box-shadow:0 0 28px #ff7b00aa}.buffWrap{position:absolute;inset:9% 5% 8%;background:#070a16f4;border:3px solid #8051b3;border-radius:22px;padding:20px}.buffWrap h2{text-align:center;font-size:clamp(27px,7vw,34px);margin:0 0 6px}.buffWrap>p{text-align:center;color:#ddd}.buffGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;height:58%;margin-top:20px}.buffCard{display:flex;flex-direction:column;align-items:center;text-align:center;padding:12px;border-radius:18px;border:2px solid #42a0ff;background:linear-gradient(#102844,#06121f)}.buffCard.green{border-color:#42d66b;background:linear-gradient(#123d25,#071b11)}.buffIcon{font-size:clamp(55px,15vw,74px)}.buffCard h3{font-size:clamp(21px,5.5vw,27px);color:#ffd43a}.adBtn{margin-top:auto;width:100%;height:50px;background:#ffb51b;color:#2a1600;font-weight:1000;border:0;border-radius:12px}.skip{position:absolute;left:15%;right:15%;bottom:5%;height:52px;border:0;border-radius:13px;background:#5a5a5a;color:#fff;font-weight:900}#countdown.active{display:flex;align-items:center;justify-content:center;background:#02030a}#countNum{font-size:clamp(150px,43vw,215px);color:#ff9416;font-weight:1000;text-shadow:0 0 35px #ff5000}#game{background:#000 center/cover no-repeat}#game:after{content:"";position:absolute;inset:0;background:linear-gradient(#0008 0 8%,transparent 18% 73%,#0007 100%);pointer-events:none}canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;z-index:2}.hud{position:absolute;inset:0;z-index:3;pointer-events:none}.topHud{position:absolute;top:calc(7px + env(safe-area-inset-top));left:8px;right:8px;height:74px;display:grid;grid-template-columns:1fr 1.18fr 1fr;gap:7px}.hudBox{display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(#12151b,#030507);border:3px solid #555c68;border-radius:13px;box-shadow:0 3px 12px #000d}.hudBox small{font-size:11px;color:#ddd}.hudBox b{font:900 clamp(26px,7vw,38px)/1 monospace;color:#ffd122;text-shadow:0 0 7px #ffae00}.hudBox.time b{color:#ff2119;text-shadow:0 0 9px #ff0000}.leftInfo{position:absolute;top:94px;left:8px;width:105px;display:flex;flex-direction:column;gap:7px}.infoBox{padding:8px 7px;text-align:center;background:linear-gradient(#243a7d,#091425);border:2px solid #8d9ec5;border-radius:10px;font-weight:900}.infoBox b{display:block;font-size:25px;margin-top:4px}.combo{position:absolute;top:102px;right:10px;color:#ffd524;font-size:20px;font-weight:1000;text-align:center;text-shadow:0 3px #7a2100}.combo b{display:block;font-size:52px;color:#ff8b00}.feedback{position:absolute;top:27%;left:5%;right:5%;text-align:center;font-size:39px;font-weight:1000;color:#ffd229;text-shadow:0 4px 10px #000}.hint{position:absolute;left:10%;right:10%;bottom:calc(9px + env(safe-area-inset-bottom));padding:10px;background:#000c;border:1px solid #ffb01b;border-radius:12px;text-align:center;font-size:14px}.buffPills{position:absolute;right:8px;top:210px;display:flex;flex-direction:column;gap:5px}.pill{padding:7px 9px;background:#06111eee;border:1px solid #4e9eff;border-radius:9px;font-size:12px;font-weight:900}.resultPanel{position:absolute;top:22%;left:7%;right:7%;padding:24px;background:#070b18f3;border:3px solid #8051b3;border-radius:22px;text-align:center}.resultPanel h2{font-size:34px;margin:0}.final{font-size:66px;color:#ffb31b;font-weight:1000}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:18px 0}.stat{background:#111728;border-radius:11px;padding:10px 4px;font-size:12px}.stat b{display:block;font-size:22px;color:#ffd43a}.action{width:100%;height:54px;margin-top:10px;border:0;border-radius:13px;font-weight:1000;font-size:18px}.again{background:#ffad17;color:#2a1600}.back{background:#3174d7;color:#fff}.adLayer{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#000e;z-index:30}.adLayer.on{display:flex}.adBox{width:76%;padding:24px;text-align:center;background:#07101d;border:2px solid #8051b3;border-radius:18px}.adSec{font-size:60px;color:#ffd43a;font-weight:1000}</style></head><body><div id="app"><section id="home" class="screen active arcadeBg"><div class="logo">STREET<span>HOOP</span></div><div class="leader"><h2>🏆 TOP 10 PLAYERS</h2><div id="rows"></div></div><button id="startBtn" class="primary">▶ 開始遊戲</button></section><section id="buff" class="screen arcadeBg"><div class="buffWrap"><h2>選擇開局 BUFF</h2><p>看廣告取得一項開局優勢</p><div class="buffGrid"><div class="buffCard"><div class="buffIcon">🧲</div><h3>磁鐵球</h3><p>10秒內保證進球</p><button class="adBtn" data-buff="magnet">▶ 看廣告</button></div><div class="buffCard green"><div class="buffIcon">🏀🏀</div><h3>連續球 ×2</h3><p>20秒內投一顆變兩顆</p><button class="adBtn" data-buff="multi">▶ 看廣告</button></div></div><button id="skipBtn" class="skip">不用 BUFF，直接開始</button></div></section><section id="countdown" class="screen"><div id="countNum">3</div></section><section id="game" class="screen"><canvas id="gameCanvas"></canvas><div class="hud"><div class="topHud"><div class="hudBox"><small>最高分</small><b id="bestText">0</b></div><div class="hudBox time"><small>時間</small><b id="timeText">60.0</b></div><div class="hudBox"><small>得分</small><b id="scoreText">0</b></div></div><div class="leftInfo"><div class="infoBox">關卡 <b id="stageText">1</b></div><div class="infoBox">目標分數 <b id="targetText">100</b></div></div><div class="combo">COMBO<b id="comboText">0</b></div><div id="buffPills" class="buffPills"></div><div id="feedback" class="feedback"></div><div class="hint">按住下方籃球，快速往上滑動投籃</div></div></section><section id="result" class="screen arcadeBg"><div class="resultPanel"><h2>遊戲結束</h2><div id="finalScore" class="final">0</div><div class="stats"><div class="stat">最高階段<b id="finalStage">1</b></div><div class="stat">進球數<b id="finalMakes">0</b></div><div class="stat">命中率<b id="finalAcc">0%</b></div></div><button id="againBtn" class="action again">再玩一次</button><button id="homeBtn" class="action back">回首頁</button></div></section><div id="adLayer" class="adLayer"><div class="adBox"><h2>Facebook 獎勵廣告</h2><div id="adSec" class="adSec">3</div><p>播放完成即可獲得 BUFF</p></div></div></div><script src="assets/exact0.js"></script><script src="assets/exact1.js"></script><script src="assets/exact2.js"></script><script src="assets/exact3.js"></script><script>(()=>{'use strict';const $=id=>document.getElementById(id),screens=['home','buff','countdown','game','result'];function fit(){document.documentElement.style.setProperty('--app-h',innerHeight+'px')}fit();addEventListener('resize',fit);addEventListener('orientationchange',()=>setTimeout(fit,250));function show(id){screens.forEach(s=>$(s).classList.toggle('active',s===id));if(id==='game')resize()}const ranks=[['Jason Chen',98765],['Sakura Tanaka',95420],['Mike Johnson',93210],['Minwoo Kim',89775],['Wong Ka Yu',85310],['Jeremy Lim',82465],['Michelle Lee',80245],['Andi Pratama',78690],['Carlos Cruz',76555],['Alex Lin',74210]];$('rows').innerHTML=ranks.map((r,i)=>`<div class="row"><b>${i+1}</b><div class="avatar">${r[0].split(' ').map(x=>x[0]).join('').slice(0,2)}</div><div class="name">${r[0]}</div><div class="pts">${r[1].toLocaleString()}</div></div>`).join('');const art='data:image/webp;base64,'+window.__EXACT;$('game').style.backgroundImage=`url(${art})`;const c=$('gameCanvas'),g=c.getContext('2d');let W=0,H=0,D=1,last=performance.now(),running=false,stage=1,target=100,time=60,score=0,combo=0,shots=0,makes=0,best=Number(localStorage.getItem('streetHoopExactBest')||0),gesture=null,shot=null,returnBall=null,particles=[],message='',messageTime=0,buffs={magnet:0,multi:0};function resize(){D=Math.min(2,devicePixelRatio||1);W=c.clientWidth;H=c.clientHeight;c.width=W*D;c.height=H*D;g.setTransform(D,0,0,D,0,0)}addEventListener('resize',resize);function sync(){bestText.textContent=best.toLocaleString();timeText.textContent=Math.max(0,time).toFixed(1);scoreText.textContent=score;stageText.textContent=stage;targetText.textContent=target;comboText.textContent=combo;feedback.textContent=messageTime>0?message:'';buffPills.innerHTML=(buffs.magnet>0?`<div class="pill">🧲 ${buffs.magnet.toFixed(1)}秒</div>`:'')+(buffs.multi>0?`<div class="pill">🏀×2 ${buffs.multi.toFixed(1)}秒</div>`:'')}function say(t,d=.85){message=t;messageTime=d}function begin(type){stage=1;target=100;time=60;score=combo=shots=makes=0;gesture=null;shot=null;returnBall=null;particles=[];buffs={magnet:type==='magnet'?10:0,multi:type==='multi'?20:0};running=true;show('game');sync()}function countdown(type){show('countdown');let n=3;countNum.textContent=n;const it=setInterval(()=>{n--;if(n===0){clearInterval(it);begin(type)}else countNum.textContent=n},700)}function playAd(type){adLayer.classList.add('on');let n=3;adSec.textContent=n;const it=setInterval(()=>{n--;adSec.textContent=n;if(n===0){clearInterval(it);adLayer.classList.remove('on');countdown(type)}},700)}function randomBuff(){if(Math.random()<.5){buffs.magnet+=10;say('10連進！磁鐵球 +10秒',1.5)}else{buffs.multi+=10;say('10連進！連續球 ×2',1.5)}}function startShot(dx,dy,ms){if(shot||returnBall||!running)return;const up=-dy;if(up<35){say('請快速往上滑動');return}shots++;const sx=W*.5,sy=H*.84,hx=W*.505,hy=H*.315;const horizontal=Math.max(-W*.22,Math.min(W*.22,dx*.55));const speed=Math.max(.55,Math.min(1.1,Math.hypot(dx,dy)/Math.max(70,ms)));let accurate=Math.abs(dx)<W*.18;if(buffs.magnet>0)accurate=true;shot={sx,sy,hx:accurate?hx:hx+horizontal,hy,ctrlX:sx+horizontal*.45,ctrlY:H*.12,t:0,dur:1.05/speed,accurate,phase:'flight',x:sx,y:sy,r:Math.max(24,W*.065),spin:0}}function finishShot(){if(!shot)return;if(shot.accurate){const gain=buffs.multi>0?4:2;score+=gain;makes++;combo++;say(buffs.multi>0?'雙倍進球！':'SWISH!');for(let i=0;i<28;i++)particles.push({x:W*.5,y:H*.34,vx:(Math.random()-.5)*260,vy:(Math.random()-.8)*260,l:1});if(combo%10===0)randomBuff();if(score>=target){stage++;target=stage*100;time+=60;say('STAGE '+stage+'｜+60秒',1.8)}}else{combo=0;say('差一點')}returnBall={x:shot.x,y:shot.y,t:0,dur:.75};shot=null}function endGame(){running=false;if(score>best){best=score;localStorage.setItem('streetHoopExactBest',best)}finalScore.textContent=score;finalStage.textContent=stage;finalMakes.textContent=makes;finalAcc.textContent=(shots?Math.round(makes/shots*100):0)+'%';show('result')}function update(dt){if(running){time-=dt;if(time<=0){time=0;endGame()}buffs.magnet=Math.max(0,buffs.magnet-dt);buffs.multi=Math.max(0,buffs.multi-dt)}if(shot){shot.t+=dt;const u=Math.min(1,shot.t/shot.dur),v=1-u;shot.x=v*v*shot.sx+2*v*u*shot.ctrlX+u*u*shot.hx;shot.y=v*v*shot.sy+2*v*u*shot.ctrlY+u*u*shot.hy;shot.spin+=dt*9;if(u>=1){shot.phase='drop';shot.t=0;shot.dur=.36;shot.sx=shot.x;shot.sy=shot.y;shot.ctrlX=shot.x;shot.ctrlY=H*.43;shot.hx=W*.5;shot.hy=H*.58;shot.accurate=shot.accurate;const s=shot;shot={...s,phase:'drop'}}else if(shot.phase==='drop'){} }if(shot&&shot.phase==='drop'){const u=Math.min(1,shot.t/shot.dur),v=1-u;shot.x=v*v*shot.sx+2*v*u*shot.ctrlX+u*u*shot.hx;shot.y=v*v*shot.sy+2*v*u*shot.ctrlY+u*u*shot.hy;if(u>=1)finishShot()}if(returnBall){returnBall.t+=dt;const u=Math.min(1,returnBall.t/returnBall.dur),e=1-Math.pow(1-u,3);returnBall.x=returnBall.x+(W*.5-returnBall.x)*e;returnBall.y=returnBall.y+(H*.84-returnBall.y)*e;if(u>=1)returnBall=null}messageTime=Math.max(0,messageTime-dt);particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=330*dt;p.l-=dt});particles=particles.filter(p=>p.l>0);if(running)sync()}function drawBall(x,y,r,spin=0){g.save();g.translate(x,y);g.rotate(spin);g.shadowColor='#000';g.shadowBlur=12;const q=g.createRadialGradient(-r*.4,-r*.45,2,0,0,r);q.addColorStop(0,'#ffd08a');q.addColorStop(.42,'#ef7621');q.addColorStop(1,'#6d1c05');g.fillStyle=q;g.beginPath();g.arc(0,0,r,0,Math.PI*2);g.fill();g.shadowBlur=0;g.strokeStyle='#311007';g.lineWidth=2.4;g.beginPath();g.arc(0,0,r,0,Math.PI*2);g.stroke();g.beginPath();g.moveTo(-r,0);g.lineTo(r,0);g.moveTo(0,-r);g.bezierCurveTo(-r*.7,-r*.2,-r*.7,r*.2,0,r);g.moveTo(0,-r);g.bezierCurveTo(r*.7,-r*.2,r*.7,r*.2,0,r);g.stroke();g.restore()}function draw(){g.clearRect(0,0,W,H);if(!running)return;if(!shot&&!returnBall)drawBall(W*.5,H*.84,Math.max(25,W*.068));if(shot)drawBall(shot.x,shot.y,shot.r,shot.spin);if(returnBall)drawBall(returnBall.x,returnBall.y,Math.max(20,W*.052),returnBall.t*9);particles.forEach(p=>{g.globalAlpha=Math.max(0,p.l);g.fillStyle='#ffd22c';g.fillRect(p.x,p.y,5,5)});g.globalAlpha=1}function point(t){const r=c.getBoundingClientRect();return{x:t.clientX-r.left,y:t.clientY-r.top}}function down(e){if(!running||shot||returnBall)return;e.preventDefault();const t=e.touches?e.touches[0]:e,p=point(t);if(p.y>H*.52)gesture={sx:p.x,sy:p.y,t:performance.now()}}function move(e){if(gesture)e.preventDefault()}function up(e){if(!gesture)return;e.preventDefault();const t=e.changedTouches?e.changedTouches[0]:e,p=point(t),ms=performance.now()-gesture.t;startShot(p.x-gesture.sx,p.y-gesture.sy,ms);gesture=null}c.addEventListener('touchstart',down,{passive:false});c.addEventListener('touchmove',move,{passive:false});c.addEventListener('touchend',up,{passive:false});c.addEventListener('pointerdown',e=>{if(e.pointerType!=='touch')down(e)});c.addEventListener('pointerup',e=>{if(e.pointerType!=='touch')up(e)});startBtn.onclick=()=>show('buff');skipBtn.onclick=()=>countdown('none');document.querySelectorAll('[data-buff]').forEach(b=>b.onclick=()=>playAd(b.dataset.buff));againBtn.onclick=()=>show('buff');homeBtn.onclick=()=>show('home');function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}resize();requestAnimationFrame(loop)})();</script></body></html>

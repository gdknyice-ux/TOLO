<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Street Hoop</title><style>:root{--vh:1vh}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05050a;font-family:Arial,"Microsoft JhengHei",sans-serif}body{display:flex;justify-content:center;align-items:center}button{font:inherit}#app{position:relative;width:min(100vw,480px);height:calc(var(--vh)*100);overflow:hidden;background:radial-gradient(circle at 50% 12%,#2d1650 0,#130a29 42%,#05050a 78%);color:#fff}.screen{position:absolute;inset:0;display:none}.screen.active{display:block}#home{padding:max(14px,env(safe-area-inset-top)) 16px max(18px,env(safe-area-inset-bottom))}.brand{font-size:clamp(46px,12vw,64px);font-weight:1000;font-style:italic;line-height:.78;letter-spacing:-3px;text-shadow:0 5px 0 #7b2f00,0 0 18px #ff8500;margin:24px 0 22px}.brand span{display:block;color:#ffae17}.board{position:absolute;top:25%;left:4%;right:4%;bottom:15%;background:#070a16f2;border:3px solid #8055b8;border-radius:22px;box-shadow:0 0 28px #7e3bff55;overflow:hidden}.board h2{height:12%;margin:0;display:flex;align-items:center;justify-content:center;font-size:clamp(21px,6vw,30px)}#rankList{height:88%;display:grid;grid-template-rows:repeat(10,1fr);padding:0 12px 8px}.rankrow{display:grid;grid-template-columns:36px 42px 1fr 92px;align-items:center;gap:8px;border-top:1px solid #ffffff1e;min-height:0}.rankrow:first-child{border-top:0}.rankno{font-size:22px;font-weight:900;text-align:center}.avatar{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,#ffd588,#a66424);color:#271200;border:2px solid #ffe7bd;font-weight:1000}.name{font-size:clamp(14px,4vw,19px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.score{font-size:clamp(15px,4.4vw,21px);font-weight:1000;color:#ffd53a;text-align:right}.primary{position:absolute;left:14%;right:14%;bottom:max(18px,env(safe-area-inset-bottom));height:72px;border:0;border-radius:20px;background:linear-gradient(#ffd04a,#f17509);color:#fff;font-size:clamp(26px,7vw,34px);font-weight:1000;text-shadow:0 3px #7b2900;box-shadow:0 8px 22px #0008}#buff{padding:max(20px,env(safe-area-inset-top)) 14px max(20px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 15%,#2f1a55,#0a0712 72%)}.buffpanel{position:absolute;top:12%;left:4%;right:4%;bottom:8%;padding:20px;background:#070b17f2;border:3px solid #8055b8;border-radius:22px}.buffpanel h2{font-size:clamp(25px,7vw,34px);text-align:center;margin:0 0 6px}.buffpanel>p{text-align:center;color:#ddd;margin:0 0 20px}.buffgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;height:58%}.buffcard{display:flex;flex-direction:column;align-items:center;text-align:center;padding:14px 10px;border:2px solid #4c9aff;border-radius:18px;background:linear-gradient(#10223c,#07111e)}.buffcard.green{border-color:#45d46a;background:linear-gradient(#113622,#071b12)}.bufficon{font-size:clamp(56px,15vw,78px);line-height:1;margin:10px 0}.buffcard h3{font-size:clamp(21px,5.5vw,27px);margin:4px 0;color:#ffd33a}.buffcard p{font-size:14px;min-height:42px}.adbtn{margin-top:auto;width:100%;height:52px;border:0;border-radius:13px;background:#ffb51b;color:#2a1600;font-weight:1000;font-size:17px}.skip{position:absolute;left:15%;right:15%;bottom:5%;height:54px;border:0;border-radius:14px;background:#555;color:#fff;font-size:17px;font-weight:900}#countdown.active{display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,#3b1b56,#08060d 72%)}#countNum{font-size:clamp(140px,42vw,210px);font-weight:1000;color:#ff9915;text-shadow:0 0 30px #ff5000}#game{background:linear-gradient(#130b27,#07060c)}#court{position:absolute;inset:0;overflow:hidden;background:radial-gradient(circle at 50% 30%,#4a286e55,transparent 34%),linear-gradient(160deg,transparent 0 46%,#291935 47% 100%)}#machineTitle{position:absolute;top:18%;left:18%;right:18%;height:18%;display:grid;place-items:center;border-radius:18px;background:linear-gradient(135deg,#ef3d69,#7639dc,#11b8d9);border:3px solid #ddd;font-size:clamp(34px,9vw,46px);font-weight:1000;text-align:center;line-height:.92;text-shadow:0 4px #2b113f;box-shadow:0 0 24px #8b55ff88}#rim{position:absolute;top:37%;left:39%;width:22%;height:13px;border:7px solid #ff6518;border-radius:50%;box-shadow:0 16px 0 -5px #ddd,0 29px 0 -8px #ddd}.rail{position:absolute;top:46%;bottom:0;width:4px;background:#7b4db2}.rail.l{left:13%;transform:rotate(-5deg)}.rail.r{right:13%;transform:rotate(5deg)}canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}.hud{position:absolute;top:max(8px,env(safe-area-inset-top));left:8px;right:8px;height:70px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:7px;background:#050713eb;border:2px solid #7651a7;border-radius:14px;pointer-events:none}.hud div{text-align:center}.hud small{display:block;font-size:10px;color:#ddd}.hud b{font:900 clamp(20px,5.5vw,27px)/1 monospace;color:#ffd43a}.hud #timeText{color:#ff4b38}.tag{position:absolute;padding:7px 10px;border-radius:9px;background:#000c;font-weight:900;pointer-events:none}.stageTag{top:90px;left:10px}.comboTag{top:128px;left:10px;color:#ffb42a}.buffTags{position:absolute;top:90px;right:10px;display:flex;flex-direction:column;gap:5px;pointer-events:none}.pill{padding:7px 9px;border-radius:9px;background:#07111ef0;border:1px solid #4e9eff;font-size:12px;font-weight:900}.feedback{position:absolute;top:30%;left:7%;right:7%;text-align:center;font-size:clamp(28px,8vw,40px);font-weight:1000;text-shadow:0 3px 10px #000;pointer-events:none}.hint{position:absolute;left:10px;right:10px;bottom:max(8px,env(safe-area-inset-bottom));padding:8px;border-radius:10px;background:#000b;text-align:center;font-size:13px;pointer-events:none}#result{padding:max(20px,env(safe-area-inset-top)) 16px max(20px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 25%,#38205f,#08060e 70%)}.resultpanel{position:absolute;top:23%;left:7%;right:7%;padding:24px;text-align:center;background:#070b17f2;border:3px solid #8055b8;border-radius:22px}.resultpanel h2{font-size:34px;margin:0 0 8px}.finalScore{font-size:64px;font-weight:1000;color:#ffb31c}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:18px 0}.stat{padding:10px 5px;background:#111627;border-radius:12px;font-size:12px}.stat b{display:block;font-size:23px;color:#ffd43a;margin-top:4px}.btn{width:100%;height:54px;border:0;border-radius:13px;margin-top:10px;font-size:18px;font-weight:1000}.again{background:#ffad17;color:#2a1600}.homebtn{background:#3174d7;color:#fff}#adLayer{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#000e;z-index:30}#adLayer.active{display:flex}.adbox{width:76%;padding:25px;text-align:center;background:#080c18;border:2px solid #7750aa;border-radius:18px}.adbox h2{margin:0}.adsec{font-size:60px;font-weight:1000;color:#ffd43a}</style></head><body><div id="app"><section id="home" class="screen active"><div class="brand">STREET<span>HOOP</span></div><div class="board"><h2>🏆 TOP 10 PLAYERS</h2><div id="rankList"></div></div><button id="startBtn" class="primary">▶ 開始遊戲</button></section><section id="buff" class="screen"><div class="buffpanel"><h2>選擇開局 BUFF</h2><p>看廣告取得一項開局優勢</p><div class="buffgrid"><div class="buffcard"><div class="bufficon">🧲</div><h3>磁鐵球</h3><p>10秒內保證進球</p><button class="adbtn" data-buff="magnet">▶ 看廣告</button></div><div class="buffcard green"><div class="bufficon">🏀🏀</div><h3>連續球 ×2</h3><p>20秒內投一顆變兩顆</p><button class="adbtn" data-buff="multi">▶ 看廣告</button></div></div><button id="skipBtn" class="skip">不用 BUFF，直接開始</button></div></section><section id="countdown" class="screen"><div id="countNum">3</div></section><section id="game" class="screen"><div id="court"><div id="machineTitle">STREET<br>HOOP</div><div id="rim"></div><i class="rail l"></i><i class="rail r"></i></div><canvas id="canvas"></canvas><div class="hud"><div><small>階段</small><b id="stageText">1</b></div><div><small>目標</small><b id="targetText">100</b></div><div><small>時間</small><b id="timeText">60</b></div><div><small>得分</small><b id="scoreText">0</b></div></div><div id="stageTag" class="tag stageTag">STAGE 1</div><div id="comboTag" class="tag comboTag">連進 0 / 10</div><div id="buffTags" class="buffTags"></div><div id="feedback" class="feedback"></div><div class="hint">按住下方籃球往上滑動投籃</div></section><section id="result" class="screen"><div class="resultpanel"><h2>遊戲結束</h2><div id="finalScore" class="finalScore">0</div><div class="stats"><div class="stat">最高階段<b id="finalStage">1</b></div><div class="stat">進球數<b id="finalMakes">0</b></div><div class="stat">命中率<b id="finalAcc">0%</b></div></div><button id="againBtn" class="btn again">再玩一次</button><button id="homeBtn" class="btn homebtn">回首頁</button></div></section><div id="adLayer"><div class="adbox"><h2>Facebook 獎勵廣告</h2><div id="adSec" class="adsec">3</div><p>播放完成即可獲得 BUFF</p></div></div></div><script>(()=>{'use strict';const $=id=>document.getElementById(id),screens=['home','buff','countdown','game','result'];function setVH(){document.documentElement.style.setProperty('--vh',innerHeight*.01+'px')}setVH();addEventListener('resize',setVH);function show(id){screens.forEach(s=>$(s).classList.toggle('active',s===id))}const ranks=[['Jason Chen',98765],['Sakura Tanaka',95420],['Mike Johnson',93210],['Minwoo Kim',89775],['Wong Ka Yu',85310],['Jeremy Lim',82465],['Michelle Lee',80245],['Andi Pratama',78690],['Carlos Cruz',76555],['Alex Lin',74210]];$('rankList').innerHTML=ranks.map((r,i)=>`<div class="rankrow"><div class="rankno">${i+1}</div><div class="avatar">${r[0].split(' ').map(x=>x[0]).join('').slice(0,2)}</div><div class="name">${r[0]}</div><div class="score">${r[1].toLocaleString()}</div></div>`).join('');const c=$('canvas'),g=c.getContext('2d');let W=0,H=0,D=1,last=performance.now(),running=false,stage=1,target=100,time=60,score=0,combo=0,shots=0,makes=0,pointer=null,balls=[],particles=[],message='',messageTime=0,buffs={magnet:0,multi:0};const GRAVITY=920;function resize(){D=Math.min(2,devicePixelRatio||1);W=c.clientWidth;H=c.clientHeight;c.width=W*D;c.height=H*D;g.setTransform(D,0,0,D,0,0);resetBalls()}addEventListener('resize',resize);const hoop=()=>({x:W*.5,y:H*.385,left:W*.43,right:W*.57}),rackY=()=>H*.81,slotX=i=>W*(.30+i*.10);function makeBall(i){return{id:i,x:slotX(i),y:rackY(),r:Math.max(20,W*.048),vx:0,vy:0,spin:0,mode:'rack',scored:false,rt:0,sx:0,sy:0,clone:false}}function resetBalls(){balls=Array.from({length:5},(_,i)=>makeBall(i))}function sync(){stageText.textContent=stage;targetText.textContent=target;timeText.textContent=Math.ceil(time);scoreText.textContent=score;stageTag.textContent='STAGE '+stage;comboTag.textContent='連進 '+combo+' / 10';feedback.textContent=messageTime>0?message:'';buffTags.innerHTML=(buffs.magnet>0?`<div class="pill">🧲 ${buffs.magnet.toFixed(1)}秒</div>`:'')+(buffs.multi>0?`<div class="pill">🏀×2 ${buffs.multi.toFixed(1)}秒</div>`:'')}function say(t,d=.8){message=t;messageTime=d}function begin(type){stage=1;target=100;time=60;score=combo=shots=makes=0;pointer=null;particles=[];buffs={magnet:type==='magnet'?10:0,multi:type==='multi'?20:0};resetBalls();running=true;show('game');sync()}function count(type){show('countdown');let n=3;countNum.textContent=n;const timer=setInterval(()=>{n--;if(n===0){clearInterval(timer);begin(type)}else countNum.textContent=n},700)}function playAd(type){adLayer.classList.add('active');let n=3;adSec.textContent=n;const timer=setInterval(()=>{n--;adSec.textContent=n;if(n===0){clearInterval(timer);adLayer.classList.remove('active');count(type)}},700)}function award(){if(Math.random()<.5){buffs.magnet+=10;say('獲得磁鐵球 10秒',1.5)}else{buffs.multi+=10;say('獲得連續球 ×2 10秒',1.5)}}function launch(b,dx,dy,elapsed){const up=-dy;if(up<24){say('請往上滑動');pointer=null;return}const sec=Math.max(.06,Math.min(.45,elapsed/1000)),speed=Math.hypot(dx,dy)/sec,n=Math.max(.88,Math.min(1.18,speed/1000)),angle=Math.max(65*Math.PI/180,Math.min(84*Math.PI/180,Math.atan2(up,dx))),v=H*.84*n;b.vx=Math.cos(angle)*v;b.vy=-Math.sin(angle)*v;b.mode='fly';b.scored=false;shots++;if(buffs.multi>0){const q=makeBall(999);q.x=b.x+9;q.y=b.y;q.vx=b.vx-22;q.vy=b.vy;q.mode='fly';q.clone=true;q.r=b.r*.92;balls.push(q)}pointer=null}function made(b){if(b.scored)return;b.scored=true;score+=2;makes++;combo++;say('進球！');for(let i=0;i<20;i++)particles.push({x:W*.5,y:H*.39,vx:(Math.random()-.5)*230,vy:(Math.random()-.72)*230,l:1});if(combo%10===0)award();if(score>=target){stage++;target=stage*100;time+=60;say('升級 STAGE '+stage+'｜+60秒',1.8)}}function sendBack(b){if(!b.scored&&!b.clone){combo=0;say('沒進')}if(b.clone){b.mode='dead';return}b.mode='return';b.rt=0;b.sx=b.x;b.sy=b.y;b.vx=b.vy=0}function updateBall(b,dt){if(b.mode==='fly'){const py=b.y,h=hoop();b.vy+=GRAVITY*dt;if(buffs.magnet>0&&b.vy>0&&b.y<h.y+H*.1){b.vx+=(h.x-b.x)*12*dt;b.vy+=(h.y-b.y)*3*dt}b.x+=b.vx*dt;b.y+=b.vy*dt;b.spin+=b.vx*dt*.02;const crossed=py+b.r<h.y&&b.y+b.r>=h.y&&b.vy>0;if(crossed&&b.x>h.left&&b.x<h.right)made(b);else if(buffs.magnet>0&&b.vy>0&&Math.abs(b.y-h.y)<H*.075&&Math.abs(b.x-h.x)<W*.15){b.x=h.x;made(b)}if((b.y>H*.72&&b.vy>0)||b.x<-100||b.x>W+100||b.y>H+100)sendBack(b)}else if(b.mode==='return'){b.rt+=dt;const u=Math.min(1,b.rt/.7),e=1-Math.pow(1-u,3);b.x=b.sx+(slotX(b.id)-b.sx)*e;b.y=b.sy+(rackY()-b.sy)*e+Math.sin(Math.PI*u)*22;b.spin+=dt*9;if(u>=1)Object.assign(b,makeBall(b.id))}}function update(dt){if(running){time-=dt;if(time<=0){time=0;running=false;finalScore.textContent=score;finalStage.textContent=stage;finalMakes.textContent=makes;finalAcc.textContent=(shots?Math.round(makes/shots*100):0)+'%';show('result')}buffs.magnet=Math.max(0,buffs.magnet-dt);buffs.multi=Math.max(0,buffs.multi-dt);balls.forEach(b=>updateBall(b,dt));balls=balls.filter(b=>b.mode!=='dead')}messageTime=Math.max(0,messageTime-dt);particles.forEach(q=>{q.x+=q.vx*dt;q.y+=q.vy*dt;q.vy+=300*dt;q.l-=dt});particles=particles.filter(q=>q.l>0);if(running)sync()}function drawBall(b){g.save();g.translate(b.x,b.y);g.rotate(b.spin);g.shadowColor='#000';g.shadowBlur=10;const q=g.createRadialGradient(-b.r*.4,-b.r*.45,2,0,0,b.r);q.addColorStop(0,'#ffd99b');q.addColorStop(.4,'#f58a2c');q.addColorStop(1,'#641b05');g.fillStyle=q;g.beginPath();g.arc(0,0,b.r,0,Math.PI*2);g.fill();g.shadowBlur=0;g.strokeStyle='#2b0d04';g.lineWidth=2;g.beginPath();g.arc(0,0,b.r,0,Math.PI*2);g.stroke();g.beginPath();g.moveTo(-b.r,0);g.lineTo(b.r,0);g.moveTo(0,-b.r);g.bezierCurveTo(-b.r*.7,-b.r*.2,-b.r*.7,b.r*.2,0,b.r);g.moveTo(0,-b.r);g.bezierCurveTo(b.r*.7,-b.r*.2,b.r*.7,b.r*.2,0,b.r);g.stroke();g.restore()}function draw(){g.clearRect(0,0,W,H);if(!running)return;g.fillStyle='#9b5736';g.globalAlpha=.9;g.beginPath();g.ellipse(W*.39,H*.92,W*.075,H*.06,-.35,0,Math.PI*2);g.fill();g.beginPath();g.ellipse(W*.61,H*.92,W*.075,H*.06,.35,0,Math.PI*2);g.fill();g.globalAlpha=1;balls.forEach(drawBall);particles.forEach(q=>{g.globalAlpha=Math.max(0,q.l);g.fillStyle='#ffd334';g.fillRect(q.x,q.y,5,5)});g.globalAlpha=1}function pointFromTouch(t){const r=c.getBoundingClientRect();return{x:t.clientX-r.left,y:t.clientY-r.top}}function down(e){if(!running)return;e.preventDefault();const t=e.touches?e.touches[0]:e,z=pointFromTouch(t);let chosen=null,d=1e9;for(const b of balls)if(b.mode==='rack'){const k=Math.hypot(z.x-b.x,z.y-b.y);if(k<d){d=k;chosen=b}}if(chosen&&d<125)pointer={b:chosen,sx:z.x,sy:z.y,t:performance.now()}}function up(e){if(!pointer)return;e.preventDefault();const t=e.changedTouches?e.changedTouches[0]:e,z=pointFromTouch(t);launch(pointer.b,z.x-pointer.sx,z.y-pointer.sy,performance.now()-pointer.t)}c.addEventListener('touchstart',down,{passive:false});c.addEventListener('touchend',up,{passive:false});c.addEventListener('pointerdown',e=>{if(e.pointerType!=='touch')down(e)});c.addEventListener('pointerup',e=>{if(e.pointerType!=='touch')up(e)});startBtn.onclick=()=>show('buff');skipBtn.onclick=()=>count('none');document.querySelectorAll('[data-buff]').forEach(b=>b.onclick=()=>playAd(b.dataset.buff));againBtn.onclick=()=>show('buff');homeBtn.onclick=()=>show('home');function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}resize();requestAnimationFrame(loop)})();</script></body></html>

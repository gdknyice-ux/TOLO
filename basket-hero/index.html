<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Basket Hero</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;background:#111;font-family:Arial,"Microsoft JhengHei",sans-serif;overflow:hidden}body{display:flex;justify-content:center}.wrap{position:relative;width:min(100vw,480px);height:100vh;background:#101622}canvas{width:100%;height:100%;display:block;touch-action:none}.hud{position:absolute;inset:0;pointer-events:none;color:#fff}.top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;padding:10px}.pill{background:#07101dcc;border:1px solid #ffffff22;border-radius:13px;padding:7px 9px;text-align:center;font-size:12px}.pill b{display:block;font-size:20px}.combo{position:absolute;top:90px;left:0;right:0;text-align:center;font-weight:900;font-size:28px;text-shadow:0 3px 8px #000}.tip{position:absolute;left:12px;right:12px;bottom:18px;background:#07101dcc;border-radius:14px;padding:10px;text-align:center;font-size:13px}.overlay{position:absolute;inset:0;background:#08101bea;display:flex;align-items:center;justify-content:center;padding:22px;color:#fff}.card{width:100%;max-width:390px;background:linear-gradient(#26364d,#151d2a);border:2px solid #ffffff20;border-radius:22px;padding:22px;text-align:center;box-shadow:0 18px 50px #0008}.logo{font-size:42px;font-weight:1000;line-height:1}.sub{opacity:.8;margin-top:6px}.btn{border:0;border-radius:14px;padding:14px 18px;font-weight:900;font-size:18px;background:linear-gradient(#ffcc45,#f08a20);color:#3e2100;width:100%;margin-top:14px}.btn.blue{background:linear-gradient(#64c5ff,#2877d2);color:#fff}.btn.gray{background:#536171;color:#fff}.choices{display:grid;gap:10px}.choice{border:0;border-radius:14px;padding:13px;text-align:left;background:#fff;color:#172033}.choice b{display:block;font-size:18px}.choice span{font-size:13px;color:#536171}.adbox{height:110px;border-radius:14px;background:linear-gradient(135deg,#333,#666);display:flex;align-items:center;justify-content:center;margin:12px 0;font-weight:900}.hidden{display:none}</style></head><body><div class="wrap"><canvas id="game"></canvas><div class="hud"><div class="top"><div class="pill">分數<b id="score">0</b></div><div class="pill">生命<b id="lives">3</b></div><div class="pill">最高<b id="best">0</b></div></div><div class="combo" id="combo"></div><div class="tip" id="tip">由球的位置向上滑動投籃，滑得越快力量越大。</div></div><div class="overlay" id="menu"><div class="card"><div class="logo">BASKET<br>HERO</div><div class="sub">滑動投籃・連擊・Fever・能力升級</div><button class="btn" id="start">開始遊戲</button><button class="btn blue" id="how">玩法說明</button></div></div><div class="overlay hidden" id="modal"><div class="card" id="modalCard"></div></div></div><script>(()=>{'use strict';const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');const $=id=>document.getElementById(id);let W=0,H=0,dpr=1;function resize(){dpr=Math.min(2,window.devicePixelRatio||1);W=canvas.clientWidth;H=canvas.clientHeight;canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}window.addEventListener('resize',resize);resize();const state={running:false,score:0,best:Number(localStorage.getItem('basketHeroBest')||0),lives:3,combo:0,shots:0,level:1,fever:0,revived:false,slow:0,magnet:0,bigBall:0,bigRim:0};$('best').textContent=state.best;let ball,hoop,particles=[],pointer=null,last=performance.now();function resetBall(){ball={x:W*.28,y:H*.78,r:state.bigBall?20:16,vx:0,vy:0,active:false,scored:false,trail:[]}}function resetHoop(){const boss=state.shots>0&&state.shots%10===0;hoop={x:W*.72,y:H*.34,w:(boss?78:94)+(state.bigRim?35:0),dir:Math.random()<.5?-1:1,speed:boss?115+state.level*10:45+state.level*6,boss,phase:Math.random()*6.28}}function startGame(){Object.assign(state,{running:true,score:0,lives:3,combo:0,shots:0,level:1,fever:0,revived:false,slow:0,magnet:0,bigBall:0,bigRim:0});resetBall();resetHoop();particles=[];$('menu').classList.add('hidden');$('modal').classList.add('hidden');sync()}function sync(){$('score').textContent=state.score;$('lives').textContent=state.lives;$('best').textContent=state.best;$('combo').textContent=state.combo>=2?`COMBO x${state.combo}`:'';$('tip').textContent=state.fever>0?'FEVER！每球雙倍分數':hoop&&hoop.boss?'BOSS 籃框！移動更快':'由球的位置向上滑動投籃'}function drawBackground(){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#1c2d49');g.addColorStop(.55,'#5d89b2');g.addColorStop(1,'#d47d42');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='#182b43';ctx.fillRect(0,H*.72,W,H*.28);for(let i=0;i<8;i++){ctx.fillStyle=i%2?'#203b59':'#1a314c';ctx.fillRect(i*W/8,H*.58+(i%3)*14,W/9,H*.15)}ctx.strokeStyle='#ffffff12';ctx.lineWidth=2;for(let y=H*.74;y<H;y+=34){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}}function drawHoop(){if(!hoop)return;const x=hoop.x,y=hoop.y;ctx.save();ctx.translate(x,y);ctx.fillStyle='#e9eef5';ctx.fillRect(hoop.w*.35,-80,12,85);ctx.fillStyle='#f8fafc';ctx.fillRect(-8-hoop.w*.15,-83,hoop.w*.65,48);ctx.strokeStyle='#d5dde7';ctx.lineWidth=3;ctx.strokeRect(-8-hoop.w*.15,-83,hoop.w*.65,48);ctx.strokeStyle='#ff6a00';ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(-hoop.w/2,0);ctx.lineTo(hoop.w/2,0);ctx.stroke();ctx.strokeStyle='#e6edf5';ctx.lineWidth=2;for(let i=-3;i<=3;i++){ctx.beginPath();ctx.moveTo(i*hoop.w/7,4);ctx.lineTo(i*hoop.w/10,42);ctx.stroke()}ctx.beginPath();ctx.moveTo(-hoop.w/2,4);ctx.lineTo(-hoop.w/4,42);ctx.lineTo(hoop.w/4,42);ctx.lineTo(hoop.w/2,4);ctx.stroke();if(hoop.boss){ctx.fillStyle='#ffdb4d';ctx.font='900 16px Arial';ctx.textAlign='center';ctx.fillText('BOSS',0,-95)}ctx.restore()}function drawBall(){if(!ball)return;ctx.save();ctx.translate(ball.x,ball.y);if(state.fever>0){ctx.shadowColor='#ff5d2a';ctx.shadowBlur=25}ctx.fillStyle='#ef7a22';ctx.beginPath();ctx.arc(0,0,ball.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#4b210c';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,ball.r,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(-ball.r,0);ctx.lineTo(ball.r,0);ctx.moveTo(0,-ball.r);ctx.bezierCurveTo(-ball.r*.65,-ball.r*.2,-ball.r*.65,ball.r*.2,0,ball.r);ctx.moveTo(0,-ball.r);ctx.bezierCurveTo(ball.r*.65,-ball.r*.2,ball.r*.65,ball.r*.2,0,ball.r);ctx.stroke();ctx.restore()}function drawAim(){if(!pointer||ball.active)return;ctx.strokeStyle='#ffffffaa';ctx.lineWidth=3;ctx.setLineDash([7,7]);ctx.beginPath();ctx.moveTo(ball.x,ball.y);ctx.lineTo(pointer.x,pointer.y);ctx.stroke();ctx.setLineDash([])}function spawnParticles(x,y){for(let i=0;i<18;i++)particles.push({x,y,vx:(Math.random()-.5)*220,vy:(Math.random()-.5)*220,life:1})}function update(dt){if(!state.running)return;const speedMul=state.slow>0?.65:1;if(hoop){hoop.phase+=dt;hoop.x+=hoop.dir*hoop.speed*dt*speedMul;if(hoop.x<hoop.w*.58||hoop.x>W-hoop.w*.58)hoop.dir*=-1;if(hoop.boss)hoop.y=H*.32+Math.sin(hoop.phase*2)*45}if(state.fever>0)state.fever=Math.max(0,state.fever-dt);if(state.slow>0)state.slow=Math.max(0,state.slow-dt);if(state.magnet>0)state.magnet=Math.max(0,state.magnet-dt);if(ball&&ball.active){ball.vy+=680*dt;ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;ball.trail.push({x:ball.x,y:ball.y});if(ball.trail.length>8)ball.trail.shift();if(state.magnet>0&&Math.abs(ball.y-hoop.y)<130){ball.vx+=(hoop.x-ball.x)*dt*1.8}const withinX=ball.x>hoop.x-hoop.w/2&&ball.x<hoop.x+hoop.w/2;const crossing=ball.vy>0&&ball.y-ball.r<hoop.y&&ball.y+ball.r>=hoop.y;if(!ball.scored&&withinX&&crossing){ball.scored=true;makeShot()}if(ball.y>H+50||ball.x<-80||ball.x>W+80){if(!ball.scored)missShot();else nextBall()}}particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=380*dt;p.life-=dt});particles=particles.filter(p=>p.life>0)}function makeShot(){state.combo++;state.shots++;const perfect=Math.abs(ball.x-hoop.x)<hoop.w*.15;let gain=10+state.combo*2+(perfect?10:0);if(state.fever>0)gain*=2;state.score+=gain;state.level=1+Math.floor(state.shots/5);if(state.combo>=5&&state.fever<=0)state.fever=8;spawnParticles(hoop.x,hoop.y);sync();if(state.shots%5===0)setTimeout(showUpgrade,550)}function missShot(){state.combo=0;state.lives--;sync();if(state.lives<=0)setTimeout(gameOver,350);else setTimeout(nextBall,250)}function nextBall(){resetBall();resetHoop();sync()}function showUpgrade(){state.running=false;const opts=[{t:'磁力投籃',d:'接下來 12 秒，球會被籃框吸引',f:()=>state.magnet=12},{t:'時間變慢',d:'接下來 12 秒，籃框移動速度降低',f:()=>state.slow=12},{t:'大型籃框',d:'永久增加籃框寬度',f:()=>state.bigRim=1},{t:'巨型籃球',d:'永久增加籃球尺寸',f:()=>state.bigBall=1}].sort(()=>Math.random()-.5).slice(0,3);$('modalCard').innerHTML='<h2>選擇一項能力</h2><div class="choices">'+opts.map((o,i)=>`<button class="choice" data-i="${i}"><b>${o.t}</b><span>${o.d}</span></button>`).join('')+'</div>';$('modal').classList.remove('hidden');[...document.querySelectorAll('.choice')].forEach(b=>b.onclick=()=>{opts[Number(b.dataset.i)].f();$('modal').classList.add('hidden');state.running=true;nextBall()})}function gameOver(){state.running=false;if(state.score>state.best){state.best=state.score;localStorage.setItem('basketHeroBest',state.best)}$('modalCard').innerHTML=`<h2>本局結束</h2><div style="font-size:44px;font-weight:900">${state.score} 分</div><p>最高分：${state.best}</p>${!state.revived?'<button class="btn blue" id="revive">觀看廣告復活</button>':''}<button class="btn" id="again">再玩一次</button><button class="btn gray" id="home">回主畫面</button>`;$('modal').classList.remove('hidden');const r=$('revive');if(r)r.onclick=showAdRevive;$('again').onclick=startGame;$('home').onclick=()=>{$('modal').classList.add('hidden');$('menu').classList.remove('hidden')}}function showAdRevive(){$('modalCard').innerHTML='<h2>模擬獎勵廣告</h2><div class="adbox" id="adcount">廣告 3 秒</div><button class="btn gray" disabled>播放中...</button>';let n=3;const t=setInterval(()=>{n--;$('adcount').textContent=`廣告 ${n} 秒`;if(n<=0){clearInterval(t);state.revived=true;state.lives=1;state.running=true;$('modal').classList.add('hidden');nextBall();sync()}},1000)}function shoot(px,py){const dx=ball.x-px,dy=ball.y-py;const power=Math.min(1.8,Math.hypot(dx,dy)/150);ball.vx=dx*4.2*power;ball.vy=dy*4.2*power;ball.active=true;pointer=null}function pos(e){const r=canvas.getBoundingClientRect();const p=e.touches?e.touches[0]:e;return{x:p.clientX-r.left,y:p.clientY-r.top}}canvas.addEventListener('pointerdown',e=>{if(!state.running||ball.active)return;const p=pos(e);if(Math.hypot(p.x-ball.x,p.y-ball.y)<85)pointer=p});canvas.addEventListener('pointermove',e=>{if(pointer)pointer=pos(e)});canvas.addEventListener('pointerup',e=>{if(pointer&&!ball.active)shoot(pos(e).x,pos(e).y)});$('start').onclick=startGame;$('how').onclick=()=>{$('modalCard').innerHTML='<h2>玩法說明</h2><p>從籃球位置向上滑動投籃。連續命中會增加 Combo，連進 5 球進入 Fever。每 5 球可選一次能力，每 10 球出現 Boss 籃框。</p><button class="btn" id="closeHow">知道了</button>';$('modal').classList.remove('hidden');$('closeHow').onclick=()=>$('modal').classList.add('hidden')};function loop(t){const dt=Math.min(.033,(t-last)/1000);last=t;update(dt);drawBackground();if(ball&&ball.trail){ctx.strokeStyle='#ffffff40';ctx.lineWidth=5;ctx.beginPath();ball.trail.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.stroke()}drawHoop();drawBall();drawAim();particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle='#ffd84d';ctx.fillRect(p.x,p.y,5,5)});ctx.globalAlpha=1;requestAnimationFrame(loop)}resetBall();resetHoop();requestAnimationFrame(loop)})();</script></body></html>

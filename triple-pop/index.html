<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Chain Mind Prototype</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:#0d1020;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC",sans-serif;color:#fff}button{font:inherit}#app{max-width:480px;height:100dvh;margin:auto;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 20%,#24345f 0,#11162d 45%,#080b17 100%)}.top{padding:max(14px,env(safe-area-inset-top)) 16px 8px;display:flex;justify-content:space-between;align-items:center}.title{font-weight:900;font-size:24px}.small{font-size:13px;opacity:.7}.panel{margin:8px 14px 0;padding:12px 14px;border:1px solid #ffffff24;border-radius:18px;background:#ffffff10;backdrop-filter:blur(8px);text-align:center}.panel b{display:block;font-size:18px}.boardWrap{position:relative;margin:14px auto 0;width:min(92vw,430px);aspect-ratio:1;border-radius:24px;border:1px solid #ffffff2b;background:linear-gradient(#161f3d,#0c1126);box-shadow:0 18px 40px #0008,inset 0 0 30px #5b7cff14;overflow:hidden}.grid{position:absolute;inset:12px;background-image:linear-gradient(#ffffff10 1px,transparent 1px),linear-gradient(90deg,#ffffff10 1px,transparent 1px);background-size:20% 20%}.node{position:absolute;width:64px;height:64px;margin:-32px;border-radius:50%;border:3px solid #fff8;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 0 25px currentColor, inset 0 0 18px #fff6;transition:transform .2s,opacity .25s,filter .2s;z-index:2}.node:active{transform:scale(.9)}.node.hit{animation:pop .35s forwards}.node.wrong{animation:shake .3s}.red{background:#ff4d68;color:#ff4d68}.blue{background:#4aa3ff;color:#4aa3ff}.yellow{background:#ffd84a;color:#ffd84a}.purple{background:#a76cff;color:#a76cff}.cyan{background:#49e3d1;color:#49e3d1}.bomb{background:#20263d;color:#fff}.beam{position:absolute;height:8px;transform-origin:0 50%;border-radius:10px;background:linear-gradient(90deg,#fff,#7ff);box-shadow:0 0 16px #8ff;z-index:1;opacity:0}.beam.show{opacity:1;animation:beam .45s ease-out forwards}.hint{margin:14px 18px 0;text-align:center;font-weight:700;color:#dbe7ff}.controls{position:absolute;left:14px;right:14px;bottom:max(16px,env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:18px;padding:14px;font-weight:900;font-size:17px;color:#fff;background:linear-gradient(#566bff,#3944d6);box-shadow:0 7px 18px #2530a966}.btn.alt{background:#ffffff14;border:1px solid #ffffff2d;box-shadow:none}.overlay{position:absolute;inset:0;background:#050711d9;display:none;align-items:center;justify-content:center;padding:24px;z-index:20}.overlay.show{display:flex}.modal{width:100%;border-radius:26px;background:#171d38;border:1px solid #ffffff30;padding:24px;text-align:center;box-shadow:0 20px 50px #0009}.modal h2{font-size:31px;margin:0 0 8px}.score{font-size:56px;margin:12px 0}.modal p{line-height:1.6;opacity:.8}.modal .btn{width:100%;margin-top:10px}@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.5);filter:brightness(2)}100%{transform:scale(.1);opacity:0}}@keyframes beam{0%{transform:scaleX(0)}100%{transform:scaleX(1);opacity:0}}@keyframes shake{25%{transform:translateX(-7px)}50%{transform:translateX(7px)}75%{transform:translateX(-4px)}}@media(max-height:720px){.boardWrap{width:min(78vh,92vw)}.panel{padding:8px}.hint{margin-top:8px}.node{width:56px;height:56px;margin:-28px}}</style></head><body><main id="app"><div class="top"><div><div class="title">CHAIN MIND</div><div class="small">單點連鎖反應測試版</div></div><div class="small">關卡 1</div></div><div class="panel"><b>你只能點一次</b><span class="small">選對起點，讓整個機關全部引爆</span></div><div class="boardWrap" id="board"><div class="grid"></div></div><div class="hint" id="hint">提示：先觀察哪個節點能接到所有路線</div><div class="controls"><button class="btn alt" id="reset">重新開始</button><button class="btn" id="showHint">提示起點</button></div><div class="overlay" id="overlay"><div class="modal" id="modal"></div></div></main><script>const board=document.querySelector('#board'),overlay=document.querySelector('#overlay'),modal=document.querySelector('#modal');const nodes=[{id:0,x:18,y:52,c:'red',e:'●'},{id:1,x:38,y:32,c:'blue',e:'⚡'},{id:2,x:58,y:52,c:'yellow',e:'✦'},{id:3,x:78,y:30,c:'purple',e:'◆'},{id:4,x:80,y:72,c:'cyan',e:'✚'},{id:5,x:46,y:76,c:'bomb',e:'💣'},{id:6,x:22,y:78,c:'blue',e:'●'}];const links=[[0,1],[1,2],[2,3],[2,4],[4,5],[5,6]];let busy=false;function draw(){board.querySelectorAll('.node,.beam').forEach(x=>x.remove());nodes.forEach(n=>{let b=document.createElement('button');b.className='node '+n.c;b.style.left=n.x+'%';b.style.top=n.y+'%';b.textContent=n.e;b.dataset.id=n.id;b.onclick=()=>play(n.id);board.appendChild(b)})}function beam(a,b,delay){let A=nodes[a],B=nodes[b],w=board.clientWidth,h=board.clientHeight,x=A.x/100*w,y=A.y/100*h,dx=(B.x-A.x)/100*w,dy=(B.y-A.y)/100*h,l=Math.hypot(dx,dy),ang=Math.atan2(dy,dx)*180/Math.PI;let e=document.createElement('div');e.className='beam';e.style.left=x+'px';e.style.top=y+'px';e.style.width=l+'px';e.style.transform=`rotate(${ang}deg) scaleX(0)`;board.appendChild(e);setTimeout(()=>{e.style.transform=`rotate(${ang}deg) scaleX(1)`;e.classList.add('show')},delay)}function hit(id,delay){setTimeout(()=>{let el=board.querySelector(`[data-id="${id}"]`);if(el)el.classList.add('hit');if(navigator.vibrate)navigator.vibrate(35)},delay)}function play(id){if(busy)return;busy=true;if(id!==0){let el=board.querySelector(`[data-id="${id}"]`);el.classList.add('wrong');setTimeout(()=>{busy=false;lose()},450);return}let d=0;hit(0,d);links.forEach(([a,b])=>{beam(a,b,d+120);d+=360;hit(b,d)});setTimeout(win,d+700)}function win(){modal.innerHTML='<h2>完美連鎖！</h2><div class="score">⚡ 7</div><p>你只點了一次，就完成整條連鎖。<br>正式版可以加入鏡子、磁鐵、重力與炸彈。</p><button class="btn" onclick="restart()">再玩一次</button>';overlay.classList.add('show')}function lose(){modal.innerHTML='<h2>差一點！</h2><div class="score">💥</div><p>這個起點無法接通全部節點。<br>再觀察一次連線方向。</p><button class="btn" onclick="restart()">重新挑戰</button>';overlay.classList.add('show')}window.restart=()=>{overlay.classList.remove('show');busy=false;draw()};document.querySelector('#reset').onclick=restart;document.querySelector('#showHint').onclick=()=>{document.querySelector('[data-id="0"]').style.outline='5px solid #fff';document.querySelector('#hint').textContent='起點在左側紅色節點'};draw();</script></body></html>
